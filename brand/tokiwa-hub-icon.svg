<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Tokiwa Hub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 角丸スクエア背景 (常盤=エバーグリーン) -->
  <rect width="512" height="512" rx="116" ry="116" fill="url(#bg)"/>
  <!-- ハブ: 中央＋6ノードを結ぶ (7社/各機能が中心に集まる) -->
  <g filter="url(#sh)">
    <g stroke="#ffffff" stroke-width="11" stroke-linecap="round" opacity="0.92">
      <line x1="256" y1="256" x2="256" y2="106"/>
      <line x1="256" y1="256" x2="386" y2="181"/>
      <line x1="256" y1="256" x2="386" y2="331"/>
      <line x1="256" y1="256" x2="256" y2="406"/>
      <line x1="256" y1="256" x2="126" y2="331"/>
      <line x1="256" y1="256" x2="126" y2="181"/>
    </g>
    <!-- 外周ノード -->
    <g fill="#ffffff">
      <circle cx="256" cy="106" r="29"/>
      <circle cx="386" cy="181" r="29"/>
      <circle cx="386" cy="331" r="29"/>
      <circle cx="256" cy="406" r="29"/>
      <circle cx="126" cy="331" r="29"/>
      <circle cx="126" cy="181" r="29"/>
    </g>
    <!-- 中央ハブ (六角形 = 結節点) -->
    <polygon points="256,190 311.4,223 311.4,289 256,322 200.6,289 200.6,223" fill="#ffffff"/>
    <polygon points="256,212 292.4,233 292.4,275 256,296 219.6,275 219.6,233" fill="#65a30d"/>
  </g>
</svg>
