<!--
  ═══════════════════════════════════════════════════════════
  🗂 アート・エス案件管理 (フル管理・全社同期)
  ─ 「アート・エス案件管理表」スプレッドシートを置き換える小アプリ ─

  考え方:
  ・データは本体DB db.artesoCases に保存（各レコード固定ID=AS番号）→ 行の挿入/並べ替えでズレない
  ・新規追加・修正・削除をこの画面で完結（フル管理）
  ・保存→BroadcastChannelで本体に通知→本体がクラウド(全社共有)へ同期(デバウンス3秒)
  ・初回だけ「初期投入」で元シート1122件を取り込む。以後はこの台帳が本番
  ═══════════════════════════════════════════════════════════
-->
<style>
  :root{ --lime:#84cc16; --ink:#1a1a1a; --line:#e0ddd6; --bg:#f4f3f0; --cyan:#0891b2; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:var(--bg); color:var(--ink); }
  header{ background:#1a1a1a; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; }
  header .logo{ font-weight:800; letter-spacing:.04em; font-size:14px; }
  header .logo b{ color:#a3e635; }
  header .tname{ font-size:16px; font-weight:800; }

  .sec{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:.7rem .9rem; margin-bottom:.6rem; }
  .btn{ padding:8px 14px; border:1px solid #d0cec8; border-radius:7px; background:#fff; cursor:pointer; font-size:13px; font-family:inherit; font-weight:600; }
  .btn-p{ background:var(--cyan); border-color:var(--cyan); color:#fff; }
  .btn-g{ background:#16a34a; border-color:#16a34a; color:#fff; }
  .btn-d{ background:#dc2626; border-color:#dc2626; color:#fff; }
  .btn-sm{ padding:3px 9px; font-size:11px; }

  .muted{ font-size:11px; color:#94a3b8; }
  .toolbar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .toolbar input[type=text], .toolbar select{ padding:7px 9px; border:1px solid #d0cec8; border-radius:6px; font-size:13px; font-family:inherit; background:#fff; }

  .kpi{ flex:1; min-width:110px; background:#fafaf8; border:1px solid var(--line); border-radius:8px; padding:8px 12px; }

  .kpi .v{ font-size:18px; font-weight:800; margin-top:2px; }

  table{ border-collapse:separate; border-spacing:0; font-size:12px; width:100%; }

  tbody tr:hover td{ background:#f8fafc; cursor:pointer; }

  td.dt{ white-space:nowrap; color:#475569; }
  td.cust{ font-weight:700; max-width:180px; }
  td.item{ font-weight:600; max-width:220px; }
  td.num{ text-align:right; white-space:nowrap; }
  td.amt{ text-align:right; white-space:nowrap; font-weight:700; color:#166534; }
  .badge{ font-size:10px; font-weight:800; padding:1px 7px; border-radius:9px; }
  .b-new{ background:#dbeafe; color:#1e40af; } .b-rep{ background:#fef3c7; color:#92400e; }
  .seikyu{ font-size:11px; color:#64748b; white-space:nowrap; }
  .link{ color:var(--cyan); text-decoration:none; font-size:11px; }
  .link:hover{ text-decoration:underline; }
  td.st select{ font-size:11px; padding:2px 4px; border:1px solid #e2e0da; border-radius:5px; background:#fffdf5; font-family:inherit; }
  .ops{ white-space:nowrap; }
  #toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:9px 18px; border-radius:8px; font-size:13px; display:none; z-index:120; }
  .empty{ padding:38px; text-align:center; color:#94a3b8; }
  .pill{ display:inline-block; font-size:10px; border:1px solid #e2e8f0; border-radius:10px; padding:1px 8px; color:#64748b; }
  /* モーダル */
  .ov{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:flex-start; justify-content:center; z-index:100; overflow:auto; padding:24px 12px; }
  .ov.show{ display:flex; }
  .modal{ background:#fff; border-radius:12px; width:760px; max-width:100%; box-shadow:0 20px 60px rgba(0,0,0,.3); }

  .modal .body{ padding:14px 18px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; }

  .fld.full{ grid-column:1 / -1; }
  .fld label{ font-size:11px; font-weight:700; color:#64748b; }
  .fld input, .fld select, .fld textarea{ padding:7px 9px; border:1px solid #d0cec8; border-radius:6px; font-size:13px; font-family:inherit; background:#fff; }
  .fld textarea{ min-height:54px; resize:vertical; }
  .modal .foot{ padding:12px 18px; border-top:1px solid var(--line); display:flex; gap:8px; align-items:center; }
  .modal .foot .sp{ flex:1; }
</style>
</head>
<body>

<main>

<div id="toast"></div>

<script>
// ═════════ Tokiwa Hub 共有ヘルパー (全ツール共通・原則編集しない) ═════════
var HUB_DBKEY = 'murayama_v15';
var HUB_AUTHKEY = 'murayama_auth';
var HUB_TOOL_ID = 'arteso-kanri';
// 本体(index.html)の CLOUD_CONFIG と同じ値。ツール単独でも全社クラウド(GAS)へ直接保存するために使う。
var HUB_GAS_URL = 'https://script.google.com/a/macros/tokiwap-group.com/s/AKfycbw9-8Nnq3jV9lCDUEf7JOvQM_yAy1ZYnOIab-TYP3TZ-BtH7RosxKSeXmr-FvkxMVhv/exec';
var HUB_API_KEY = 'mitsumori-2024';
function hubLoad(){ try { return JSON.parse(localStorage.getItem(HUB_DBKEY)) || null; } catch(e){ console.error(e); return null; } }
function hubAuth(){ try { return JSON.parse(localStorage.getItem(HUB_AUTHKEY)) || {}; } catch(e){ return {}; } }
// localStorage容量対策: 問い合わせ本文(body)等はクラウド(Communications)が正なので、
// 端末ミラーには一覧最小限だけ残す。容量超過時に本文を落として保存を通す。
function _hubInqLite_(db){
  if(!db || !Array.isArray(db.inquiries) || !db.inquiries.length) return db;
  var KEEP=['id','subject','kind','status','priority','source_type','channel_company','from_name','from_email','from_company','custName','received_at','createdAt','updatedAt','assignee','category','isSpam','tags','linked_project_id','linked_quote_id','linked_invoice_id','cust_id','tel'];
  var lite=db.inquiries.map(function(r){ if(!r||typeof r!=='object') return r; var o={}; KEEP.forEach(function(k){ if(k in r) o[k]=r[k]; }); o._lite=true; return o; });
  return Object.assign({}, db, {inquiries:lite});
}
function hubSave(mutator){
  var db = hubLoad();
  if(!db){ hubToast('❌ 本体データが見つかりません。先に本体アプリへログインしてください'); return false; }
  try { mutator(db); } catch(e){ hubToast('❌ 変更失敗: ' + e); return false; }
  var _lok=false;
  try { localStorage.setItem(HUB_DBKEY, JSON.stringify(db)); _lok=true; }
  catch(e){
    try { localStorage.setItem(HUB_DBKEY, JSON.stringify(_hubInqLite_(db))); _lok=true; }
    catch(e2){ try { var _b=_hubInqLite_(db); _b.inquiries=[]; _b.history=[]; localStorage.setItem(HUB_DBKEY, JSON.stringify(_b)); _lok=true; } catch(e3){} }
    hubToast(_lok ? '💾 端末保存は軽量化しました（データはクラウドに保存）' : '⚠ 端末保存失敗・クラウドには保存します');
  }
  try { new BroadcastChannel('tokiwa-hub-tools').postMessage({ type:'db-updated', tool: HUB_TOOL_ID }); } catch(e){}
  hubCloudPushSoon();   // ローカル保存の成否に関わらず全社クラウドへ反映（消失防止）
  return true;
}
// ツール単独で全社クラウド(GAS saveAll)へ即保存。本体経由・BroadcastChannel依存をやめ、強制リロードで消えるのを防ぐ。
// 注: 本体 saveToCloud と同じく localStorage の全DBを送る（=本体と同一の保存モデル）。
// 更新時刻ベースの安全な保存: 先にクラウド最新を取得し、このツールが扱うコレクションだけ
// 「レコードごとに新しい方」をマージして送る。他コレクションはクラウド最新をそのまま返す。
// これにより、この端末が古いデータを持っていても他機能・他端末の新しい変更を上書きしない。
function _tsval(r){ if(!r) return 0; var t=r._updatedAt||r.updatedAt||r.paidAt||r.matchedAt||r.createdAt||r._createdAt; var n=t?Date.parse(t):0; return isNaN(n)?0:n; }
// 論理時計: PCの時計が他PCよりずれていても、直近の編集が必ず「より新しい」と判定される時刻を刻む。
// 既存レコードを更新するときは必ず hubStamp(rec) を使うこと(new Date()直書き禁止)。
function hubStamp(rec){ var t=new Date(Math.max(Date.now(), _tsval(rec)+1000)).toISOString(); if(rec) rec._updatedAt=t; return t; }
function mergeNewestById(localArr, cloudArr){
  var byId={}, order=[];
  function take(r, isLocal){ if(!r||!r.id) return;
    if(!(r.id in byId)){ order.push(r.id); byId[r.id]=r; return; }
    var a=_tsval(r), b=_tsval(byId[r.id]);
    if(a>b || (a===b && isLocal)) byId[r.id]=r;   // 同時刻/両方無しはローカル(=このツールの編集)を優先
  }
  (Array.isArray(cloudArr)?cloudArr:[]).forEach(function(r){ take(r,false); });
  (Array.isArray(localArr)?localArr:[]).forEach(function(r){ take(r,true); });
  return order.map(function(id){ return byId[id]; });
}
// このツールが編集の主体となるコレクション(ここだけローカルの新しい変更を反映する)
function ownColls(){ return (typeof HUB_OWN_COLLS!=='undefined'&&HUB_OWN_COLLS) ? HUB_OWN_COLLS : ((typeof COLL!=='undefined'&&COLL) ? [COLL] : []); }
async function hubCloudFetch(){
  var auth=hubAuth(); if(!auth || !auth.loggedIn || !auth.companyId) return null;
  var url=new URL(HUB_GAS_URL);
  url.searchParams.set('action','syncAll'); url.searchParams.set('apiKey', HUB_API_KEY); url.searchParams.set('companyId', auth.companyId);
  var res=await fetch(url.toString(), { method:'GET', redirect:'follow' });
  var r=await res.json();
  var d=r && (r.data||r);
  return (d && typeof d==='object') ? d : null;
}
async function hubCloudPush(){
  var db = hubLoad(), auth = hubAuth();
  if(!db) return false;
  if(!auth || !auth.loggedIn || !auth.companyId) return false;   // 未ログインはローカルのみ
  var cloud=null; try{ cloud=await hubCloudFetch(); }catch(e){ cloud=null; }
  db=hubLoad()||db;   // 通信待ちの間の入力を失わないよう読み直す
  var data;
  if(cloud){
    data = Object.assign({}, cloud);                 // 他コレクションはクラウド最新を維持
    ownColls().forEach(function(k){
      var merged=mergeNewestById(db[k]||[], cloud[k]||[]);
      data[k]=merged;
      db[k]=merged;                                   // ローカルにも反映(他端末の新しい変更を取込)
    });
    try{ localStorage.setItem(HUB_DBKEY, JSON.stringify(db)); }catch(e){}
  } else {
    // クラウド取得失敗: 従来どおりローカル全体(最善努力・消失防止)
    data = {
      master: db.master, config: db.conf,
      projects: db.projects||[], history: db.history||[], quotations: db.quotations||[],
      intercoRequests: db.intercoRequests||[], intercoOrders: db.intercoOrders||[],
      outsourceOrders: db.outsourceOrders||[], artesoCases: db.artesoCases||[],
      calendarOrders: db.calendarOrders||[], inquiries: db.inquiries||[],
      deliveryItems: db.deliveryItems||[], drivers: db.drivers||[],
      inquirySettings: db.inquirySettings||{}, releaseConfig: db.releaseConfig||{},
      toolCompanyConfig: db.toolCompanyConfig||{}, bookmarks: db.bookmarks||[],
      bookmarkCategories: db.bookmarkCategories||[], leadTimeMaster: db.leadTimeMaster||{},
      bookmarksDeleted: (db.bookmarksDeleted||[]).slice(-500),
      bookmarkCategoriesDeleted: (db.bookmarkCategoriesDeleted||[]).slice(-200)
    };
  }
  try {
    var url = new URL(HUB_GAS_URL);
    url.searchParams.set('action','saveAll');
    url.searchParams.set('apiKey', HUB_API_KEY);
    var res = await fetch(url.toString(), { method:'POST', body: JSON.stringify({ companyId: auth.companyId, data: data }), redirect:'follow' });
    var r = await res.json();
    return !!(r && r.success);
  } catch(e){ console.warn('[Tool] cloud push failed', e); return false; }
}
// リアルタイム同期: 20秒ごと＋タブ復帰時にクラウド最新を取り込み、変更があれば再描画
var _hubAutoBusy=false;
async function hubAutoSync(){
  if(_hubAutoBusy || document.hidden) return;
  var ae=document.activeElement;
  if(ae && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) return;   // 入力中は邪魔しない
  _hubAutoBusy=true;
  try{
    var cloud=await hubCloudFetch();
    if(cloud){
      var db=hubLoad();
      if(db){
        var changed=false;
        ownColls().forEach(function(k){
          var before=JSON.stringify((db[k]||[]).map(function(r){return r&&r.id+':'+_tsval(r);}));
          var merged=mergeNewestById(db[k]||[], cloud[k]||[]);
          var after=JSON.stringify(merged.map(function(r){return r&&r.id+':'+_tsval(r);}));
          if(after!==before){ db[k]=merged; changed=true; }
        });
        if(changed){
          try{ localStorage.setItem(HUB_DBKEY, JSON.stringify(db)); }catch(e){}
          try{ if(typeof render==='function') render(); else if(typeof renderResult==='function'){} }catch(e){}
        }
      }
    }
  }catch(e){}
  _hubAutoBusy=false;
}
setInterval(hubAutoSync, 20000);
window.addEventListener('focus', hubAutoSync);

var _hubCloudTimer = null;
function hubCloudPushSoon(){
  if(_hubCloudTimer) clearTimeout(_hubCloudTimer);
  _hubCloudTimer = setTimeout(function(){ _hubCloudTimer=null; hubCloudPush(); }, 1500);
}
function hubEsc(s){ s=(s==null?'':String(s)); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hubToast(msg){ var t = document.getElementById('toast'); if(!t) return alert(msg); t.textContent = msg; t.style.display = 'block'; clearTimeout(t._tm); t._tm = setTimeout(function(){ t.style.display='none'; }, 2800); }
function hubYen(n){ return '¥' + Number(n||0).toLocaleString(); }
(function(){ var a = hubAuth(); var el = document.getElementById('hub-user'); if(el) el.textContent = a.loggedIn ? ('👤 ' + (a.userName||'') + ' / ' + (a.companyName||'')) : '⚠ 本体未ログイン'; })();
// ═════════ 共有ヘルパーここまで ═════════

var COLL = 'artesoCases';          // 本体DB内のコレクション
var LEGACY_COLL = 'calendarOrders';// 旧・実験的取込先

// ── ユーティリティ ──
function fmtNum(n){ return (n===null||n===undefined||n==='') ? '—' : (isNaN(Number(n))?hubEsc(n):Number(n).toLocaleString()); }
function numOrRaw(v){ var s=(v==null?'':String(v)).trim(); if(s==='') return ''; var t=s.replace(/[,\s¥円]/g,''); return /^-?\d+(\.\d+)?$/.test(t)?Number(t):s; }
function yearOf(r){ if(r.orderDate) return Number(String(r.orderDate).slice(0,4)); var m=(r.seikyu||'').match(/(\d{4})年/); if(m) return Number(m[1]); return 0; }
function billed(r){ var s=(r.seikyu||'').trim(); return !!s && s!=='#N/A' && s!=='#REF!'; }
function loadCases(){ var db=hubLoad(); if(!db) return []; return Array.isArray(db[COLL])?db[COLL]:[]; }
function legacyCount(){ var db=hubLoad(); if(!db||!Array.isArray(db[LEGACY_COLL])) return 0; return db[LEGACY_COLL].filter(function(x){return x._batch===LEGACY_BATCH;}).length; }

// ── 状態セレクト用 option ──
(function initStatusFilters(){
  var fs=document.getElementById('fStatus');
  fs.innerHTML='<option value="">全状態</option>'+STATUSES.map(function(s){return '<option>'+s+'</option>';}).join('');
  var msel=document.getElementById('f_status');
  msel.innerHTML=STATUSES.map(function(s){return '<option>'+s+'</option>';}).join('');
})();

function buildYears(){
  var rows=loadCases();
  var ys={}; rows.forEach(function(r){ var y=yearOf(r); if(y) ys[y]=1; });
  var list=Object.keys(ys).map(Number).sort(function(a,b){return b-a;});
  var sel=document.getElementById('yearSel'); var cur=sel.value;
  sel.innerHTML='<option value="">全期間</option>'+list.map(function(y){return '<option value="'+y+'">'+y+'年</option>';}).join('');
  if(cur) sel.value=cur;
}

function resetF(){ document.getElementById('q').value=''; document.getElementById('yearSel').value=''; document.getElementById('fStatus').value=''; document.getElementById('fLink').value=''; render(); }

function render(){
  var rows=loadCases();
  var q=(document.getElementById('q').value||'').trim().toLowerCase();
  var y=document.getElementById('yearSel').value;
  var fs=document.getElementById('fStatus').value;
  var fl=document.getElementById('fLink').value;
  var view=rows.filter(function(r){
    if(y && String(yearOf(r))!==y) return false;
    if(fs && (r.status||'')!==fs) return false;
    if(fl==='1' && !r.gebanUrl) return false;
    if(fl==='0' && r.gebanUrl) return false;
    if(!q) return true;
    return ((r.no||'')+(r.cust||'')+(r.item||'')+(r.detail||'')+(r.biko||'')).toLowerCase().indexOf(q)>=0;
  });
  view.sort(function(a,b){ return String(b.orderDate||'').localeCompare(String(a.orderDate||'')) || String(b.no||'').localeCompare(String(a.no||''),'ja',{numeric:true}); });

  // KPI
  var sumAmt=view.reduce(function(s,r){ var n=Number(r.kingaku); return s+(isNaN(n)?0:n); },0);
  var custs={}; view.forEach(function(r){ if(r.cust) custs[r.cust]=1; });
  var open=view.filter(function(r){ return ['受付','進行中','校了','下版済','印刷中','発送済'].indexOf(r.status)>=0; }).length;
  document.getElementById('kpis').innerHTML=
      kpi('表示件数', view.length+' 件')

    + kpi('全件', rows.length+' 件', '#94a3b8');

  } else {

  tb.innerHTML=shown.map(function(r){
    var id=hubEsc(r._id);

    var link = r.gebanUrl?'<a class="link" href="'+hubEsc(r.gebanUrl)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">📎開く</a>':(r.nyuko?'<span class="muted">'+hubEsc(r.nyuko)+'</span>':'—');

    return '<tr onclick="openEdit(\''+id+'\')">'
      + '<td class="no">'+hubEsc(r.no||'')+'</td>'
      + '<td class="dt">'+hubEsc(r.orderDate||'')+'</td>'
      + '<td class="st">'+stSel+'</td>'
      + '<td>'+badge+'</td>'
      + '<td class="cust">'+hubEsc(r.cust||'')+'</td>'
      + '<td class="item">'+hubEsc(r.item||'')+'</td>'
      + '<td class="num">'+fmtNum(r.qty)+(r.unit?'<span class="muted"> '+hubEsc(r.unit)+'</span>':'')+'</td>'
      + '<td class="amt">'+fmtNum(r.kingaku)+'</td>'
      + '<td onclick="event.stopPropagation()">'+link+'</td>'
      + '<td class="muted">'+hubEsc(r.nouki||'')+'</td>'
      + '<td class="seikyu">'+hubEsc(r.seikyu||'')+'</td>'
      + '<td class="ops" onclick="event.stopPropagation()"><button class="btn btn-sm" onclick="openEdit(\''+id+'\')">✏</button> <button class="btn btn-sm btn-d" onclick="delCase(\''+id+'\')">🗑</button></td>'
      + '</tr>';
  }).join('')+more;
}
function kpi(k,v,color){ return '<div class="kpi"><div class="k">'+k+'</div><div class="v" style="'+(color?'color:'+color:'')+'">'+v+'</div></div>'; }

// ── 状態クイック変更 ──
function quickStatus(id,val){
  if(hubSave(function(db){ var a=db[COLL]||[]; var r=a.find(function(x){return x._id===id;}); if(!r) throw '対象なし'; r.status=val; hubStamp(r); })){ hubToast('状態を「'+val+'」に更新'); render(); }
}

// ── モーダル ──
var editingId=null;
var FIELDS=['no','orderDate','cust','item','detail','qty','unit','tanka','kingaku','newRepeat','status','nyuko','gebanUrl','nouki','seikyu','tkShip','artEta','denpyo','shipNote','biko'];
function fillForm(r){ FIELDS.forEach(function(k){ var el=document.getElementById('f_'+k); if(el) el.value=(r&&r[k]!=null)?r[k]:''; }); }
function openNew(){
  editingId=null;
  document.getElementById('mTitle').textContent='＋ 新規案件';
  document.getElementById('mDel').style.display='none';
  fillForm({ status:'受付', no:nextNo(), orderDate:todayIso() });
  document.getElementById('ov').classList.add('show');
  setTimeout(function(){ document.getElementById('f_cust').focus(); },50);
}
function openEdit(id){
  var r=loadCases().find(function(x){return x._id===id;});
  if(!r){ hubToast('対象が見つかりません'); return; }
  editingId=id;
  document.getElementById('mTitle').textContent='案件編集 ('+(r.no||'')+')';
  document.getElementById('mDel').style.display='';
  fillForm(r);
  document.getElementById('ov').classList.add('show');
}
function closeModal(){ document.getElementById('ov').classList.remove('show'); editingId=null; }
function readForm(){
  var o={}; FIELDS.forEach(function(k){ var el=document.getElementById('f_'+k); o[k]=el?el.value.trim():''; });
  o.qty=numOrRaw(o.qty); o.tanka=numOrRaw(o.tanka); o.kingaku=numOrRaw(o.kingaku);
  return o;
}
function saveForm(){
  var o=readForm();
  if(!o.cust && !o.item){ hubToast('得意先か品名を入力してください'); return; }
  var ok=hubSave(function(db){
    var a=db[COLL]||(db[COLL]=[]);
    if(editingId){
      var r=a.find(function(x){return x._id===editingId;}); if(!r) throw '対象なし';
      FIELDS.forEach(function(k){ r[k]=o[k]; }); hubStamp(r);
    } else {
      o._id='as_'+(o.no||'')+'_'+Math.random().toString(36).slice(2,7);
      o._src='manual'; o._createdAt=new Date().toISOString(); o._updatedAt=o._createdAt;
      a.unshift(o);
    }
  });
  if(ok){ hubToast(editingId?'✅ 保存しました':'✅ 新規案件を追加しました'); closeModal(); buildYears(); render(); }
}
function delFromModal(){ if(editingId) delCase(editingId, true); }
function delCase(id, fromModal){
  var r=loadCases().find(function(x){return x._id===id;}); if(!r){ return; }
  if(!confirm('案件「'+(r.no||'')+' '+(r.cust||'')+' / '+(r.item||'')+'」を削除します。よろしいですか？')) return;
  if(hubSave(function(db){ db[COLL]=(db[COLL]||[]).filter(function(x){return x._id!==id;}); })){ hubToast('🗑 削除しました'); if(fromModal) closeModal(); buildYears(); render(); }
}

function nextNo(){
  var max=0; loadCases().forEach(function(r){ var m=String(r.no||'').match(/AS(\d+)/i); if(m){ var n=Number(m[1]); if(n>max) max=n; } });
  return 'AS'+(max+1);
}
function todayIso(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// ── 初期投入（元シート1122件）──
function seedCaseFromSrc(r){
  return {
    _id:'as_'+r.no, no:r.no, orderDate:r.orderDate||'', cust:r.cust||'', item:r.item||'',
    detail:r.detail||'', qty:(r.qty==null?'':r.qty), unit:r.unit||'',
    tanka:(r.tanka==null?'':r.tanka), kingaku:(r.kingaku==null?'':r.kingaku),
    newRepeat:r.newRepeat||'', status: billed(r)?'請求済':'進行中',
    nyuko:r.nyuko||'', gebanUrl:r.gebanUrl||'', nouki:r.nouki||'', seikyu:r.seikyu||'',
    tkShip:r.tkShip||'', artEta:r.artEta||'', denpyo:r.denpyo||'', shipNote:r.shipNote||'', biko:r.biko||'',
    _src:'seed', _createdAt:new Date().toISOString(), _updatedAt:new Date().toISOString()
  };
}
function seedData(){
  if(!hubLoad()){ hubToast('❌ 先に本体アプリにログインしてください'); return; }
  var cur=loadCases();
  if(cur.length){ if(!confirm('既に '+cur.length+' 件あります。元シート '+ARTESO.length+' 件を入れ直し（既存を消して再投入）しますか？')) return; }
  else { if(!confirm('元シートの '+ARTESO.length+' 件を初期投入します。よろしいですか？')) return; }
  var ok=hubSave(function(db){ db[COLL]=ARTESO.map(seedCaseFromSrc); });
  if(ok){ hubToast('✅ '+ARTESO.length+' 件 投入完了'); buildYears(); render(); }
}
function cleanupLegacy(){
  var n=legacyCount(); if(!n){ hubToast('旧取込はありません'); return; }
  if(!confirm('旧・受注台帳(calendarOrders)へ取り込んだアート・エス分 '+n+' 件を削除します。\n（この専用台帳のデータは消えません）\nよろしいですか？')) return;
  if(hubSave(function(db){ db[LEGACY_COLL]=(db[LEGACY_COLL]||[]).filter(function(x){return x._batch!==LEGACY_BATCH;}); })){ hubToast('🧹 旧取込 '+n+' 件を掃除しました'); render(); }
}

// ── CSV書出（現在の絞り込み結果）──
function exportCsv(){
  var rows=loadCases();
  var q=(document.getElementById('q').value||'').trim().toLowerCase();
  var y=document.getElementById('yearSel').value, fs=document.getElementById('fStatus').value, fl=document.getElementById('fLink').value;
  var view=rows.filter(function(r){
    if(y && String(yearOf(r))!==y) return false;
    if(fs && (r.status||'')!==fs) return false;
    if(fl==='1'&&!r.gebanUrl) return false; if(fl==='0'&&r.gebanUrl) return false;
    if(!q) return true; return ((r.no||'')+(r.cust||'')+(r.item||'')+(r.detail||'')+(r.biko||'')).toLowerCase().indexOf(q)>=0;
  });
  if(!view.length){ hubToast('書き出す行がありません'); return; }
  var head=['No','発注日','状態','区分','得意先','品名','詳細','数量','単位','単価','金額','データ入稿','下版データ','希望納期','請求月','トキワ発送日','アート到着予定','伝票番号','発送備考','備考'];
  var keys=['no','orderDate','status','newRepeat','cust','item','detail','qty','unit','tanka','kingaku','nyuko','gebanUrl','nouki','seikyu','tkShip','artEta','denpyo','shipNote','biko'];
  function esc(v){ v=(v==null?'':String(v)); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
  var csv=head.join(',')+'\n'+view.map(function(r){ return keys.map(function(k){return esc(r[k]);}).join(','); }).join('\n');
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='アート・エス案件_'+todayIso()+'.csv'; a.click();
}

// 起動
document.getElementById('ov').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal(); });
buildYears();
render();
try { var bc=new BroadcastChannel('tokiwa-hub-tools'); bc.onmessage=function(e){ if(e.data&&e.data.type==='db-updated'&&e.data.tool!==HUB_TOOL_ID){ buildYears(); render(); } }; } catch(e){}
</script>
<!-- HUB共通: 最新データに更新するフローティングボタン（自動挿入） -->
<style>
#hubRefreshBtn{position:fixed;right:16px;bottom:16px;z-index:99999;display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;color:#0f172a;background:#fde68a;
  border:1px solid #f59e0b;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.22);cursor:pointer;line-height:1;}
#hubRefreshBtn:hover{background:#fcd34d;}
#hubRefreshBtn:disabled{opacity:.6;cursor:default;}
@media print{#hubRefreshBtn{display:none!important;}}
</style>
<button id="hubRefreshBtn" title="クラウドの最新データに更新します" onclick="hubRefreshNow()">🔄 更新</button>
<script>
function hubRefreshNow(){
  var b=document.getElementById('hubRefreshBtn');
  var reset=function(){ if(b){ b.disabled=false; b.textContent='🔄 更新'; } };
  if(b){ b.disabled=true; b.textContent='⏳ 更新中…'; }
  // 入力中のセルを先に確定(保存)してから取り込む。未確定の入力がクラウドの古い値で消えるのを防ぐ。
  try{ var ae=document.activeElement; if(ae && ae.blur && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) ae.blur(); }catch(e){}
  try{
    // クラウド取込関数を持つツール（カレンダー受注台帳など）は、再読込せず最新だけ取り込む
    if(typeof hubCloudPull==='function'){
      Promise.resolve(hubCloudPull()).then(function(){
        try{ if(typeof _hubCacheClear==='function') _hubCacheClear(); }catch(e){}
        try{ if(typeof buildYears==='function') buildYears(); }catch(e){}
        try{ if(typeof buildCats==='function') buildCats(); }catch(e){}
        try{ if(typeof render==='function') render(); }catch(e){}
        try{ if(typeof hubToast==='function') hubToast('🔄 最新データに更新しました'); }catch(e){}
        reset();
      }).catch(function(){ location.reload(); });
      return;
    }
  }catch(e){}
  // それ以外のページはページごと再読込（本体アプリは再読込でクラウドから取り直す）
  location.reload();
}
</script>
<!-- HUB共通: アプリ自動更新＋更新履歴（自動挿入 hubUpdateKit） -->
<style>
#hubLogBtn{position:fixed;right:16px;bottom:58px;z-index:99999;width:38px;height:38px;border-radius:50%;
  border:1px solid #cbd5e1;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.18);cursor:pointer;font-size:17px;line-height:1;}
#hubLogBtn:hover{background:#f1f5f9;}
#hubLogPanel{position:fixed;right:16px;bottom:104px;z-index:99999;width:min(360px,calc(100vw - 32px));max-height:60vh;overflow:auto;
  background:#fff;border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:12px 14px;display:none;font-size:12px;color:#0f172a;text-align:left;}
#hubLogPanel h3{margin:0 0 8px;font-size:13px;}
#hubLogPanel .d{font-weight:700;margin:10px 0 3px;color:#0369a1;}
#hubLogPanel ul{margin:0 0 4px;padding-left:17px;}
#hubLogPanel li{margin:2px 0;line-height:1.45;}
#hubUpBanner{position:fixed;left:50%;transform:translateX(-50%);top:10px;z-index:100000;display:none;align-items:center;gap:10px;
  background:#0f172a;color:#fff;padding:9px 14px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.35);font-size:13px;}
#hubUpBanner button{font-family:inherit;font-size:12px;font-weight:700;border-radius:7px;border:0;padding:5px 11px;cursor:pointer;background:#fde68a;color:#0f172a;}
@media print{#hubLogBtn,#hubLogPanel,#hubUpBanner{display:none!important;}}
</style>
<button id="hubLogBtn" title="更新履歴を表示" onclick="hubToggleLog()">📋</button>
<div id="hubLogPanel"></div>
<div id="hubUpBanner"><span>🆕 新しい版があります（<b id="hubUpCnt">15</b>秒後に自動更新）</span><button onclick="hubDoUpdate()">今すぐ更新</button><button style="background:#334155;color:#fff" onclick="hubCancelUpdate()">後で</button></div>
<script>
(function(){
  var BASE = location.pathname.indexOf('/tools/')>=0 ? '../' : './';
  // ===== 更新履歴 =====
  window.hubToggleLog=function(){
    var p=document.getElementById('hubLogPanel');
    if(p.style.display==='block'){ p.style.display='none'; return; }
    p.style.display='block'; p.innerHTML='<h3>📋 更新履歴</h3>読み込み中…';
    fetch(BASE+'changelog.json?ts='+Date.now(), {cache:'no-store'}).then(function(r){return r.json();}).then(function(list){
      var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');};
      p.innerHTML='<h3>📋 更新履歴</h3>'+list.map(function(e){
        return '<div class="d">'+esc(e.date)+'</div><ul>'+e.items.map(function(i){return '<li>'+esc(i)+'</li>';}).join('')+'</ul>';
      }).join('');
    }).catch(function(){ p.innerHTML='<h3>📋 更新履歴</h3>取得できませんでした'; });
  };
  // ===== アプリ本体の自動更新 =====
  // service-worker.js の版番号を定期取得し、変わっていたら再読込して新しい版に切り替える。
  var curVer=null, timer=null;
  function fetchVer(){
    return fetch(BASE+'service-worker.js?ts='+Date.now(), {cache:'no-store'})
      .then(function(r){ return r.text(); })
      .then(function(t){ var m=t.match(/CACHE_VERSION\s*=\s*'([^']+)'/); return m?m[1]:null; })
      .catch(function(){ return null; });
  }
  window.hubDoUpdate=function(){ try{ sessionStorage.setItem('hubJustUpdated','1'); }catch(e){} location.reload(); };
  window.hubCancelUpdate=function(){ if(timer){ clearInterval(timer); timer=null; } var b=document.getElementById('hubUpBanner'); if(b) b.style.display='none'; };
  function showBanner(){
    var b=document.getElementById('hubUpBanner'); if(!b || b.style.display==='flex') return;
    b.style.display='flex';
    var n=15, c=document.getElementById('hubUpCnt'); c.textContent=n;
    timer=setInterval(function(){
      var ae=document.activeElement;
      if(ae && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) return;   // 入力中はカウントを止める
      n--; c.textContent=n;
      if(n<=0){ clearInterval(timer); hubDoUpdate(); }
    }, 1000);
  }
  function check(){
    fetchVer().then(function(v){
      if(!v) return;
      if(curVer===null){ curVer=v; return; }
      if(v===curVer) return;
      // 新しい版を検知: 非表示タブは即時、表示中はバナー＋カウントダウンで自動更新
      if(document.hidden){ hubDoUpdate(); } else { showBanner(); }
    });
  }
  fetchVer().then(function(v){ curVer=v; });
  setInterval(check, 180000);   // 3分ごとに版を確認
  window.addEventListener('focus', check);
  try{ if(sessionStorage.getItem('hubJustUpdated')){ sessionStorage.removeItem('hubJustUpdated'); } }catch(e){}
})();
</script>
