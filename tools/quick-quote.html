<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚡ 見積クイック発行 | Tokiwa Hub Tools</title>
<style>
  :root{ --lime:#84cc16; --ink:#1a1a1a; --line:#e0ddd6; --bg:#f4f3f0; --cyan:#0891b2; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:var(--bg); color:var(--ink); }
  header{ background:#1a1a1a; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; }
  header .logo{ font-weight:800; letter-spacing:.04em; font-size:14px; }
  header .logo b{ color:#a3e635; }
  header .tname{ font-size:16px; font-weight:800; }
  header .user{ margin-left:auto; font-size:11px; color:#cbd5e1; }
  main{ max-width:820px; margin:18px auto; padding:0 14px; }
  .sec{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:.9rem 1.1rem; margin-bottom:.7rem; }
  .st{ font-size:10px; font-weight:700; color:#999; letter-spacing:.1em; margin-bottom:.5rem; text-transform:uppercase; }
  label{ font-size:11px; color:#888; display:block; margin-bottom:2px; }
  input,select{ width:100%; padding:8px 10px; border:1px solid #d0cec8; border-radius:6px; font-size:14px; font-family:inherit; background:#fff; }
  input:focus,select:focus{ outline:none; border-color:#1a1a1a; }
  .btn{ padding:10px 18px; border:1px solid #d0cec8; border-radius:7px; background:#fff; cursor:pointer; font-size:14px; font-family:inherit; font-weight:700; }
  .btn-p{ background:var(--cyan); border-color:var(--cyan); color:#fff; }
  .btn:active{ transform:translateY(1px); }
  .muted{ font-size:11px; color:#94a3b8; }
  .pat{ border:1px solid var(--line); border-radius:8px; padding:9px 12px; margin-bottom:6px; cursor:pointer; display:flex; gap:10px; align-items:center; background:#fff; }
  .pat:hover{ border-color:var(--cyan); background:#f0fdff; }
  .pat.sel{ border:2px solid var(--cyan); background:#ecfeff; }
  .pat .nm{ font-weight:800; font-size:14px; }
  .pat .sp{ font-size:11px; color:#888; margin-top:1px; }
  .pat .pr{ margin-left:auto; text-align:right; font-size:12px; white-space:nowrap; }
  .pat .pr b{ font-size:14px; }
  .row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .total{ background:#1a1a1a; color:#fff; border-radius:8px; padding:12px 16px; display:flex; align-items:center; gap:16px; margin-top:10px; }
  .total .tv{ font-size:24px; font-weight:800; margin-left:auto; }
  #toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:9px 18px; border-radius:8px; font-size:13px; display:none; z-index:99; }
  #done{ display:none; }
</style>
</head>
<body>
<header>
  <span class="logo">TOKIWA <b>HUB</b> 🧰</span>
  <span class="tname">⚡ 見積クイック発行</span>
  <span class="user" id="hub-user"></span>
</header>
<main>
  <div class="sec">
    <div class="st">① 得意先を選ぶ</div>
    <input id="cust" list="cust-dl" placeholder="得意先名を入力または選択" autocomplete="off">
    <datalist id="cust-dl"></datalist>
  </div>

  <div class="sec">
    <div class="st">② 過去パターンをタップ（この得意先の実績から）</div>
    <div id="pats"><div class="muted">得意先を選ぶと、過去の見積・実績パターンが出ます</div></div>
  </div>

  <div class="sec">
    <div class="st">③ 数量・単価を確認 → 発行</div>
    <div class="row">
      <div><label>品名</label><input id="item" placeholder="品名"></div>
      <div><label>数量</label><input id="qty" type="number" min="1" placeholder="1000"></div>
      <div><label>単価 (円)</label><input id="unitp" type="number" step="0.01" placeholder="12.5"></div>
    </div>
    <div class="row" style="margin-top:8px">
      <div><label>単位</label><select id="unit"><option>枚</option><option>部</option><option>冊</option><option>セット</option><option>束</option><option>箱</option><option>式</option></select></div>
      <div style="grid-column:span 2"><label>仕様（見積書記載用）</label><input id="spec" placeholder="例: A4 / 上質70K / 両面1C"></div>
    </div>
    <div class="total">
      <span style="font-size:12px;color:#a3e635;font-weight:700">税抜金額</span>
      <span class="muted" id="calc-detail" style="color:#94a3b8"></span>
      <span class="tv" id="extax">¥0</span>
    </div>
    <div style="display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-p" style="font-size:15px" onclick="issueQuote()">🔵 見積中として登録</button>
      <span class="muted">→ 本体の案件管理「🔵見積中」に入ります。正式な見積書PDFは本体で発行できます。</span>
    </div>
  </div>

  <div class="sec" id="done" style="background:#f0fdf4;border-color:#86efac">
    <div id="done-msg" style="font-size:14px;font-weight:700;color:#166534"></div>
    <div style="margin-top:8px;display:flex;gap:8px">
      <button class="btn" onclick="resetForm()">⚡ 続けて次の見積</button>
    </div>
  </div>

  <p class="muted">💾 保存先は本体データ（このブラウザ）。本体アプリを開くと自動でクラウド同期・日次バックアップされます。</p>
</main>
<div id="toast"></div>

<script>
// ═════════ Tokiwa Hub 共有ヘルパー ═════════
var HUB_DBKEY = 'murayama_v15';
var HUB_AUTHKEY = 'murayama_auth';
var HUB_TOOL_ID = 'quick-quote';
function hubLoad(){ try { return JSON.parse(localStorage.getItem(HUB_DBKEY)) || null; } catch(e){ return null; } }
function hubAuth(){ try { return JSON.parse(localStorage.getItem(HUB_AUTHKEY)) || {}; } catch(e){ return {}; } }
function hubSave(mutator){
  var db = hubLoad();
  if(!db){ hubToast('❌ 本体データが見つかりません。先に本体アプリへログインしてください'); return false; }
  try { mutator(db); } catch(e){ hubToast('❌ 変更失敗: ' + e); return false; }
  try { localStorage.setItem(HUB_DBKEY, JSON.stringify(db)); } catch(e){ hubToast('❌ 保存失敗: ' + e); return false; }
  try { new BroadcastChannel('tokiwa-hub-tools').postMessage({ type:'db-updated', tool: HUB_TOOL_ID }); } catch(e){}
  return true;
}
function hubEsc(s){ s=(s==null?'':String(s)); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hubToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._tm); t._tm=setTimeout(function(){t.style.display='none';},2600); }
function hubYen(n){ return '¥' + Number(n||0).toLocaleString(); }
(function(){ var a=hubAuth(); document.getElementById('hub-user').textContent = a.loggedIn ? ('👤 '+(a.userName||'')+' / '+(a.companyName||'')) : '⚠ 本体未ログイン'; })();
// ═════════ ここからツール本体 ═════════

var DBS = hubLoad();
var selPat = null;

// 得意先候補: history + estimates + projects から重複なしで
(function initCust(){
  if(!DBS){ document.getElementById('pats').innerHTML = '<div class="muted">⚠ 本体データ無し。先に本体アプリへログインしてください。</div>'; return; }
  var set = {};
  (DBS.history||[]).forEach(function(r){ if(r.cust) set[r.cust]=1; });
  (DBS.estimates||[]).forEach(function(r){ if(r.cust) set[r.cust]=1; });
  (DBS.projects||[]).forEach(function(r){ if(r.cust) set[r.cust]=1; });
  document.getElementById('cust-dl').innerHTML = Object.keys(set).sort().map(function(c){ return '<option value="' + hubEsc(c) + '">'; }).join('');
})();

document.getElementById('cust').addEventListener('change', renderPats);
document.getElementById('cust').addEventListener('input', function(e){ if(!e.target.value) renderPats(); });
['qty','unitp'].forEach(function(id){ document.getElementById(id).addEventListener('input', calc); });

function renderPats(){
  DBS = hubLoad(); // 常に最新を読む
  var cust = document.getElementById('cust').value.trim();
  var box = document.getElementById('pats');
  selPat = null;
  if(!cust){ box.innerHTML = '<div class="muted">得意先を選ぶと、過去の見積・実績パターンが出ます</div>'; return; }
  // history (実績) + estimates (見積) からこの得意先の明細を新しい順で集め、品名+仕様で重複排除
  var rows = [];
  (DBS.history||[]).slice().reverse().forEach(function(r){
    if((r.cust||'') !== cust) return;
    rows.push({ item:r.item||'', spec:r.spec||'', qty:r.qty||0, unit:r.unit||'枚', unitp:(r.unitp!=null?r.unitp:(r.qty?Math.round((r.exTax||0)/r.qty*100)/100:0)), exTax:r.exTax||0, src:'実績', date:r.date||'' });
  });
  (DBS.estimates||[]).slice().reverse().forEach(function(r){
    if((r.cust||'') !== cust) return;
    rows.push({ item:r.item||'', spec:r.spec||'', qty:r.qty||0, unit:r.unit||'枚', unitp:(r.qty?Math.round((r.exTax||0)/r.qty*100)/100:0), exTax:r.exTax||0, src:'見積', date:(r.createdAt||'').slice(0,10) });
  });
  var seen = {}, uniq = [];
  rows.forEach(function(r){
    var k = r.item + '|' + r.spec;
    if(seen[k]) return; seen[k] = 1; uniq.push(r);
  });
  if(!uniq.length){ box.innerHTML = '<div class="muted">この得意先の過去パターンはありません。③に直接入力してください。</div>'; return; }
  box.innerHTML = uniq.slice(0, 12).map(function(r, i){
    return '<div class="pat" data-i="' + i + '" onclick="pickPat(' + i + ')">'
      + '<div><div class="nm">' + hubEsc(r.item) + '</div><div class="sp">' + hubEsc((r.spec||'').slice(0,46)) + (r.date ? ' ・ ' + hubEsc(r.date) : '') + ' ・ ' + r.src + '</div></div>'
      + '<div class="pr">' + Number(r.qty).toLocaleString() + hubEsc(r.unit) + ' × ' + (r.unitp||'—') + '円<br><b>' + hubYen(r.exTax) + '</b></div>'
      + '</div>';
  }).join('');
  window._pats = uniq.slice(0, 12);
}

function pickPat(i){
  selPat = window._pats[i];
  document.querySelectorAll('.pat').forEach(function(p){ p.classList.toggle('sel', p.dataset.i == i); });
  document.getElementById('item').value = selPat.item;
  document.getElementById('spec').value = selPat.spec;
  document.getElementById('qty').value = selPat.qty || '';
  document.getElementById('unit').value = selPat.unit || '枚';
  document.getElementById('unitp').value = selPat.unitp || '';
  calc();
  document.getElementById('qty').focus();
  document.getElementById('qty').select();
}

function calc(){
  var q = parseFloat(document.getElementById('qty').value) || 0;
  var u = parseFloat(document.getElementById('unitp').value) || 0;
  var ex = Math.round(q * u);
  document.getElementById('extax').textContent = hubYen(ex);
  document.getElementById('calc-detail').textContent = q && u ? (Number(q).toLocaleString() + ' × ' + u + '円') : '';
}

function issueQuote(){
  var auth = hubAuth();
  if(!auth.loggedIn){ hubToast('⚠ 本体アプリで先にログインしてください'); return; }
  var cust = document.getElementById('cust').value.trim();
  var item = document.getElementById('item').value.trim();
  var qty  = parseFloat(document.getElementById('qty').value) || 0;
  var unitp= parseFloat(document.getElementById('unitp').value) || 0;
  var unit = document.getElementById('unit').value;
  var spec = document.getElementById('spec').value.trim();
  if(!cust || !item){ hubToast('得意先と品名を入れてください'); return; }
  if(!qty || !unitp){ hubToast('数量と単価を入れてください'); return; }
  var exTax = Math.round(qty * unitp);
  var est = {
    id: 'EST-' + Date.now(),
    companyId: auth.companyId || 'COMP001',
    companyCode: auth.companyCode || '',
    cust: cust, item: item, spec: spec, endUser: '',
    qty: qty, unit: unit, exTax: exTax,
    estCost: 0,
    status: 'sent',
    source: 'quick-tool',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    createdBy: auth.userName || ''
  };
  if(!hubSave(function(db){ if(!Array.isArray(db.estimates)) db.estimates = []; db.estimates.push(est); })) return;
  document.getElementById('done').style.display = 'block';
  document.getElementById('done-msg').textContent = '✅ 発行しました: ' + cust + ' / ' + item + ' / ' + Number(qty).toLocaleString() + unit + ' / ' + hubYen(exTax) + '（' + est.id + '）';
  hubToast('✅ 見積中として登録しました');
  window.scrollTo(0, document.body.scrollHeight);
}

function resetForm(){
  ['item','qty','unitp','spec'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('done').style.display='none';
  document.getElementById('extax').textContent='¥0';
  selPat=null; renderPats();
  document.getElementById('cust').focus();
}
</script>
</body>
</html>
