<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配送ラベル作成 | Tokiwa Hub Tools</title>
<style>
  :root{ --ink:#1a1a1a; --line:#d0cec8; --cyan:#0891b2; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; color:#1a1a1a; background:#f4f3f0; font-size:13px; }
  header{ background:#1a1a1a; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; }
  header h1{ font-size:15px; margin:0; letter-spacing:.08em; }
  header a{ color:#9ca3af; font-size:12px; text-decoration:none; }
  main{ max-width:1080px; margin:0 auto; padding:16px; display:grid; grid-template-columns:340px 1fr; gap:16px; align-items:start; }
  .panel{ background:#fff; border:1.5px solid #1a1a1a; border-radius:12px; padding:16px; }
  .panel h2{ font-size:13px; margin:0 0 12px; letter-spacing:.06em; }
  label{ display:block; font-size:12px; color:#334155; margin:10px 0 3px; font-weight:700; }
  input[type=text], input[type=number]{ width:100%; padding:7px 9px; font-size:14px; border:1px solid #cbd5e1; border-radius:7px; font-family:inherit; }
  input:focus{ outline:none; border-color:var(--cyan); }
  .row{ display:flex; gap:10px; }
  .row > div{ flex:1; }
  .btn{ border:1px solid var(--line); border-radius:8px; background:#fff; cursor:pointer; font-size:13px; padding:8px 14px; font-family:inherit; font-weight:700; }
  .btn:hover{ background:#f1f5f9; }
  .btn.primary{ background:var(--cyan); border-color:var(--cyan); color:#fff; }
  .btn.primary:hover{ background:#0e7490; }
  .hint{ font-size:11px; color:#64748b; margin-top:4px; line-height:1.5; }
  .chip{ display:inline-block; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:10px; padding:1px 8px; font-size:11px; color:#475569; margin:2px 2px 0 0; cursor:pointer; }
  .chip:hover{ background:#e0f2fe; }
  /* プレビュー */
  .pv{ background:#fff; border:1.5px solid #1a1a1a; border-radius:12px; padding:12px; overflow:auto; }
  .pv h2{ font-size:13px; margin:0 0 8px; }
  .sheet{ background:#fff; box-shadow:0 2px 14px rgba(0,0,0,.18); transform-origin:top left; position:relative; overflow:hidden; }
  .pvwrap{ overflow:hidden; }
  .lblpage{ position:relative; overflow:hidden; background:#fff; }
  .lblcell{ position:absolute; box-sizing:border-box; padding:1mm 2mm; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; text-align:left; overflow:hidden; border:0.3pt dashed #bbb; }
  .lblcell.noguide{ border-color:transparent; }
  .lrow{ white-space:nowrap; overflow:hidden; line-height:1.25; display:flex; align-items:baseline; gap:1.2mm; max-width:100%; }
  .lrow.wrap{ white-space:normal; }
  .lrow.wrap .lv{ overflow-wrap:break-word; word-break:break-word; min-width:0; }
  .lk{ color:#555; font-size:.7em; flex:0 0 auto; }
  .lv{ font-weight:700; }
  .lv.plain{ font-weight:400; }
  /* 印刷 */
  #printArea{ display:none; }
  @media print{
    body > *{ display:none !important; }
    #printArea{ display:block !important; }
    html, body{ background:#fff !important; margin:0; padding:0; }
    .lblcell{ border-color:transparent !important; }   /* 印刷には線を出さない(台紙に線があるため) */
  }
  #toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:9px 18px; border-radius:8px; font-size:13px; display:none; z-index:99; }
</style>
</head>
<body>
<header>
  <h1>🏷 配送ラベル作成</h1>
  <a href="../index.html">← TOKIWA HUB</a>
  <span id="hub-user" style="margin-left:auto;font-size:11px;color:#9ca3af"></span>
</header>
<main>
  <div class="panel">
    <h2>台紙（用紙）</h2>
    <div class="row">
      <div style="flex:2">
        <label>登録済みの台紙</label>
        <select id="p-sel" style="width:100%;padding:7px 8px;font-size:13px;border:1px solid #cbd5e1;border-radius:7px;font-family:inherit" onchange="applyPreset(this.value)"></select>
      </div>
      <div style="flex:0 0 auto;display:flex;align-items:flex-end;gap:6px">
        <button class="btn" style="padding:7px 10px" title="現在の台紙設定に名前を付けて登録" onclick="savePreset()">💾 登録</button>
        <button class="btn" style="padding:7px 10px;color:#c0261c" title="選択中の登録台紙を削除" onclick="deletePreset()">🗑</button>
      </div>
    </div>
    <div class="row" style="margin-top:6px">
      <div><label>台紙 幅(mm)</label><input type="number" id="s-pw" step="0.1" value="297"></div>
      <div><label>台紙 高さ(mm)</label><input type="number" id="s-ph" step="0.1" value="210"></div>
    </div>
    <div class="row">
      <div><label>ラベル 幅(mm)</label><input type="number" id="s-lw" step="0.05" value="59.4"></div>
      <div><label>ラベル 高さ(mm)</label><input type="number" id="s-lh" step="0.05" value="26.25"></div>
    </div>
    <div class="row">
      <div><label>列数</label><input type="number" id="s-cols" min="1" max="20" value="5"></div>
      <div><label>行数</label><input type="number" id="s-rows" min="1" max="30" value="8"></div>
    </div>
    <div class="row">
      <div><label>上余白(mm)</label><input type="number" id="s-mt" step="0.1" value="0"></div>
      <div><label>左余白(mm)</label><input type="number" id="s-ml" step="0.1" value="0"></div>
    </div>
    <div class="row">
      <div><label>横の間隔(mm)</label><input type="number" id="s-gx" step="0.1" value="0"></div>
      <div><label>縦の間隔(mm)</label><input type="number" id="s-gy" step="0.1" value="0"></div>
    </div>
    <div class="hint" id="s-check"></div>
    <hr style="border:none;border-top:1px solid #e2e8f0;margin:14px 0">
    <h2>ラベル内容</h2>
    <label>顧客名（届け先）</label>
    <input type="text" id="f-cust" list="custMaster" autocomplete="off" placeholder="入力すると得意先マスタから候補が出ます">
    <datalist id="custMaster"></datalist>
    <label>品名（任意）</label>
    <input type="text" id="f-item" autocomplete="off" placeholder="例: 2027年カレンダー NK199">
    <div class="row">
      <div>
        <label>総数</label>
        <input type="text" id="f-total" autocomplete="off" placeholder="例: 1500枚">
      </div>
      <div>
        <label>数量（1箱あたり）</label>
        <input type="text" id="f-qty" autocomplete="off" placeholder="例: 500枚">
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <div>
        <label>箱数</label>
        <input type="number" id="f-pkgs" min="1" max="200" value="1" oninput="this.dataset.manual=1" title="総数と数量(1箱あたり)を入れると自動計算します。手で直すと自動計算は止まります">
      </div>
      <div>
        <label>各箱のラベル枚数</label>
        <input type="number" id="f-copies" min="1" max="600" value="1">
      </div>
    </div>
    <div class="hint">箱数を入れると「1/3・2/3・3/3」の連番ラベルをその枚数分作ります。</div>
    <div class="row" style="margin-top:8px">
      <div>
        <label>開始位置</label>
        <input type="number" id="f-start" min="1" max="600" value="1" title="使いかけのラベルシートの続きから印刷できます">
      </div>
      <div>
        <label>文字サイズ(pt)</label>
        <input type="number" id="f-font" min="6" max="40" step="0.5" value="11">
      </div>
    </div>
    <label style="display:flex;align-items:center;gap:6px;margin-top:12px;font-weight:400">
      <input type="checkbox" id="f-nototal"> 総数・総箱数を表記しない（数量 500枚／箱数 1 の形）
    </label>

    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn" onclick="renderPreview()">🔄 プレビュー更新</button>
      <button class="btn primary" onclick="doPrint()">🖨 印刷</button>
    </div>
    <div class="hint" style="margin-top:10px" id="layout-hint"></div>
    <div id="recent" style="margin-top:12px"></div>
  </div>
  <div class="pv">
    <h2>プレビュー <span id="pvinfo" style="font-weight:400;color:#64748b;font-size:11px"></span></h2>
    <div class="pvwrap"><div class="sheet" id="pvsheet"></div></div>
  </div>
</main>
<div id="printArea"></div>
<div id="toast"></div>
<script>
var HUB_DBKEY='murayama_v15';
function hubLoad(){ try{ return JSON.parse(localStorage.getItem(HUB_DBKEY))||null; }catch(e){ return null; } }
function hubAuth(){ try{ return JSON.parse(localStorage.getItem('murayama_auth'))||{}; }catch(e){ return {}; } }
function hubEsc(s){ s=(s==null?'':String(s)); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hubToast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._tm); t._tm=setTimeout(function(){ t.style.display='none'; },2500); }

// 顧客名: 本体HUBの得意先マスタ(db.master.cust)＋カレンダー台帳の得意先から候補を作る
function buildCustMaster(){
  var db=hubLoad(); var set={};
  if(db && db.master && Array.isArray(db.master.cust)){
    db.master.cust.forEach(function(c){ var n=(typeof c==='string'?c:(c&&c.org||'')).trim(); if(n) set[n]=1; });
  }
  if(db && Array.isArray(db.calendarOrders)){
    db.calendarOrders.forEach(function(r){ var n=String(r&&r.cust||'').trim(); if(n) set[n]=1; });
  }
  var list=Object.keys(set).sort(function(a,b){ return a.localeCompare(b,'ja'); });
  document.getElementById('custMaster').innerHTML=list.map(function(n){ return '<option value="'+hubEsc(n)+'">'; }).join('');
  return list.length;
}

// ===== 台紙(用紙)設定とプリセット =====
var SHEET_FIELDS=[['s-pw','pw'],['s-ph','ph'],['s-lw','lw'],['s-lh','lh'],['s-cols','cols'],['s-rows','rows'],['s-mt','mt'],['s-ml','ml'],['s-gx','gx'],['s-gy','gy']];
var BUILTIN_PRESETS=[
  { name:'A4横 40面（59.4×26.25）', pw:297, ph:210, lw:59.4, lh:26.25, cols:5, rows:8, mt:0, ml:0, gx:0, gy:0 }
];
var PRESETKEY='labelmaker_presets_v1';
function loadPresets(){ try{ return JSON.parse(localStorage.getItem(PRESETKEY))||[]; }catch(e){ return []; } }
function readSheet(){
  var o={};
  SHEET_FIELDS.forEach(function(f){ o[f[1]]=parseFloat(document.getElementById(f[0]).value)||0; });
  o.cols=Math.max(1,Math.min(20,Math.round(o.cols)||1));
  o.rows=Math.max(1,Math.min(30,Math.round(o.rows)||1));
  return o;
}
function writeSheet(o){ SHEET_FIELDS.forEach(function(f){ if(o[f[1]]!=null) document.getElementById(f[0]).value=o[f[1]]; }); }
function perPage(){ var sh=readSheet(); return sh.cols*sh.rows; }
function renderPresetSel(selName){
  var sel=document.getElementById('p-sel');
  var opts=BUILTIN_PRESETS.map(function(p,i){ return '<option value="b'+i+'">'+hubEsc(p.name)+'</option>'; })
    .concat(loadPresets().map(function(p,i){ return '<option value="u'+i+'">'+hubEsc(p.name)+(p.memo?('｜'+hubEsc(p.memo)):'')+'</option>'; }));
  sel.innerHTML=opts.join('');
  if(selName!=null) sel.value=selName;
}
function applyPreset(v){
  var p = v.charAt(0)==='b' ? BUILTIN_PRESETS[+v.slice(1)] : loadPresets()[+v.slice(1)];
  if(!p) return;
  writeSheet(p);
  renderPreview();
}
// 台紙名は寸法から自動生成(既定と同じ形式)。用途は備考として付ける。
function autoPresetName(sh){
  var ori = sh.pw>=sh.ph ? 'A4横' : 'A4縦';
  if(!((sh.pw===297&&sh.ph===210)||(sh.pw===210&&sh.ph===297))) ori=sh.pw+'×'+sh.ph+'mm';
  return ori+' '+(sh.cols*sh.rows)+'面（'+sh.lw+'×'+sh.lh+'）';
}
function savePreset(){
  var o=readSheet();
  var name=autoPresetName(o);
  var memo=prompt('この台紙の用途・備考（例: カレンダー配送用・A-ONE 72324）\n台紙名は自動で「'+name+'」になります');
  if(memo===null) return;
  o.name=name; o.memo=memo.trim();
  var list=loadPresets().filter(function(p){ return p.name!==name; });   // 同寸法は上書き
  list.push(o);
  try{ localStorage.setItem(PRESETKEY, JSON.stringify(list)); }catch(e){}
  renderPresetSel('u'+(list.length-1));
  hubToast('💾 台紙「'+name+'」を登録しました'+(o.memo?('（'+o.memo+'）'):''));
}
function deletePreset(){
  var v=document.getElementById('p-sel').value;
  if(v.charAt(0)!=='u'){ hubToast('登録した台紙のみ削除できます（既定は削除不可）'); return; }
  var list=loadPresets(); var p=list[+v.slice(1)];
  if(!p || !confirm('台紙「'+p.name+'」を削除しますか？')) return;
  list.splice(+v.slice(1),1);
  try{ localStorage.setItem(PRESETKEY, JSON.stringify(list)); }catch(e){}
  renderPresetSel('b0'); applyPreset('b0');
  hubToast('🗑 削除しました');
}
function sheetCheck(){
  var sh=readSheet();
  var needW=sh.ml + sh.cols*sh.lw + (sh.cols-1)*sh.gx;
  var needH=sh.mt + sh.rows*sh.lh + (sh.rows-1)*sh.gy;
  var el=document.getElementById('s-check');
  var msg=sh.cols+'列 × '+sh.rows+'行 ＝ <b>'+(sh.cols*sh.rows)+'面</b>／必要領域 '+needW.toFixed(1)+'×'+needH.toFixed(1)+'mm';
  if(needW>sh.pw+0.05 || needH>sh.ph+0.05){
    el.innerHTML='⚠ '+msg+' — <span style="color:#c0261c">台紙('+sh.pw+'×'+sh.ph+'mm)からはみ出します</span>';
  } else {
    el.innerHTML=msg+'（台紙 '+sh.pw+'×'+sh.ph+'mm に収まっています）';
  }
}
// 履歴(この端末): 最近使った内容をワンタップで呼び出し
var HISTKEY='labelmaker_hist_v1';
function loadHist(){ try{ return JSON.parse(localStorage.getItem(HISTKEY))||[]; }catch(e){ return []; } }
function saveHist(o){
  try{
    var h=loadHist().filter(function(x){ return !(x.cust===o.cust && x.item===o.item); });
    h.unshift(o); h=h.slice(0,8);
    localStorage.setItem(HISTKEY, JSON.stringify(h));
  }catch(e){}
  renderHist();
}
function renderHist(){
  var h=loadHist(); var el=document.getElementById('recent');
  el.innerHTML=h.length?('<label style="margin-top:0">最近使ったラベル</label>'+h.map(function(x,i){
    return '<span class="chip" onclick="useHist('+i+')">'+hubEsc(x.cust||'')+(x.item?('｜'+hubEsc(x.item)):'')+'</span>';
  }).join('')):'';
}
function useHist(i){
  var x=loadHist()[i]; if(!x) return;
  document.getElementById('f-cust').value=x.cust||'';
  document.getElementById('f-item').value=x.item||'';
  document.getElementById('f-total').value=x.total||'';
  document.getElementById('f-qty').value=x.qty||'';
  document.getElementById('f-pkgs').value=x.pkgs||1;
  renderPreview();
}

function readForm(){
  return {
    cust:document.getElementById('f-cust').value.trim(),
    item:document.getElementById('f-item').value.trim(),
    total:document.getElementById('f-total').value.trim(),
    qty:document.getElementById('f-qty').value.trim(),
    pkgs:Math.max(1,Math.min(200,parseInt(document.getElementById('f-pkgs').value)||1)),
    copies:Math.max(1,Math.min(40,parseInt(document.getElementById('f-copies').value)||1)),
    start:Math.max(1,Math.min(40,parseInt(document.getElementById('f-start').value)||1)),
    guide:false,   // 切り取り線は印刷しない(台紙に線があるため)
    noTotal:document.getElementById('f-nototal').checked,
    fontSize:Math.max(6,Math.min(40,parseFloat(document.getElementById('f-font').value)||11))
  };
}
// ── 文字幅を測って「変な位置で改行させず、収まらない行だけ縮小」する ──
var _mctx=null;
function _measure(text, fs){
  if(!_mctx){ _mctx=document.createElement('canvas').getContext('2d'); }
  _mctx.font='700 '+fs+'pt "Yu Gothic","Hiragino Kaku Gothic ProN","Meiryo",sans-serif';
  return _mctx.measureText(text).width;
}
// ラベル内側の幅(px)に収まる最大フォント(pt)。userFs を上限に 0.5pt 刻みで縮小(最低6pt)
function fitFs(text, userFs, innerPx){
  var fs=userFs;
  while(fs>8 && _measure(text, fs)>innerPx){ fs-=0.5; }   // まず縮小で1行に収める(下限8pt)
  return fs;
}
// ラベル1枚のHTML(項目名つき・各行1行固定)。n=箱番号
function labelCell(o, n){
  var sh=readSheet();
  // 端のセルは印字不能域のぶん内側の幅が狭い。全セル同じ文字サイズになるよう最悪(端)ケースで測る
  var padL=Math.max(2, UNPRINT-sh.ml);
  var rightGap=sh.pw-(sh.ml + sh.cols*sh.lw + (sh.cols-1)*sh.gx);
  var padR=Math.max(2, UNPRINT-rightGap);
  var innerPx=(sh.lw-padL-padR)*3.7795 - 2;
  var fs=o.fontSize||11;
  var rows=[];
  function row(label, value, plain){
    if(!value) return;
    // 項目名(0.7em)ぶんも含めて幅を測る
    var probe=label+'　'+value;
    var f=fitFs(probe, fs, innerPx);
    var over=_measure(probe, f)>innerPx;   // 8ptでも収まらない極端な長文だけ折り返す
    rows.push('<div class="lrow'+(over?' wrap':'')+'" style="font-size:'+f+'pt"><span class="lk">'+hubEsc(label)+'</span><span class="lv'+(plain?' plain':'')+'">'+hubEsc(value)+'</span></div>');
  }
  row('得意先名', o.cust||'');
  row('品名', o.item||'', true);
  // 数量は「1箱あたり/総数」の1行表記。総数が未記入 or 表記不要なら「/総数」は付けない
  var qv = (o.qty && o.total && !o.noTotal) ? (o.qty+'/'+o.total) : (o.qty || (o.noTotal?'':o.total) || '');
  row('数量', qv, true);
  if(o.pkgs>1) row('箱数', o.noTotal ? String(n) : (n+'/'+o.pkgs));
  return rows.join('');
}
// 面付け: 開始位置から (個口1..N × 各copies枚) を順に配置。40面を超えたら次ページ。
function buildSheets(o){
  var N=perPage();
  var labels=[];
  for(var n=1;n<=o.pkgs;n++){ for(var c=0;c<o.copies;c++) labels.push(labelCell(o,n)); }
  var sheets=[]; var pos=Math.min(o.start,N)-1;   // 0-based
  var cur=new Array(N).fill('');
  labels.forEach(function(html){
    if(pos>=N){ sheets.push(cur); cur=new Array(N).fill(''); pos=0; }
    cur[pos++]=html;
  });
  sheets.push(cur);
  return sheets;
}
var UNPRINT=5;   // プリンタの印字不能域(用紙の四方, mm)
function sheetTable(cells, guide){
  var sh=readSheet();
  var h='<div class="lblpage" style="width:'+sh.pw+'mm;height:'+sh.ph+'mm">';
  for(var r=0;r<sh.rows;r++){
    for(var c=0;c<sh.cols;c++){
      var left=sh.ml + c*(sh.lw+sh.gx);
      var top =sh.mt + r*(sh.lh+sh.gy);
      // 用紙端にかかるセルは、印字不能域ぶん内側に余白を足す(ラベル位置は動かさない)
      var padL=Math.max(2, UNPRINT-left);
      var padR=Math.max(2, UNPRINT-(sh.pw-(left+sh.lw)));
      var padT=Math.max(1, UNPRINT-top);
      var padB=Math.max(1, UNPRINT-(sh.ph-(top+sh.lh)));
      h+='<div class="lblcell'+(guide?'':' noguide')+'" style="left:'+left+'mm;top:'+top+'mm;width:'+sh.lw+'mm;height:'+sh.lh+'mm;padding:'+padT+'mm '+padR+'mm '+padB+'mm '+padL+'mm">'+(cells[r*sh.cols+c]||'')+'</div>';
    }
  }
  return h+'</div>';
}
function renderPreview(){
  var o=readForm(); var sh=readSheet();
  try{ localStorage.setItem('labelmaker_font_v1', document.getElementById('f-font').value||'11'); }catch(e){}
  sheetCheck();
  var sheets=buildSheets(o);
  var pv=document.getElementById('pvsheet');
  pv.innerHTML=sheetTable(sheets[0], o.guide);
  var scale=Math.min(0.62, 620/(sh.pw*3.7795));
  pv.style.width=sh.pw+'mm'; pv.style.height=sh.ph+'mm';
  pv.style.transform='scale('+scale+')';
  var wrap=pv.parentElement;
  wrap.style.width=(sh.pw*3.7795*scale+10)+'px';
  wrap.style.height=(sh.ph*3.7795*scale+10)+'px';
  var total=o.pkgs*o.copies;
  document.getElementById('pvinfo').textContent='｜ ラベル'+total+'枚 ／ '+sheets.length+'ページ（1ページ目を表示）';
  document.getElementById('layout-hint').innerHTML='台紙 '+sh.pw+'×'+sh.ph+'mm ／ '+sh.cols+'列×'+sh.rows+'行＝'+perPage()+'面 ／ 1面 '+sh.lw+'×'+sh.lh+'mm。'+perPage()+'枚を超えると自動で複数ページ。';
  var st=document.getElementById('page-style');
  if(!st){ st=document.createElement('style'); st.id='page-style'; document.head.appendChild(st); }
  st.textContent='@media print{ @page{ size:'+sh.pw+'mm '+sh.ph+'mm; margin:0; } }';
}
function doPrint(){
  var o=readForm();
  if(!o.cust){ hubToast('顧客名を入力してください'); return; }
  var sheets=buildSheets(o);
  var sh=readSheet();
  document.getElementById('printArea').innerHTML=sheets.map(function(cells,i){
    return '<div style="'+(i<sheets.length-1?'break-after:page;':'')+'width:'+sh.pw+'mm;height:'+sh.ph+'mm;overflow:hidden">'+sheetTable(cells,o.guide)+'</div>';
  }).join('');
  saveHist({cust:o.cust,item:o.item,total:o.total,qty:o.qty,pkgs:o.pkgs});
  var old=document.title;
  document.title=(new Date().toISOString().slice(0,10).replace(/-/g,''))+'_'+o.cust.replace(/[\\/:*?"<>|]/g,'')+'_配送ラベル';
  var restore=function(){ document.title=old; window.removeEventListener('afterprint',restore); };
  window.addEventListener('afterprint',restore);
  setTimeout(restore, 60000);
  window.print();
}
// 総数と数量(1箱あたり)から箱数を自動計算(手動で直した後は上書きしない)
function _num(v){ var m=String(v||'').replace(/[,，]/g,'').match(/\d+(?:\.\d+)?/); return m?parseFloat(m[0]):0; }
function autoPkgs(){
  var pk=document.getElementById('f-pkgs');
  if(pk.dataset.manual) return;
  var t=_num(document.getElementById('f-total').value);
  var q=_num(document.getElementById('f-qty').value);
  if(t>0 && q>0){ pk.value=Math.max(1,Math.ceil(t/q)); }
}
['f-total','f-qty'].forEach(function(id){ document.getElementById(id).addEventListener('input', autoPkgs); });
// 入力のたびにプレビュー追従
['f-cust','f-item','f-total','f-qty','f-pkgs','f-copies','f-start','f-font','s-pw','s-ph','s-lw','s-lh','s-cols','s-rows','s-mt','s-ml','s-gx','s-gy'].forEach(function(id){
  document.getElementById(id).addEventListener('input', renderPreview);
});
(function(){
  var a=hubAuth(); var el=document.getElementById('hub-user');
  if(el) el.textContent=a.loggedIn?('👤 '+(a.userName||'')+' / '+(a.companyName||'')):'';
  try{ var _fs=localStorage.getItem('labelmaker_font_v1'); if(_fs) document.getElementById('f-font').value=_fs; }catch(e){}
  renderPresetSel('b0');
  var n=buildCustMaster();
  if(!n) hubToast('得意先マスタが読めません（本体HUBに一度ログインすると候補が出ます）');
  renderHist();
  renderPreview();
})();
</script>
<!-- HUB共通: 最新データに更新するフローティングボタン（自動挿入） -->
<style>
#hubRefreshBtn{position:fixed;right:16px;bottom:16px;z-index:99999;display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;color:#0f172a;background:#fde68a;
  border:1px solid #f59e0b;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.22);cursor:pointer;line-height:1;}
#hubRefreshBtn:hover{background:#fcd34d;}
#hubRefreshBtn:disabled{opacity:.6;cursor:default;}
@media print{#hubRefreshBtn{display:none!important;}}
</style>
<button id="hubRefreshBtn" title="クラウドの最新データに更新します" onclick="hubRefreshNow()">🔄 更新</button>
<script>
function hubRefreshNow(){
  var b=document.getElementById('hubRefreshBtn');
  var reset=function(){ if(b){ b.disabled=false; b.textContent='🔄 更新'; } };
  if(b){ b.disabled=true; b.textContent='⏳ 更新中…'; }
  // 入力中のセルを先に確定(保存)してから取り込む。未確定の入力がクラウドの古い値で消えるのを防ぐ。
  try{ var ae=document.activeElement; if(ae && ae.blur && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) ae.blur(); }catch(e){}
  try{
    // クラウド取込関数を持つツール（カレンダー受注台帳など）は、再読込せず最新だけ取り込む
    if(typeof hubCloudPull==='function'){
      Promise.resolve(hubCloudPull()).then(function(){
        try{ if(typeof _hubCacheClear==='function') _hubCacheClear(); }catch(e){}
        try{ if(typeof buildYears==='function') buildYears(); }catch(e){}
        try{ if(typeof buildCats==='function') buildCats(); }catch(e){}
        try{ if(typeof render==='function') render(); }catch(e){}
        try{ if(typeof hubToast==='function') hubToast('🔄 最新データに更新しました'); }catch(e){}
        reset();
      }).catch(function(){ location.reload(); });
      return;
    }
  }catch(e){}
  // それ以外のページはページごと再読込（本体アプリは再読込でクラウドから取り直す）
  location.reload();
}
</script>
<!-- HUB共通: アプリ自動更新＋更新履歴（自動挿入 hubUpdateKit） -->
<style>
#hubLogBtn{position:fixed;right:16px;bottom:58px;z-index:99999;width:38px;height:38px;border-radius:50%;
  border:1px solid #cbd5e1;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.18);cursor:pointer;font-size:17px;line-height:1;}
#hubLogBtn:hover{background:#f1f5f9;}
#hubLogPanel{position:fixed;right:16px;bottom:104px;z-index:99999;width:min(360px,calc(100vw - 32px));max-height:60vh;overflow:auto;
  background:#fff;border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:12px 14px;display:none;font-size:12px;color:#0f172a;text-align:left;}

  background:#0f172a;color:#fff;padding:9px 14px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.35);font-size:13px;}

@media print{#hubLogBtn,#hubLogPanel,#hubUpBanner{display:none!important;}}
</style>
<button id="hubLogBtn" title="更新履歴を表示" onclick="hubToggleLog()">📋</button>
<div id="hubLogPanel"></div>
<div id="hubUpBanner"><span>🆕 新しい版があります（<b id="hubUpCnt">15</b>秒後に自動更新）</span><button onclick="hubDoUpdate()">今すぐ更新</button><button style="background:#334155;color:#fff" onclick="hubCancelUpdate()">後で</button></div>
<script>
(function(){
  var BASE = location.pathname.indexOf('/tools/')>=0 ? '../' : './';
  // ===== 更新履歴 =====
  window.hubToggleLog=function(){
    var p=document.getElementById('hubLogPanel');
    if(p.style.display==='block'){ p.style.display='none'; return; }
    p.style.display='block'; p.innerHTML='<h3>📋 更新履歴</h3>読み込み中…';
    fetch(BASE+'changelog.json?ts='+Date.now(), {cache:'no-store'}).then(function(r){return r.json();}).then(function(list){
      var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');};
      p.innerHTML='<h3>📋 更新履歴</h3>'+list.map(function(e){
        return '<div class="d">'+esc(e.date)+'</div><ul>'+e.items.map(function(i){return '<li>'+esc(i)+'</li>';}).join('')+'</ul>';
      }).join('');
    }).catch(function(){ p.innerHTML='<h3>📋 更新履歴</h3>取得できませんでした'; });
  };
  // ===== アプリ本体の自動更新 =====
  // service-worker.js の版番号を定期取得し、変わっていたら再読込して新しい版に切り替える。
  var curVer=null, timer=null;
  function fetchVer(){
    return fetch(BASE+'service-worker.js?ts='+Date.now(), {cache:'no-store'})
      .then(function(r){ return r.text(); })
      .then(function(t){ var m=t.match(/CACHE_VERSION\s*=\s*'([^']+)'/); return m?m[1]:null; })
      .catch(function(){ return null; });
  }
  window.hubDoUpdate=function(){ try{ sessionStorage.setItem('hubJustUpdated','1'); }catch(e){} location.reload(); };
  window.hubCancelUpdate=function(){ if(timer){ clearInterval(timer); timer=null; } var b=document.getElementById('hubUpBanner'); if(b) b.style.display='none'; };
  function showBanner(){
    var b=document.getElementById('hubUpBanner'); if(!b || b.style.display==='flex') return;
    b.style.display='flex';
    var n=15, c=document.getElementById('hubUpCnt'); c.textContent=n;
    timer=setInterval(function(){
      var ae=document.activeElement;
      if(ae && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) return;   // 入力中はカウントを止める
      n--; c.textContent=n;
      if(n<=0){ clearInterval(timer); hubDoUpdate(); }
    }, 1000);
  }
  function check(){
    fetchVer().then(function(v){
      if(!v) return;
      if(curVer===null){ curVer=v; return; }
      if(v===curVer) return;
      // 新しい版を検知: 非表示タブは即時、表示中はバナー＋カウントダウンで自動更新
      if(document.hidden){ hubDoUpdate(); } else { showBanner(); }
    });
  }
  fetchVer().then(function(v){ curVer=v; });
  setInterval(check, 180000);   // 3分ごとに版を確認
  window.addEventListener('focus', check);
  try{ if(sessionStorage.getItem('hubJustUpdated')){ sessionStorage.removeItem('hubJustUpdated'); } }catch(e){}
})();
</script>
</body>
</html>
