<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📐 校正サイズ・枠 付与 | Tokiwa Hub Tools</title>
<!--
  校正出し用：PDFに「仕上がり寸法(縦×横mm)」と「枠線(トンボ)」を自動付与するツール。
  - PC内処理(どこにも送信しない)。pdf-lib使用。
  - 元PDFのページサイズ=仕上がりサイズとして自動採寸。塗り足しがある場合は bleed を指定。
  - 余白を足した校正用PDFを生成し、枠＋寸法＋(任意)トンボを描画。
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  :root{ --ink:#1a1a1a; --line:#e0ddd6; --bg:#f4f3f0; --cyan:#0891b2; --grn:#16a34a; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:var(--bg); color:var(--ink); }
  header{ background:#1a1a1a; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; }
  header .logo{ font-weight:800; font-size:14px; } header .logo b{ color:#a3e635; }
  header .tname{ font-size:16px; font-weight:800; }
  header .user{ margin-left:auto; font-size:11px; color:#cbd5e1; }
  main{ max-width:920px; margin:14px auto; padding:0 14px; }
  .sec{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:.9rem 1.1rem; margin-bottom:.7rem; }
  .st{ font-size:10px; font-weight:700; color:#999; letter-spacing:.1em; margin-bottom:.5rem; text-transform:uppercase; }
  .btn{ padding:9px 16px; border:1px solid #d0cec8; border-radius:7px; background:#fff; cursor:pointer; font-size:13.5px; font-family:inherit; font-weight:700; }
  .btn-g{ background:var(--grn); border-color:var(--grn); color:#fff; }
  .btn-c{ background:var(--cyan); border-color:var(--cyan); color:#fff; }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }
  .muted{ font-size:11px; color:#94a3b8; }
  #drop{ border:2.5px dashed #94a3b8; border-radius:10px; padding:26px 16px; text-align:center; color:#64748b; font-size:14px; cursor:pointer; background:#fff; }
  #drop.over{ border-color:var(--cyan); background:#ecfeff; }
  .frow{ display:flex; gap:8px; align-items:center; padding:6px 9px; border:1px solid var(--line); border-radius:7px; margin-top:5px; background:#fff; font-size:13px; }
  .frow .nm{ flex:1; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .frow .mv{ cursor:pointer; padding:2px 8px; border:1px solid #d0cec8; border-radius:5px; font-size:12px; background:#fff; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px 14px; }
  label{ font-size:11px; color:#888; display:block; margin-bottom:3px; font-weight:600; }
  input[type=number],input[type=text],select{ width:100%; padding:7px 9px; border:1px solid #d0cec8; border-radius:6px; font-size:14px; font-family:inherit; background:#fff; }
  input:focus,select:focus{ outline:none; border-color:#1a1a1a; }
  .chk{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#374151; cursor:pointer; }
  .chk input{ width:16px; height:16px; }
  #preview{ width:100%; height:520px; border:1px solid var(--line); border-radius:8px; background:#fff; display:none; }
  #toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:9px 18px; border-radius:8px; font-size:13px; display:none; z-index:99; }
</style>
</head>
<body>
<header>
  <span class="logo">TOKIWA <b>HUB</b> 📐</span>
  <span class="tname">校正サイズ・枠 付与</span>
  <span class="user">🔒 PC内処理・送信なし</span>
</header>
<main>
  <div id="ctx-banner" style="display:none;background:#ecfeff;border:1px solid #67e8f9;border-radius:8px;padding:8px 12px;margin-bottom:.7rem;font-size:12.5px;color:#155e75"></div>
  <div class="sec">
    <div id="drop" onclick="document.getElementById('fi').click()">📂 校正PDFをドラッグ&ドロップ（複数OK・元のページサイズ＝仕上がりとして自動採寸）</div>
    <input type="file" id="fi" accept="application/pdf" multiple style="display:none" onchange="addFiles(this.files)">
    <div id="flist"></div>
  </div>

  <div class="sec">
    <div class="st">⚙ 設定</div>
    <div class="grid">
      <div>
        <label>塗り足し(bleed) mm</label>
        <input type="number" id="o-bleed" value="0" min="0" step="0.5" oninput="schedule()">
        <div class="muted">塗り足し有りのPDFは数値を入れると、枠を内側=仕上がり位置に引きます。</div>
      </div>
      <div>
        <label>校正用の余白 mm</label>
        <input type="number" id="o-margin" value="25" min="8" step="1" oninput="schedule()">
      </div>
      <div>
        <label>仕上がりサイズ 手動指定(任意)</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" id="o-w" placeholder="幅" min="1" step="0.5" oninput="schedule()" style="text-align:right">
          <span style="font-size:13px">×</span>
          <input type="number" id="o-h" placeholder="高さ" min="1" step="0.5" oninput="schedule()" style="text-align:right">
        </div>
        <div class="muted">空欄=自動採寸。入れると枠をその寸法で中央に。</div>
      </div>
      <div>
        <label>枠線の色</label>
        <select id="o-color" onchange="schedule()">
          <option value="0,0,0">黒</option>
          <option value="0.86,0.08,0.24">赤</option>
          <option value="0.91,0,0.56">マゼンタ</option>
          <option value="0,0.55,0.78">シアン</option>
          <option value="0.12,0.32,0.82">青</option>
        </select>
      </div>
      <div>
        <label>枠線の太さ pt</label>
        <input type="number" id="o-lw" value="0.75" min="0.2" step="0.25" oninput="schedule()">
      </div>
      <div>
        <label>枠線の種類</label>
        <select id="o-dash" onchange="schedule()">
          <option value="solid">実線</option>
          <option value="dash">破線</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:12px">
      <label class="chk"><input type="checkbox" id="o-dim" checked onchange="schedule()"> 寸法を表示（縦×横 mm）</label>
      <label class="chk"><input type="checkbox" id="o-tonbo" checked onchange="schedule()"> トンボ（コーナー）</label>
      <label class="chk"><input type="checkbox" id="o-caption" checked onchange="schedule()"> 上部に仕上がり寸法のキャプション</label>
    </div>
  </div>

  <div class="sec">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-c" id="btn-prev" onclick="generate(false)" disabled>👁 プレビュー更新</button>
      <button class="btn btn-g" id="btn-dl" onclick="generate(true)" disabled>⬇ 校正PDFを出力</button>
      <span class="muted" id="status"></span>
    </div>
    <iframe id="preview" title="プレビュー"></iframe>
  </div>
  <p class="muted">🔒 すべてPC内で処理（どこにも送信されません）。寸法・キャプションは数値＋mmのみ（日本語の差込はこの版では非対応）。EPSはデスクトップの変換batでPDF化してから。</p>
</main>
<div id="toast"></div>

<script>
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._tm); t._tm=setTimeout(function(){t.style.display='none';},2600); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function kb(n){ return n>1048576 ? (n/1048576).toFixed(1)+'MB' : Math.round(n/1024)+'KB'; }
var MM = 72/25.4;            // 1mm = 2.8346pt
function pt2mm(p){ return p/MM; }
function fmtmm(p){ var v=Math.round(pt2mm(p)*10)/10; return (Math.abs(v-Math.round(v))<0.05 ? String(Math.round(v)) : v.toFixed(1)); }

var files=[]; // {name, buf, w, h, pages}
// 校正BOX等からの引き継ぎ (URLパラメータ)
var CTX = (function(){
  try{
    var q=new URLSearchParams(location.search);
    var c={ name:q.get('name')||'', seiban:q.get('seiban')||'', cust:q.get('cust')||'', prod:q.get('prod')||'' };
    // 寸法/余白の事前設定
    var w=parseFloat(q.get('w')), h=parseFloat(q.get('h')), b=parseFloat(q.get('bleed')), m=parseFloat(q.get('margin'));
    if(w>0) document.getElementById('o-w').value=w;
    if(h>0) document.getElementById('o-h').value=h;
    if(b>=0 && !isNaN(b)) document.getElementById('o-bleed').value=b;
    if(m>0) document.getElementById('o-margin').value=m;
    var has=c.seiban||c.cust||c.prod||c.name;
    if(has){
      var bn=document.getElementById('ctx-banner');
      bn.style.display='block';
      bn.innerHTML='📐 校正BOXから引き継ぎ：'
        + (c.seiban?('<b>製番</b> '+esc(c.seiban)+'　'):'')
        + (c.cust?('<b>得意先</b> '+esc(c.cust)+'　'):'')
        + (c.prod?('<b>品名</b> '+esc(c.prod)):'')
        + '<div class="muted" style="margin-top:3px">出力ファイル名にこの製番が付きます。PDFを入れてください。</div>';
    }
    return c;
  }catch(e){ return { name:'',seiban:'',cust:'',prod:'' }; }
})();
function ctxBase(fallback){ return (CTX && CTX.name) ? CTX.name : fallback; }
var drop=document.getElementById('drop');
['dragover','dragenter'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.add('over');}); });
['dragleave','drop'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove('over');}); });
drop.addEventListener('drop',function(e){ addFiles(e.dataTransfer.files); });

function addFiles(fl){
  var arr=[].slice.call(fl).filter(function(f){ return /\.pdf$/i.test(f.name); });
  if(!arr.length){ toast('PDFを入れてください'); return; }
  arr.forEach(function(f){
    f.arrayBuffer().then(function(buf){
      return PDFLib.PDFDocument.load(buf,{ignoreEncryption:true}).then(function(d){
        var p0=d.getPage(0); var sz=p0.getSize();
        files.push({ name:f.name, buf:buf, w:sz.width, h:sz.height, pages:d.getPageCount() });
        render();
      });
    }).catch(function(e){ toast('❌ '+f.name+': '+(e.message||e)); });
  });
}
function render(){
  document.getElementById('flist').innerHTML=files.map(function(f,i){
    return '<div class="frow"><span>📄</span><span class="nm">'+(i+1)+'. '+esc(f.name)+'</span>'
      + '<span class="muted">'+fmtmm(f.w)+'×'+fmtmm(f.h)+'mm / '+f.pages+'p</span>'
      + '<span class="mv" onclick="mv('+i+',-1)" title="上へ">↑</span>'
      + '<span class="mv" onclick="mv('+i+',1)" title="下へ">↓</span>'
      + '<span class="mv" style="color:#b91c1c" onclick="files.splice('+i+',1);render()">✕</span></div>';
  }).join('');
  var has=files.length>0;
  document.getElementById('btn-prev').disabled=!has;
  document.getElementById('btn-dl').disabled=!has;
  if(has) schedule(); else { var pv=document.getElementById('preview'); pv.style.display='none'; }
}
function mv(i,d){ var j=i+d; if(j<0||j>=files.length) return; var t=files[i]; files[i]=files[j]; files[j]=t; render(); }

function readOpts(){
  var w=parseFloat(document.getElementById('o-w').value);
  var h=parseFloat(document.getElementById('o-h').value);
  return {
    bleed: Math.max(0, parseFloat(document.getElementById('o-bleed').value)||0),
    margin: Math.max(8, parseFloat(document.getElementById('o-margin').value)||25),
    finW: (w>0?w:null), finH: (h>0?h:null),
    color: document.getElementById('o-color').value.split(',').map(Number),
    lw: Math.max(0.2, parseFloat(document.getElementById('o-lw').value)||0.75),
    dash: document.getElementById('o-dash').value==='dash',
    dim: document.getElementById('o-dim').checked,
    tonbo: document.getElementById('o-tonbo').checked,
    caption: document.getElementById('o-caption').checked
  };
}

// ── 校正PDF生成コア (1ファイル分) ──
async function buildProofPdf(srcBytes, opts){
  var P=PDFLib;
  var src=await P.PDFDocument.load(srcBytes,{ignoreEncryption:true});
  var out=await P.PDFDocument.create();
  var font=await out.embedFont(P.StandardFonts.Helvetica);
  var fontB=await out.embedFont(P.StandardFonts.HelveticaBold);
  var col=P.rgb(opts.color[0],opts.color[1],opts.color[2]);
  var marginPt=opts.margin*MM, bleedPt=opts.bleed*MM;
  var dash=opts.dash?[3,2]:undefined;

  var idxs=src.getPageIndices();
  for(var pi=0; pi<idxs.length; pi++){
    var sp=src.getPage(idxs[pi]); var ssz=sp.getSize();
    var srcW=ssz.width, srcH=ssz.height;
    // 枠(仕上がり)の寸法と位置
    var frW, frH, frX, frY;
    if(opts.finW && opts.finH){
      frW=opts.finW*MM; frH=opts.finH*MM;
      frX=marginPt+(srcW-frW)/2; frY=marginPt+(srcH-frH)/2;
    } else {
      frW=srcW-2*bleedPt; frH=srcH-2*bleedPt;
      frX=marginPt+bleedPt; frY=marginPt+bleedPt;
    }
    var pageW=srcW+2*marginPt, pageH=srcH+2*marginPt;
    var page=out.addPage([pageW,pageH]);
    // 元PDFを中央に配置
    var emb=await out.embedPage(sp);
    page.drawPage(emb,{ x:marginPt, y:marginPt, width:srcW, height:srcH });

    var L=frX, R=frX+frW, B=frY, T=frY+frH;
    // 枠線 (4辺)
    function line(x1,y1,x2,y2,th,c,ds){ page.drawLine({ start:{x:x1,y:y1}, end:{x:x2,y:y2}, thickness:th, color:(c||col), dashArray:ds }); }
    line(L,B,R,B,opts.lw,col,dash); line(L,T,R,T,opts.lw,col,dash);
    line(L,B,L,T,opts.lw,col,dash); line(R,B,R,T,opts.lw,col,dash);

    // トンボ(コーナー)
    if(opts.tonbo){
      var g=3, ln=9, tw=opts.lw;
      // 各コーナー: 外側へL字
      // 左下
      line(L-g-ln,B,L-g,B,tw); line(L,B-g-ln,L,B-g,tw);
      // 右下
      line(R+g,B,R+g+ln,B,tw); line(R,B-g-ln,R,B-g,tw);
      // 左上
      line(L-g-ln,T,L-g,T,tw); line(L,T+g,L,T+g+ln,tw);
      // 右上
      line(R+g,T,R+g+ln,T,tw); line(R,T+g,R,T+g+ln,tw);
    }

    // 寸法 (縦×横 mm)
    if(opts.dim){
      var ds2=6, tick=4, fs=Math.max(7, Math.min(11, marginPt*0.30));
      // 幅(下): フレーム下〜余白
      var yW=B-Math.min(marginPt*0.5, marginPt-12);
      if(yW>4){
        line(L,yW,R,yW,0.5); line(L,yW-tick,L,yW+tick,0.5); line(R,yW-tick,R,yW+tick,0.5);
        var wTxt=fmtmm(frW)+' mm', ww=font.widthOfTextAtSize(wTxt,fs);
        // テキスト背景(白)で線を隠す
        page.drawRectangle({ x:(L+R)/2-ww/2-2, y:yW-fs/2-1, width:ww+4, height:fs+2, color:P.rgb(1,1,1) });
        page.drawText(wTxt,{ x:(L+R)/2-ww/2, y:yW-fs/2+1, size:fs, font:font, color:col });
      }
      // 高さ(左): フレーム左〜余白
      var xH=L-Math.min(marginPt*0.5, marginPt-12);
      if(xH>4){
        line(xH,B,xH,T,0.5); line(xH-tick,B,xH+tick,B,0.5); line(xH-tick,T,xH+tick,T,0.5);
        var hTxt=fmtmm(frH)+' mm', hw=font.widthOfTextAtSize(hTxt,fs);
        page.drawRectangle({ x:xH-fs/2-1, y:(B+T)/2-hw/2-2, width:fs+2, height:hw+4, color:P.rgb(1,1,1) });
        page.drawText(hTxt,{ x:xH-fs/2+1, y:(B+T)/2-hw/2, size:fs, font:font, color:col, rotate:P.degrees(90) });
      }
    }

    // 上部キャプション
    if(opts.caption){
      var cs=Math.max(8, Math.min(12, marginPt*0.34));
      var cap=fmtmm(frW)+' x '+fmtmm(frH)+' mm'+(idxs.length>1?('   (p'+(pi+1)+'/'+idxs.length+')'):'');
      var cw=fontB.widthOfTextAtSize(cap,cs);
      var cy=T+(marginPt-cs)/2+1;
      if(cy+cs<pageH){ page.drawText(cap,{ x:pageW/2-cw/2, y:cy, size:cs, font:fontB, color:col }); }
    }
  }
  return await out.save();
}

var _timer=null, _lastBytes=null, _lastName='';
function schedule(){ if(!files.length) return; clearTimeout(_timer); _timer=setTimeout(function(){ generate(false); }, 350); }

async function generate(doDownload){
  if(!files.length){ toast('PDFを入れてください'); return; }
  var opts=readOpts();
  var st=document.getElementById('status'); st.textContent='⏳ 生成中…';
  try{
    if(files.length===1 || !doDownload){
      // プレビュー / 単一出力 は先頭ファイル
      var f=files[0];
      var bytes=await buildProofPdf(f.buf, opts);
      _lastBytes=bytes; _lastName=ctxBase(f.name.replace(/\.pdf$/i,''))+'_校正枠.pdf';
      var blob=new Blob([bytes],{type:'application/pdf'});
      var url=URL.createObjectURL(blob);
      var pv=document.getElementById('preview'); pv.src=url; pv.style.display='block';
      st.textContent='✅ '+fmtmm(f.w)+'×'+fmtmm(f.h)+'mm / '+f.pages+'p / '+kb(bytes.byteLength);
      if(doDownload){ var a=document.createElement('a'); a.href=url; a.download=_lastName; a.click(); }
    } else {
      // 複数ファイル一括出力 → ZIP
      var zip=new JSZip();
      for(var i=0;i<files.length;i++){
        var b=await buildProofPdf(files[i].buf, opts);
        zip.file(files[i].name.replace(/\.pdf$/i,'')+'_校正枠.pdf', b);
      }
      var zb=await zip.generateAsync({type:'blob'});
      var zu=URL.createObjectURL(zb);
      var za=document.createElement('a'); za.href=zu; za.download='校正枠_'+files.length+'件.zip'; za.click();
      setTimeout(function(){URL.revokeObjectURL(zu);},5000);
      st.textContent='✅ '+files.length+'件をZIPで出力';
    }
  }catch(e){ st.textContent=''; toast('❌ 失敗: '+(e.message||e)); console.error(e); }
}

// 検証用: 指定mmの白紙PDFを作り、生成パイプラインを通す
window.__test = {
  build: buildProofPdf,
  async selfTest(wmm, hmm, opts){
    var P=PDFLib; var d=await P.PDFDocument.create();
    d.addPage([ (wmm||210)*MM, (hmm||297)*MM ]);
    var src=await d.save();
    var o=Object.assign({ bleed:0, margin:25, finW:null, finH:null, color:[0,0,0], lw:0.75, dash:false, dim:true, tonbo:true, caption:true }, opts||{});
    var out=await buildProofPdf(src, o);
    var chk=await P.PDFDocument.load(out); var pg=chk.getPage(0); var sz=pg.getSize();
    return { outW:sz.width, outH:sz.height, outWmm:Math.round(pt2mm(sz.width)), outHmm:Math.round(pt2mm(sz.height)), bytes:out.byteLength };
  }
};
</script>
<!-- HUB共通: 最新データに更新するフローティングボタン（自動挿入） -->
<style>
#hubRefreshBtn{position:fixed;right:16px;top:12px;z-index:99999;display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;color:#0f172a;background:#fde68a;
  border:1px solid #f59e0b;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.22);cursor:pointer;line-height:1;}
#hubRefreshBtn:hover{background:#fcd34d;}
#hubRefreshBtn:disabled{opacity:.6;cursor:default;}
@media print{#hubRefreshBtn{display:none!important;}}
</style>
<button id="hubRefreshBtn" title="クラウドの最新データに更新します" onclick="hubRefreshNow()">🔄 更新</button>
<script>
function hubRefreshNow(){
  var b=document.getElementById('hubRefreshBtn');
  var reset=function(){ if(b){ b.disabled=false; b.textContent='🔄 更新'; } };
  if(b){ b.disabled=true; b.textContent='⏳ 更新中…'; }
  try{
    // クラウド取込関数を持つツール（カレンダー受注台帳など）は、再読込せず最新だけ取り込む
    if(typeof hubCloudPull==='function'){
      Promise.resolve(hubCloudPull()).then(function(){
        try{ if(typeof _hubCacheClear==='function') _hubCacheClear(); }catch(e){}
        try{ if(typeof buildYears==='function') buildYears(); }catch(e){}
        try{ if(typeof buildCats==='function') buildCats(); }catch(e){}
        try{ if(typeof render==='function') render(); }catch(e){}
        try{ if(typeof hubToast==='function') hubToast('🔄 最新データに更新しました'); }catch(e){}
        reset();
      }).catch(function(){ location.reload(); });
      return;
    }
  }catch(e){}
  // それ以外のページはページごと再読込（本体アプリは再読込でクラウドから取り直す）
  location.reload();
}
</script>
