<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOKIWA HUB — デザイン試作（ホーム）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1b18; --ink2:#46433d; --muted:#6f6c66; --weak:#8d897f; --sub:#a39f97; --ph:#b4afa6;
    --line:#e8e5de; --line2:#f0ede7; --surf:#f7f6f3; --surf2:#faf9f6; --bg:#f4f3f0; --inputline:#d8d4cc;
    /* accent (会社カラーで差し替え) */
    --accent:#65a30d; --accent-soft:#ecfccb; --accent-ink:#3f6212; --accent-border:#65a30d55;
  }
  html,body{margin:0;padding:0}
  *{box-sizing:border-box}
  body{font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  ::placeholder{color:var(--ph)}
  input,select,button{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d8d4cc;border-radius:8px;border:2px solid #fff}
  ::-webkit-scrollbar-track{background:transparent}
  .shell{display:flex;height:100vh;width:100%;overflow:hidden}
  /* ===== Sidebar ===== */
  .sb{width:240px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;height:100%}
  .sb-brand{display:flex;align-items:center;gap:10px;padding:18px 18px 15px;border-bottom:1px solid var(--line2)}
  .sb-brand .name{font-weight:900;font-size:16px;letter-spacing:.03em;line-height:1.1}
  .sb-brand .sub{font-size:8.5px;color:var(--sub);font-weight:700;letter-spacing:.13em;margin-top:2px}
  .co-wrap{padding:12px 16px 8px;position:relative}
  .co-btn{display:flex;align-items:center;gap:8px;width:100%;background:var(--surf);border:1px solid var(--line);border-radius:10px;padding:9px 11px;cursor:pointer;text-align:left}
  .co-btn:hover{background:var(--line2)}
  .co-btn .lbl{font-size:8px;color:var(--ph);letter-spacing:.08em}
  .co-btn .nm{font-size:12.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .co-dd{position:absolute;left:16px;right:16px;top:56px;z-index:40;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 32px rgba(40,36,28,.16);padding:6px;display:none}
  .co-dd.open{display:block}
  .co-dd .hd{font-size:9px;color:var(--ph);padding:6px 8px 4px;letter-spacing:.06em}
  .co-item{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;border-radius:8px;padding:8px 9px;cursor:pointer;text-align:left;font-size:12.5px;font-weight:700}
  .co-item:hover{background:var(--surf)}
  .co-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .nav{flex:1;overflow-y:auto;padding:6px 12px 16px}
  .nav-h{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--ph);padding:14px 10px 6px}
  .nav-i{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;font-size:13px;color:var(--ink2);font-weight:600;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
  .nav-i:hover{background:var(--bg)}
  .nav-i.act{background:var(--accent);color:#fff;font-weight:700;box-shadow:0 2px 7px var(--accent-border)}
  .nav-i svg{width:18px;height:18px;flex-shrink:0}
  .nav-i .badge{margin-left:auto;font-size:10px;font-weight:800;padding:1px 7px;border-radius:10px;background:#fde8e4;color:#b3361f}
  .nav-i.act .badge{background:rgba(255,255,255,.25);color:#fff}
  .sb-user{border-top:1px solid var(--line2);padding:12px 16px;display:flex;align-items:center;gap:9px}
  .ava{width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  /* ===== Main ===== */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .hdr{height:62px;background:var(--accent);color:#fff;padding:0 26px;display:flex;align-items:center;gap:16px;flex-shrink:0}
  .hdr .crumb{font-size:11px;color:rgba(255,255,255,.72)}
  .hdr .ttl{font-size:18px;font-weight:900}
  .hdr .search{margin-left:auto;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);border-radius:9px;padding:8px 12px;width:230px;color:#fff;font-size:13px}
  .hdr .search::placeholder{color:rgba(255,255,255,.7)}
  .hdr .bell{width:40px;height:40px;border-radius:9px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
  .hdr .bell .dot{position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:#ffd23f}
  .router{flex:1;overflow-y:auto;padding:24px 26px 60px}
  .wrap{max-width:1240px;margin:0 auto}
  .hi{font-size:20px;font-weight:900}
  .hi-sub{font-size:12.5px;color:var(--weak);margin-top:3px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 3px rgba(40,36,28,.07)}
  .kpi{padding:16px 18px}
  .kpi .top{display:flex;align-items:center;gap:9px}
  .kpi .chip{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center}
  .kpi .lbl{font-size:12px;font-weight:700;color:var(--muted)}
  .kpi .val{font-size:25px;font-weight:900;font-variant-numeric:tabular-nums;margin-top:8px}
  .kpi .d{font-size:11px;font-weight:600;margin-top:2px}
  .grid2{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;margin-top:16px}
  .sec{padding:18px}
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .sec-h .t{font-size:15px;font-weight:800}
  .sec-h .more{font-size:12px;color:var(--accent-ink);font-weight:700;cursor:pointer;background:none;border:none}
  .prow{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--line2)}
  .prow:first-child{border-top:none}
  .prow .nm{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prow .meta{font-size:11px;color:var(--sub);margin-top:1px}
  .bar{width:120px;height:7px;background:var(--line2);border-radius:6px;overflow:hidden;flex-shrink:0}
  .bar > i{display:block;height:100%;background:var(--accent)}
  .badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap}
  .b-green{background:#e7f5ec;color:#15673a}.b-blue{background:#e8f0fe;color:#1b4fc0}.b-amber{background:#fbf0dd;color:#9a5207}
  .b-red{background:#fde8e4;color:#b3361f}.b-gray{background:#f0ede7;color:#8d897f}.b-purple{background:#f0e9fc;color:#5b27b5}
  .chart{display:flex;align-items:flex-end;gap:10px;height:120px;margin-top:6px}
  .chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .chart .col > i{width:100%;background:var(--accent);border-radius:6px 6px 0 0}
  .chart .col span{font-size:10px;color:var(--sub)}
  .trow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line2)}
  .trow:first-child{border-top:none}
  .trow .time{font-size:12px;font-weight:800;width:44px;font-variant-numeric:tabular-nums}
  .trow .txt{font-size:12.5px;font-weight:600;flex:1}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 20px;border-radius:11px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.3);display:none;z-index:90}
  .toast.show{display:block}
</style>
</head>
<body>
<div class="shell">
  <!-- ===== Sidebar ===== -->
  <aside class="sb">
    <div class="sb-brand">
      <svg id="logo" width="32" height="32" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="30" fill="none" stroke="var(--accent)" stroke-opacity=".45" stroke-width="6"/>
        <circle cx="50" cy="20" r="9.5" fill="var(--accent)"/>
        <circle cx="50" cy="50" r="8" fill="var(--accent)"/>
      </svg>
      <div>
        <div class="name">TOKIWA <span style="color:var(--accent)">HUB</span></div>
        <div class="sub">グループ統合基幹システム</div>
      </div>
    </div>
    <div class="co-wrap">
      <button class="co-btn" onclick="toggleCo(event)">
        <div style="flex:1;min-width:0">
          <div class="lbl">ログイン中の会社</div>
          <div class="nm" id="coName">トキワ印刷株式会社</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a39f97" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="co-dd" id="coDd">
        <div class="hd">関連会社（色違い）</div>
        <div id="coList"></div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sb-user">
      <div class="ava">本</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12.5px;font-weight:700">本多 亮</div>
        <div style="font-size:10.5px;color:var(--sub)">管理者</div>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a39f97" stroke-width="1.85"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </aside>

  <!-- ===== Main ===== -->
  <div class="main">
    <header class="hdr">
      <div>
        <div class="crumb">ダッシュボード</div>
        <div class="ttl">ホーム</div>
      </div>
      <input class="search" placeholder="得意先・品名・番号で検索">
      <button class="bell"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.85"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="dot"></span></button>
    </header>
    <div class="router">
      <div class="wrap">
        <div class="hi">おはようございます、本多さん</div>
        <div class="hi-sub" id="hiSub">2026年6月18日（木） · トキワ印刷株式会社</div>

        <div class="kpis">
          <div class="card kpi"><div class="top"><div class="chip">¥</div><div class="lbl">今月の売上</div></div><div class="val">¥8,420,000</div><div class="d" style="color:var(--accent-ink)">前月比 +12%</div></div>
          <div class="card kpi"><div class="top"><div class="chip">▦</div><div class="lbl">進行中の案件</div></div><div class="val">23件</div><div class="d" style="color:var(--weak)">納期7日以内 5件</div></div>
          <div class="card kpi"><div class="top"><div class="chip">✎</div><div class="lbl">校正待ち</div></div><div class="val">6件</div><div class="d" style="color:#b3361f">要対応 2件</div></div>
          <div class="card kpi"><div class="top"><div class="chip">◷</div><div class="lbl">未請求</div></div><div class="val">¥1,240,000</div><div class="d" style="color:var(--weak)">4件</div></div>
        </div>

        <div class="grid2">
          <div style="display:flex;flex-direction:column;gap:16px">
            <div class="card sec">
              <div class="sec-h"><div class="t">進行中の案件</div><button class="more" onclick="toast('案件管理へ（試作）')">すべて見る →</button></div>
              <div id="projList"></div>
            </div>
            <div class="card sec">
              <div class="sec-h"><div class="t">週次の売上</div><div style="font-size:12px;color:var(--weak)">今週 ¥2,180,000</div></div>
              <div class="chart" id="chart"></div>
            </div>
          </div>
          <div class="card sec">
            <div class="sec-h"><div class="t">本日の予定・期限</div></div>
            <div id="todoList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// 現行7社＋実カラー
var COMPANIES=[
  {id:'COMP002',name:'トキワ印刷株式会社',a:'#65a30d',soft:'#ecfccb',ink:'#3f6212'},
  {id:'COMP001',name:'村山印刷有限会社',a:'#6d28d9',soft:'#f3e8ff',ink:'#5b21b6'},
  {id:'COMP004',name:'有限会社北上プリント',a:'#ea580c',soft:'#ffedd5',ink:'#9a3412'},
  {id:'COMP005',name:'有限会社アート・エス',a:'#1d4ed8',soft:'#dbeafe',ink:'#1e40af'},
  {id:'COMP003',name:'株式会社津島プリント社',a:'#78350f',soft:'#fef3c7',ink:'#78350f'},
  {id:'COMP006',name:'中尾印刷株式会社',a:'#b91c1c',soft:'#fee2e2',ink:'#7f1d1d'},
  {id:'COMP007',name:'ヤマウチ印刷株式会社',a:'#ca8a04',soft:'#fef9c3',ink:'#854d0e'}
];
var NAV=[
  {h:''},{label:'ホーム',act:true,icon:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>'},
  {h:'営業'},
  {label:'問い合わせ',badge:3,icon:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'},
  {label:'案件管理',icon:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18"/>'},
  {label:'見積・受注',icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>'},
  {h:'制作'},
  {label:'校正BOX',badge:2,icon:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>'},
  {label:'工程管理',icon:'<circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6"/>'},
  {h:'経理'},
  {label:'請求・入金',icon:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>'},
  {h:'管理'},
  {label:'マスター',icon:'<path d="M12 2l9 4.9V17L12 22 3 17V6.9z"/>'}
];
var PROJECTS=[
  {nm:'観光パンフレット 2026年版',meta:'北上製版 · 納期 06/25',pct:70,b:'b-blue',st:'印刷中'},
  {nm:'会社案内 二つ折り 1,000部',meta:'みなみ自動車 · 納期 06/28',pct:40,b:'b-amber',st:'校正中'},
  {nm:'封筒 長3 窓付 5,000枚',meta:'伊勢原市役所 · 納期 07/02',pct:15,b:'b-gray',st:'製版中'},
  {nm:'名刺（本多 亮様）',meta:'トキワ印刷 · 納期 06/20',pct:100,b:'b-green',st:'校了'}
];
var CHART=[55,72,40,88,63,30,46];
var WD=['月','火','水','木','金','土','日'];
var TODO=[
  {t:'10:00',x:'校正戻し期限',b:'b-amber',l:'校正'},
  {t:'13:30',x:'納品',b:'b-blue',l:'納品'},
  {t:'15:00',x:'見積提出期限',b:'b-amber',l:'見積'},
  {t:'17:00',x:'入金確認',b:'b-purple',l:'入金'}
];
function setCompany(c){
  document.documentElement.style.setProperty('--accent',c.a);
  document.documentElement.style.setProperty('--accent-soft',c.soft);
  document.documentElement.style.setProperty('--accent-ink',c.ink);
  document.documentElement.style.setProperty('--accent-border',c.a+'55');
  document.getElementById('coName').textContent=c.name;
  document.getElementById('hiSub').textContent='2026年6月18日（木） · '+c.name;
}
function renderCoList(){
  document.getElementById('coList').innerHTML=COMPANIES.map(function(c,i){
    return '<button class="co-item" onclick="pickCo('+i+')"><span class="co-dot" style="background:'+c.a+'"></span>'+c.name+'</button>';
  }).join('');
}
function pickCo(i){ setCompany(COMPANIES[i]); document.getElementById('coDd').classList.remove('open'); }
function toggleCo(e){ e.stopPropagation(); document.getElementById('coDd').classList.toggle('open'); }
document.addEventListener('click',function(){ document.getElementById('coDd').classList.remove('open'); });
function renderNav(){
  document.getElementById('nav').innerHTML=NAV.map(function(n){
    if(n.h!==undefined) return n.h?('<div class="nav-h">'+n.h+'</div>'):'';
    return '<button class="nav-i'+(n.act?' act':'')+'" onclick="'+(n.act?'':'toast(\''+n.label+'（試作のため未実装）\')')+'">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round">'+n.icon+'</svg>'
      +'<span>'+n.label+'</span>'+(n.badge?'<span class="badge">'+n.badge+'</span>':'')+'</button>';
  }).join('');
}
function renderProj(){
  document.getElementById('projList').innerHTML=PROJECTS.map(function(p){
    return '<div class="prow"><div style="flex:1;min-width:0"><div class="nm">'+p.nm+'</div><div class="meta">'+p.meta+'</div></div>'
      +'<div class="bar"><i style="width:'+p.pct+'%"></i></div><span style="font-size:10px;color:var(--sub);width:30px;text-align:right">'+p.pct+'%</span>'
      +'<span class="badge '+p.b+'">'+p.st+'</span></div>';
  }).join('');
}
function renderChart(){
  var mx=Math.max.apply(null,CHART);
  document.getElementById('chart').innerHTML=CHART.map(function(v,i){
    return '<div class="col"><i style="height:'+Math.round(v/mx*100)+'%"></i><span>'+WD[i]+'</span></div>';
  }).join('');
}
function renderTodo(){
  document.getElementById('todoList').innerHTML=TODO.map(function(t){
    return '<div class="trow"><span class="time">'+t.t+'</span><span class="txt">'+t.x+'</span><span class="badge '+t.b+'">'+t.l+'</span></div>';
  }).join('');
}
var _tt;
function toast(m){ var el=document.getElementById('toast'); el.textContent='✓ '+m; el.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(function(){el.classList.remove('show');},2600); }
renderCoList(); renderNav(); renderProj(); renderChart(); renderTodo(); setCompany(COMPANIES[0]);
</script>
<!-- HUB共通: 最新データに更新するフローティングボタン（自動挿入） -->
<style>
#hubRefreshBtn{position:fixed;right:16px;bottom:16px;z-index:99999;display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;color:#0f172a;background:#fde68a;
  border:1px solid #f59e0b;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.22);cursor:pointer;line-height:1;}
#hubRefreshBtn:hover{background:#fcd34d;}
#hubRefreshBtn:disabled{opacity:.6;cursor:default;}
@media print{#hubRefreshBtn{display:none!important;}}
</style>
<button id="hubRefreshBtn" title="クラウドの最新データに更新します" onclick="hubRefreshNow()">🔄 更新</button>
<script>
function hubRefreshNow(){
  var b=document.getElementById('hubRefreshBtn');
  var reset=function(){ if(b){ b.disabled=false; b.textContent='🔄 更新'; } };
  if(b){ b.disabled=true; b.textContent='⏳ 更新中…'; }
  // 入力中のセルを先に確定(保存)してから取り込む。未確定の入力がクラウドの古い値で消えるのを防ぐ。
  try{ var ae=document.activeElement; if(ae && ae.blur && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) ae.blur(); }catch(e){}
  try{
    // クラウド取込関数を持つツール（カレンダー受注台帳など）は、再読込せず最新だけ取り込む
    if(typeof hubCloudPull==='function'){
      Promise.resolve(hubCloudPull()).then(function(){
        try{ if(typeof _hubCacheClear==='function') _hubCacheClear(); }catch(e){}
        try{ if(typeof buildYears==='function') buildYears(); }catch(e){}
        try{ if(typeof buildCats==='function') buildCats(); }catch(e){}
        try{ if(typeof render==='function') render(); }catch(e){}
        try{ if(typeof hubToast==='function') hubToast('🔄 最新データに更新しました'); }catch(e){}
        reset();
      }).catch(function(){ location.reload(); });
      return;
    }
  }catch(e){}
  // それ以外のページはページごと再読込（本体アプリは再読込でクラウドから取り直す）
  location.reload();
}
</script>
</body>
</html>
