<script>
var HUB_OWN_COLLS=['forms'];
// ═════════ Tokiwa Hub 共有ヘルパー (全ツール共通・ここから下は原則編集しない) ═════════
var HUB_DBKEY = 'murayama_v15';
var HUB_AUTHKEY = 'murayama_auth';
var HUB_TOOL_ID = 'shucchou'; // ← ツールごとに変更 (通知の識別子)
// 本体(index.html)の CLOUD_CONFIG と同じ値。ツール単独でも全社クラウド(GAS)へ直接保存するために使う。
var HUB_GAS_URL = 'https://script.google.com/a/macros/tokiwap-group.com/s/AKfycbw9-8Nnq3jV9lCDUEf7JOvQM_yAy1ZYnOIab-TYP3TZ-BtH7RosxKSeXmr-FvkxMVhv/exec';
var HUB_API_KEY = 'mitsumori-2024';

function hubLoad(){
  try { return JSON.parse(localStorage.getItem(HUB_DBKEY)) || null; }
  catch(e){ console.error(e); return null; }
}
function hubAuth(){
  try { return JSON.parse(localStorage.getItem(HUB_AUTHKEY)) || {}; } catch(e){ return {}; }
}
// 保存: 必ず「読み直し→変更→書き込み」の形で使う (mutator に最新DBを渡す)
// localStorage容量対策: 問い合わせ本文(body)等はクラウド(Communications)が正なので、
// 端末ミラーには一覧最小限だけ残す。容量超過時に本文を落として保存を通す。
function _hubInqLite_(db){
  if(!db || !Array.isArray(db.inquiries) || !db.inquiries.length) return db;
  var KEEP=['id','subject','kind','status','priority','source_type','channel_company','from_name','from_email','from_company','custName','received_at','createdAt','updatedAt','assignee','category','isSpam','tags','linked_project_id','linked_quote_id','linked_invoice_id','cust_id','tel'];
  var lite=db.inquiries.map(function(r){ if(!r||typeof r!=='object') return r; var o={}; KEEP.forEach(function(k){ if(k in r) o[k]=r[k]; }); o._lite=true; return o; });
  return Object.assign({}, db, {inquiries:lite});
}
function hubSave(mutator){
  var db = hubLoad();
  if(!db){ hubToast('❌ 本体データが見つかりません。先に本体アプリへログインしてください'); return false; }
  try { mutator(db); } catch(e){ hubToast('❌ 変更失敗: ' + e); return false; }
  var _lok=false;
  try { localStorage.setItem(HUB_DBKEY, JSON.stringify(db)); _lok=true; }
  catch(e){
    try { localStorage.setItem(HUB_DBKEY, JSON.stringify(_hubInqLite_(db))); _lok=true; }
    catch(e2){ try { var _b=_hubInqLite_(db); _b.inquiries=[]; _b.history=[]; localStorage.setItem(HUB_DBKEY, JSON.stringify(_b)); _lok=true; } catch(e3){} }
    hubToast(_lok ? '💾 端末保存は軽量化しました（データはクラウドに保存）' : '⚠ 端末保存失敗・クラウドには保存します');
  }
  try { new BroadcastChannel('tokiwa-hub-tools').postMessage({ type:'db-updated', tool: HUB_TOOL_ID }); } catch(e){}
  hubCloudPushSoon();   // ローカル保存の成否に関わらず全社クラウドへ反映（消失防止）
  return true;
}
// ツール単独で全社クラウド(GAS saveAll)へ即保存。本体経由・BroadcastChannel依存をやめ、強制リロードで消えるのを防ぐ。
// 注: 本体 saveToCloud と同じく localStorage の全DBを送る（=本体と同一の保存モデル）。
// 更新時刻ベースの安全な保存: 先にクラウド最新を取得し、このツールが扱うコレクションだけ
// 「レコードごとに新しい方」をマージして送る。他コレクションはクラウド最新をそのまま返す。
// これにより、この端末が古いデータを持っていても他機能・他端末の新しい変更を上書きしない。
function _tsval(r){ if(!r) return 0; var t=r._updatedAt||r.updatedAt||r.paidAt||r.matchedAt||r.createdAt||r._createdAt; var n=t?Date.parse(t):0; return isNaN(n)?0:n; }
// 論理時計: PCの時計が他PCよりずれていても、直近の編集が必ず「より新しい」と判定される時刻を刻む。
// 既存レコードを更新するときは必ず hubStamp(rec) を使うこと(new Date()直書き禁止)。
function hubStamp(rec){ var t=new Date(Math.max(Date.now(), _tsval(rec)+1000)).toISOString(); if(rec) rec._updatedAt=t; return t; }
function mergeNewestById(localArr, cloudArr){
  var byId={}, order=[];
  function take(r, isLocal){ if(!r||!r.id) return;
    if(!(r.id in byId)){ order.push(r.id); byId[r.id]=r; return; }
    var a=_tsval(r), b=_tsval(byId[r.id]);
    if(a>b || (a===b && isLocal)) byId[r.id]=r;   // 同時刻/両方無しはローカル(=このツールの編集)を優先
  }
  (Array.isArray(cloudArr)?cloudArr:[]).forEach(function(r){ take(r,false); });
  (Array.isArray(localArr)?localArr:[]).forEach(function(r){ take(r,true); });
  return order.map(function(id){ return byId[id]; });
}
// このツールが編集の主体となるコレクション(ここだけローカルの新しい変更を反映する)
function ownColls(){ return (typeof HUB_OWN_COLLS!=='undefined'&&HUB_OWN_COLLS) ? HUB_OWN_COLLS : ((typeof COLL!=='undefined'&&COLL) ? [COLL] : []); }
async function hubCloudFetch(){
  var auth=hubAuth(); if(!auth || !auth.loggedIn || !auth.companyId) return null;
  var url=new URL(HUB_GAS_URL);
  url.searchParams.set('action','syncAll'); url.searchParams.set('apiKey', HUB_API_KEY); url.searchParams.set('companyId', auth.companyId);
  var res=await fetch(url.toString(), { method:'GET', redirect:'follow' });
  var r=await res.json();
  var d=r && (r.data||r);
  return (d && typeof d==='object') ? d : null;
}
async function hubCloudPush(){
  var db = hubLoad(), auth = hubAuth();
  if(!db) return false;
  if(!auth || !auth.loggedIn || !auth.companyId) return false;   // 未ログインはローカルのみ
  var cloud=null; try{ cloud=await hubCloudFetch(); }catch(e){ cloud=null; }
  db=hubLoad()||db;   // 通信待ちの間の入力を失わないよう読み直す
  var data;
  if(cloud){
    data = Object.assign({}, cloud);                 // 他コレクションはクラウド最新を維持
    ownColls().forEach(function(k){
      var merged=mergeNewestById(db[k]||[], cloud[k]||[]);
      data[k]=merged;
      db[k]=merged;                                   // ローカルにも反映(他端末の新しい変更を取込)
    });
    try{ localStorage.setItem(HUB_DBKEY, JSON.stringify(db)); }catch(e){}
  } else {
    // クラウド取得失敗: 従来どおりローカル全体(最善努力・消失防止)
    data = {
      master: db.master, config: db.conf,
      projects: db.projects||[], history: db.history||[], quotations: db.quotations||[],
      intercoRequests: db.intercoRequests||[], intercoOrders: db.intercoOrders||[],
      outsourceOrders: db.outsourceOrders||[], artesoCases: db.artesoCases||[],
      calendarOrders: db.calendarOrders||[], inquiries: db.inquiries||[],
      deliveryItems: db.deliveryItems||[], drivers: db.drivers||[],
      inquirySettings: db.inquirySettings||{}, releaseConfig: db.releaseConfig||{},
      toolCompanyConfig: db.toolCompanyConfig||{}, bookmarks: db.bookmarks||[],
      bookmarkCategories: db.bookmarkCategories||[], leadTimeMaster: db.leadTimeMaster||{},
      bookmarksDeleted: (db.bookmarksDeleted||[]).slice(-500),
      bookmarkCategoriesDeleted: (db.bookmarkCategoriesDeleted||[]).slice(-200)
    };
  }
  try {
    var url = new URL(HUB_GAS_URL);
    url.searchParams.set('action','saveAll');
    url.searchParams.set('apiKey', HUB_API_KEY);
    var res = await fetch(url.toString(), { method:'POST', body: JSON.stringify({ companyId: auth.companyId, data: data }), redirect:'follow' });
    var r = await res.json();
    return !!(r && r.success);
  } catch(e){ console.warn('[Tool] cloud push failed', e); return false; }
}
// リアルタイム同期: 20秒ごと＋タブ復帰時にクラウド最新を取り込み、変更があれば再描画
var _hubAutoBusy=false;
async function hubAutoSync(){
  if(_hubAutoBusy || document.hidden) return;
  var ae=document.activeElement;
  if(ae && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) return;   // 入力中は邪魔しない
  _hubAutoBusy=true;
  try{
    var cloud=await hubCloudFetch();
    if(cloud){
      var db=hubLoad();
      if(db){
        var changed=false;
        ownColls().forEach(function(k){
          var before=JSON.stringify((db[k]||[]).map(function(r){return r&&r.id+':'+_tsval(r);}));
          var merged=mergeNewestById(db[k]||[], cloud[k]||[]);
          var after=JSON.stringify(merged.map(function(r){return r&&r.id+':'+_tsval(r);}));
          if(after!==before){ db[k]=merged; changed=true; }
        });
        if(changed){
          try{ localStorage.setItem(HUB_DBKEY, JSON.stringify(db)); }catch(e){}
          try{ if(typeof render==='function') render(); else if(typeof renderResult==='function'){} }catch(e){}
        }
      }
    }
  }catch(e){}
  _hubAutoBusy=false;
}
setInterval(hubAutoSync, 20000);
window.addEventListener('focus', hubAutoSync);

var _hubCloudTimer = null;
function hubCloudPushSoon(){
  if(_hubCloudTimer) clearTimeout(_hubCloudTimer);
  _hubCloudTimer = setTimeout(function(){ _hubCloudTimer=null; hubCloudPush(); }, 1500);
}
// 配列コレクションへの追加ショートカット
function hubAppend(key, record){
  return hubSave(function(db){ if(!Array.isArray(db[key])) db[key] = []; db[key].push(record); });
}
function hubEsc(s){ s=(s==null?'':String(s)); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hubToast(msg){
  var t = document.getElementById('toast'); if(!t) return alert(msg);
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._tm); t._tm = setTimeout(function(){ t.style.display='none'; }, 2600);
}
function hubYen(n){ return '¥' + Number(n||0).toLocaleString(); }
// ヘッダーにログインユーザー表示 + 未ログインガード
(function(){
  var a = hubAuth();
  var el = document.getElementById('hub-user');
  if(el) el.textContent = a.loggedIn ? ('👤 ' + (a.userName||'') + ' / ' + (a.companyName||'')) : '⚠ 本体未ログイン';
})();
// ═════════ 共有ヘルパーここまで ═════════
</script>
<script>
// ═════════ 出張旅費精算書 (DB.forms type='shucchou' を共有・過去履歴を継承) ═════════
// 様式は W:\...\20_マネージメント\出張申請\*.xlsx （提出日／対象月・氏名／出張スケジュール／日当）に合わせる。
var SH_RATE_DAY=1000, SH_RATE_STAY=2000;   // 日帰/宿泊の日当単価(既定)
var SH_NAMES=['本多　亮','福永　健児'];      // 氏名ドロップダウン(該当者が増えたらここに追加)
var SH_DEST_DEFAULT=['東京','神奈川','大阪','三重','秋田','岩手','静岡','愛知'];   // 訪問先候補の初期値(過去の入力が優先)
function shList(){
  var db=hubLoad(); var L=(db&&Array.isArray(db.forms))?db.forms:[];
  return L.filter(function(r){ return r && r.type==='shucchou' && !r.deleted; });
}
function esc(s){ return hubEsc(s); }
// 旧様式(1件=1出張・費用明細)のレコードも新様式で読めるようにする
function shNorm(d){
  d=d||{};
  if(Array.isArray(d.trips)) return d;
  var trips=[];
  if(d.from){
    var s=new Date(d.from), e=new Date(d.to||d.from);
    var n=Math.max(1, Math.round((e-s)/86400000)+1);
    var stay=(n>1);
    for(var i=0;i<n;i++){
      var dt=new Date(s.getTime()+i*86400000);
      trips.push({ kind:(stay&&i<n-1)?'宿泊':'日帰', date:dt.toISOString().slice(0,10), dest:d.dest||'' });
    }
  }
  var note=[d.purpose?('目的: '+d.purpose):'', d.report||'', d.note||''].filter(Boolean).join(' / ');
  return { date:d.date||'', period:d.period||(d.month?shMonthLabel(d.month):''), name:d.name||'',
           trips:trips, rateDay:SH_RATE_DAY, rateStay:SH_RATE_STAY, note:note, _legacy:true };
}
function shMonthLabel(m){ if(!m) return ''; var p=String(m).split('-'); return p[0]+'年'+(p[1]?parseInt(p[1],10)+'月':''); }
function shCounts(d){
  d=shNorm(d);
  var c={day:0, stay:0};
  // 日付が入っている行だけを1日と数える(訪問先だけ引き継いだ空行を日当に含めない)
  (d.trips||[]).forEach(function(t){ if(t&&t.date){ if(t.kind==='宿泊') c.stay++; else c.day++; } });
  c.rateDay=Number(d.rateDay!=null?d.rateDay:SH_RATE_DAY)||0;
  c.rateStay=Number(d.rateStay!=null?d.rateStay:SH_RATE_STAY)||0;
  c.amtDay=c.day*c.rateDay; c.amtStay=c.stay*c.rateStay; c.total=c.amtDay+c.amtStay;
  return c;
}
function shTotal(d){ return shCounts(d).total; }
function shFmtDate(s){ if(!s) return ''; var p=String(s).split('-'); return p.length===3 ? (p[0]+'/'+parseInt(p[1],10)+'/'+parseInt(p[2],10)) : String(s); }

// 過去に入力された訪問先を候補にする(よく使う順→五十音)
function shDestList(){
  var cnt={};
  shList().forEach(function(r){ (shNorm(r.data||{}).trips||[]).forEach(function(t){ var v=(t&&t.dest||'').trim(); if(v) cnt[v]=(cnt[v]||0)+1; }); });
  SH_DEST_DEFAULT.forEach(function(v){ if(!(v in cnt)) cnt[v]=0; });
  return Object.keys(cnt).sort(function(a,b){ return (cnt[b]-cnt[a]) || a.localeCompare(b,'ja'); });
}
function shSyncDestList(){
  var dl=document.getElementById('sh-dests'); if(!dl) return;
  dl.innerHTML=shDestList().map(function(v){ return '<option value="'+esc(v)+'">'; }).join('');
}
// 氏名: SH_NAMES + 過去に使われた氏名 + その他(直接入力)
function shNameOptions(cur){
  var names=SH_NAMES.slice();
  shList().forEach(function(r){ var n=(shNorm(r.data||{}).name||'').trim(); if(n && names.indexOf(n)<0) names.push(n); });
  if(cur && names.indexOf(cur)<0) names.push(cur);
  return names;
}
function shNameChange(){
  var sel=document.getElementById('sh-name'), other=document.getElementById('sh-name-other');

}
function shNameValue(){
  var sel=document.getElementById('sh-name');

}

var _editId=null;
function shNew(){ _editId=null; shFill({}); document.getElementById('sh-modal-title').textContent='🧳 出張旅費精算書（新規）'; document.getElementById('shModal').style.display='flex'; }
function shEdit(id){

// レコードを複製: 内容を引き継いだ「新規」として開く(保存するまで元は変わらない)
function shCopy(id){
  var r=shList().find(function(x){return x.id===id;}); if(!r) return;
  var d=JSON.parse(JSON.stringify(shNorm(r.data||{})));

  delete d._legacy;

function shClose(){ document.getElementById('shModal').style.display='none'; _editId=null; }
function shFill(d){
  var t=new Date().toISOString().slice(0,10);
  var set=function(id,v){ document.getElementById(id).value=(v==null?'':v); };
  set('sh-date', d.date||t);

    + shNameOptions(cur).map(function(n){ return '<option value="'+esc(n)+'">'+esc(n)+'</option>'; }).join('')
    + '<option value="__other__">その他（直接入力）</option>';
  sel.value=cur||''; document.getElementById('sh-name-other').value='';
  shNameChange();

  set('sh-period', d.period||'');
  set('sh-rate-day', d.rateDay!=null?d.rateDay:SH_RATE_DAY);
  set('sh-rate-stay', d.rateStay!=null?d.rateStay:SH_RATE_STAY);

  var tb=document.getElementById('sh-sch-body'); tb.innerHTML='';
  var trips=(d.trips&&d.trips.length)?d.trips:[{kind:'日帰',date:'',dest:''}];

}
function shSchRow(t){
  t=t||{};
  var st='width:100%;border:1px solid #d0cec8;border-radius:5px;box-sizing:border-box;font-family:inherit';
  var sel=['日帰','宿泊'].map(function(k){ return '<option'+(t.kind===k?' selected':'')+'>'+k+'</option>'; }).join('');
  return '<tr><td><select class="sh-t-kind" onchange="shCalc()" style="'+st+'">'+sel+'</select></td>'
    +'<td><input type="date" class="sh-t-date" value="'+esc(t.date||'')+'" onchange="shCalc()" onkeydown="shRowKey(event)" style="'+st+'"></td>'
    +'<td><input class="sh-t-dest" list="sh-dests" value="'+esc(t.dest||'')+'" placeholder="訪問先（例: 東京 / 神奈川）" onkeydown="shRowKey(event)" style="'+st+'"></td>'
    +'<td style="text-align:center"><span style="cursor:pointer;color:#b91c1c;font-weight:700" title="この行を削除" onclick="this.closest(\'tr\').remove();shCalc()">✕</span></td></tr>';
}
// n行まとめて追加。前の行の区分・訪問先を引き継ぐので、月に何度も行く先は日付だけ入れれば済む。
function shAddRow(n, focus){
  n=n||1;
  var tb=document.getElementById('sh-sch-body');
  var lastDest=tb.querySelector('tr:last-child .sh-t-dest');
  var lastKind=tb.querySelector('tr:last-child .sh-t-kind');
  var first=null;
  for(var i=0;i<n;i++){
    tb.insertAdjacentHTML('beforeend', shSchRow({ kind:(lastKind?lastKind.value:'日帰'), date:'', dest:(lastDest?lastDest.value:'') }));
    if(!first) first=tb.querySelector('tr:last-child .sh-t-date');
  }
  shCalc();
  if(focus && first) first.focus();
}
// Enter: 最終行なら行を増やして次の日付欄へ、途中の行なら次の行の日付欄へ移動
function shRowKey(ev){
  if(ev.key!=='Enter') return;
  ev.preventDefault();
  var tr=ev.target.closest('tr');
  var next=tr.nextElementSibling;
  if(!next){ shAddRow(1,true); return; }
  var d=next.querySelector('.sh-t-date'); if(d) d.focus();
}
function shSortRows(){
  var tb=document.getElementById('sh-sch-body');
  var rows=[].slice.call(tb.querySelectorAll('tr')).map(function(tr){
    return { kind:tr.querySelector('.sh-t-kind').value, date:tr.querySelector('.sh-t-date').value, dest:tr.querySelector('.sh-t-dest').value };
  }).filter(function(r){ return r.date||r.dest; })
    .sort(function(a,b){ return String(a.date||'9999').localeCompare(String(b.date||'9999')); });
  tb.innerHTML=rows.map(shSchRow).join('') || shSchRow({kind:'日帰'});
  shCalc();
}
function shCalc(){
  var c=shCounts(shCollect());
  document.getElementById('sh-sum').innerHTML=
    '<span>日帰 '+c.day+'日 × '+c.rateDay.toLocaleString()+'円 = '+c.amtDay.toLocaleString()+'円</span>'
    +'<span>宿泊 '+c.stay+'日 × '+c.rateStay.toLocaleString()+'円 = '+c.amtStay.toLocaleString()+'円</span>'
    +'<span style="margin-left:auto">日当合計 <b>¥'+c.total.toLocaleString()+'</b></span>';
  var rc=document.getElementById('sh-rowcnt');
  if(rc) rc.textContent='入力済み '+(c.day+c.stay)+'日 / 行数 '+document.querySelectorAll('.sh-t-kind').length;
}
function shCollect(){
  var trips=[];
  var kinds=document.querySelectorAll('.sh-t-kind'), dates=document.querySelectorAll('.sh-t-date'), dests=document.querySelectorAll('.sh-t-dest');
  for(var i=0;i<kinds.length;i++){
    var dt=dates[i].value, ds=dests[i].value.trim();
    if(dt) trips.push({ kind:kinds[i].value, date:dt, dest:ds });   // 日付が無い行は未入力とみなす
  }
  trips.sort(function(a,b){ return String(a.date||'').localeCompare(String(b.date||'')); });
  var gv=function(id){ return document.getElementById(id).value; };
  var num=function(id,def){ var v=parseFloat(gv(id)); return isNaN(v)?def:v; };
  return { date:gv('sh-date'), name:shNameValue(), period:gv('sh-period'), trips:trips,
           rateDay:num('sh-rate-day',SH_RATE_DAY), rateStay:num('sh-rate-stay',SH_RATE_STAY), note:gv('sh-note') };
}
function shSave(thenPrint){
  var data=shCollect();
  if(!data.name){ hubToast('氏名を選んでください'); return; }
  if(!data.trips.length){ hubToast('出張スケジュールを1行以上入力してください（日付が必要です）'); return; }
  // 訪問先だけで日付が空の行は日当に数えられない。黙って捨てずに知らせる。
  var noDate=0;
  var ds=document.querySelectorAll('.sh-t-date'), de=document.querySelectorAll('.sh-t-dest');
  for(var i=0;i<ds.length;i++){ if(!ds[i].value && de[i].value.trim()) noDate++; }
  if(noDate && !confirm('日付が空の行が '+noDate+' 行あります。\nこの行は日当に数えられず保存もされません。このまま保存しますか？')) return;
  var title=(data.name||'')+(data.period?(' / '+data.period):'');
  var savedId=null;
  var ok=hubSave(function(db){
    if(!Array.isArray(db.forms)) db.forms=[];
    var rec=_editId ? db.forms.find(function(x){return x&&x.id===_editId;}) : null;
    if(rec){ rec.data=data; rec.title=title; }
    else {
      rec={ id:'frm_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), type:'shucchou', title:title, data:data,
            createdAt:new Date().toISOString(), createdBy:(hubAuth().userName||'') };
      db.forms.push(rec);
    }
    hubStamp(rec); rec.updatedAt=rec._updatedAt;
    savedId=rec.id;
  });
  if(!ok) return;
  hubToast('💾 保存しました');
  shClose(); render();
  if(thenPrint) shPrint(savedId);
}
function shDelete(id){
  var r=shList().find(function(x){return x.id===id;}); if(!r) return;
  if(!confirm('「'+(r.title||'出張報告')+'」を削除しますか？')) return;
  hubSave(function(db){
    var rec=(db.forms||[]).find(function(x){return x&&x.id===id;});
    if(rec){ rec.deleted=true; hubStamp(rec); rec.updatedAt=rec._updatedAt; }   // ソフト削除(全PCへ伝播・復元可)
  });
  hubToast('🗑 削除しました'); render();
}

// そのまま印刷: 非表示iframeに組んで印刷ダイアログを直接開く(別タブを開かない)
function shPrintDirect(html){
  var old=document.getElementById('sh-print-frame'); if(old) old.remove();
  var f=document.createElement('iframe');
  f.id='sh-print-frame';
  f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden';
  document.body.appendChild(f);
  var doc=f.contentWindow.document;
  doc.open();
  doc.write('<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>出張旅費精算書</title>'+shStyle()+'</head><body>'+html+'</body></html>');
  doc.close();
  var go=function(){
    try{ f.contentWindow.focus(); f.contentWindow.print(); }
    catch(e){ console.error(e); hubToast('❌ 印刷を開けませんでした'); }
    setTimeout(function(){ f.remove(); }, 60000);   // 印刷ダイアログが閉じるまで残す
  };
  if(f.contentWindow.document.readyState==='complete') setTimeout(go,80); else f.onload=function(){ setTimeout(go,80); };
}

// ── Excel出力（元の 出張申請\*.xlsx と同じ配置・数式で書き出す） ──
// ExcelJS は押されたときだけ読み込む（普段の起動を重くしない）
var SH_EXCELJS='https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
var SH_JSPDF='https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js';
var SH_H2C='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
function shLoadScript(url, ready){
  if(ready()) return Promise.resolve(true);
  return new Promise(function(ok,ng){
    var s=document.createElement('script'); s.src=url;
    s.onload=function(){ ok(true); }; s.onerror=function(){ ng(new Error('load failed: '+url)); };
    document.head.appendChild(s);
  });
}
function shLoadExcelJS(){ return shLoadScript(SH_EXCELJS, function(){ return !!window.ExcelJS; }); }
function shLoadPdfLibs(){
  return shLoadScript(SH_JSPDF, function(){ return !!(window.jspdf&&window.jspdf.jsPDF); })
    .then(function(){ return shLoadScript(SH_H2C, function(){ return !!window.html2canvas; }); });
}
function _shCol(s){ var n=0; for(var i=0;i<s.length;i++) n=n*26+(s.charCodeAt(i)-64); return n; }
// 出張申請フォルダの命名規則: YYYYMM_日当_氏名.xlsx （例 202611_日当_本多亮.xlsx）
function shFileName(d){
  var ym='';
  var m=String(d.period||'').match(/(\d{4})\s*年\s*(\d{1,2})\s*月/);
  if(m) ym=m[1]+String(m[2]).padStart(2,'0');
  else { var f=(d.trips||[]).map(function(t){return t.date;}).filter(Boolean).sort()[0]||d.date||''; ym=String(f).slice(0,7).replace('-',''); }
  var nm=String(d.name||'').replace(/[\s　]/g,'');
  return (ym||'出張')+'_日当_'+nm+'.xlsx';
}
async function shBuildWB(dRaw){
  await shLoadExcelJS();
  var d=shNorm(dRaw), c=shCounts(d);
  var trips=(d.trips||[]).slice().sort(function(a,b){ return String(a.date||'').localeCompare(String(b.date||'')); });
  var wb=new ExcelJS.Workbook();
  var ws=wb.addWorksheet('日当',{ pageSetup:{ paperSize:9, orientation:'portrait', fitToPage:true, fitToWidth:1, fitToHeight:1 } });
  var F='游ゴシック';
  var THIN={style:'thin',color:{argb:'FF555555'}};
  var B_ALL={top:THIN,left:THIN,bottom:THIN,right:THIN};
  ws.columns=Array.from({length:16},function(){ return {width:5.4}; });   // A〜P（元ファイルと同じ16列）
  function C(addr,val,o){ o=o||{}; var cell=ws.getCell(addr);
    cell.value=val;
    cell.font=Object.assign({name:F,size:11},o.f||{});
    if(o.a) cell.alignment=o.a;
    if(o.nf) cell.numFmt=o.nf;
    if(o.fill) cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:o.fill}};
    return cell; }
  function box(range){ var m=range.match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/); if(!m) return;
    for(var r=+m[2];r<=+m[4];r++) for(var col=_shCol(m[1]);col<=_shCol(m[3]);col++) ws.getCell(r,col).border=B_ALL; }
  function M(range,val,o){ ws.mergeCells(range); C(range.split(':')[0],val,o); return range; }
  var CT={horizontal:'center',vertical:'middle'}, RT={horizontal:'right',vertical:'middle'};
  var HEAD='FFF0F0F0';

  // 提出日
  M('H2:P2','提出日',{f:{bold:true},a:CT,fill:HEAD}); box('H2:P2');
  M('H3:P3', d.date?new Date(d.date):'', {a:CT,nf:'yyyy/m/d'}); box('H3:P3');
  // タイトル
  M('A5:P5','出張旅費精算書',{f:{size:16,bold:true},a:CT});
  // 対象月・氏名
  M('A7:G7','対象月',{f:{bold:true},a:CT,fill:HEAD}); M('H7:P7', d.period||'', {a:{vertical:'middle'}}); box('A7:P7');
  M('A8:G8','氏名',{f:{bold:true},a:CT,fill:HEAD});   M('H8:P8', d.name||'',  {a:{vertical:'middle'}}); box('A8:P8');
  // 出張スケジュール
  M('A10:P10','出張スケジュール',{f:{bold:true},fill:HEAD}); box('A10:P10');
  M('A11:D11','区分',{f:{bold:true},a:CT,fill:HEAD});
  M('E11:J11','期間',{f:{bold:true},a:CT,fill:HEAD});
  M('K11:P11','訪問先',{f:{bold:true},a:CT,fill:HEAD}); box('A11:P11');
  var MINROW=8;                                   // 元ファイルと同じ8行枠(12〜19)
  var n=Math.max(MINROW, trips.length);
  for(var i=0;i<n;i++){
    var r=12+i, t=trips[i]||{};
    M('A'+r+':D'+r, t.kind||'', {a:CT});
    M('E'+r+':J'+r, t.date?new Date(t.date):'', {a:CT,nf:'yyyy/m/d'});
    M('K'+r+':P'+r, t.dest||'', {a:{vertical:'middle'}});
    box('A'+r+':P'+r);
  }
  // 旅費明細 / 日当
  var base=12+n;                                   // 元ファイル(8行)なら 20 になる
  M('A'+base+':P'+base,'旅費明細',{f:{bold:true},fill:HEAD}); box('A'+base+':P'+base);
  var r21=base+1;
  M('A'+r21+':P'+r21,'日　当',{f:{bold:true},fill:'FFF7F7F7'}); box('A'+r21+':P'+r21);
  var r22=base+2, r23=base+3, r24=base+4, r25=base+5;
  M('A'+r22+':D'+r22,'日当',{f:{bold:true},a:CT,fill:HEAD});
  M('E'+r22+':H'+r22,'単価',{f:{bold:true},a:CT,fill:HEAD});
  M('I'+r22+':L'+r22,'数',  {f:{bold:true},a:CT,fill:HEAD});
  M('M'+r22+':P'+r22,'金額',{f:{bold:true},a:CT,fill:HEAD}); box('A'+r22+':P'+r22);
  [[r23,'日帰',c.rateDay,c.day],[r24,'宿泊',c.rateStay,c.stay]].forEach(function(x){
    M('A'+x[0]+':D'+x[0], x[1], {a:CT});
    M('E'+x[0]+':H'+x[0], x[2], {a:RT,nf:'#,##0'});
    M('I'+x[0]+':L'+x[0], x[3], {a:RT,nf:'#,##0'});
    // 元ファイルと同じく数式で持たせる(単価や数を直しても合計が追従する)
    M('M'+x[0]+':P'+x[0], {formula:'E'+x[0]+'*I'+x[0], result:x[2]*x[3]}, {a:RT,nf:'#,##0'});
    box('A'+x[0]+':P'+x[0]);
  });
  M('A'+r25+':L'+r25,'日当合計',{f:{bold:true},a:RT,fill:HEAD});
  M('M'+r25+':P'+r25, {formula:'SUM(M'+r23+':P'+r24+')', result:c.total}, {f:{bold:true},a:RT,nf:'#,##0'});
  box('A'+r25+':P'+r25);
  if(d.note){ M('A'+(r25+2)+':P'+(r25+2),'備考：'+d.note,{f:{size:10}}); }
  return wb;
}
async function shExcelDownload(dRaw){
  var d=shNorm(dRaw);
  try{
    hubToast('📊 Excelを作成中…');
    var wb=await shBuildWB(d);
    var buf=await wb.xlsx.writeBuffer();
    var blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=shFileName(d); document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 1000);
    hubToast('📊 '+shFileName(d)+' を書き出しました');
  }catch(e){
    console.error(e);
    hubToast('❌ Excel出力に失敗しました（オフラインの可能性あり）。印刷/PDFはご利用いただけます');
  }
}
function shExcel(id){
  var r=shList().find(function(x){return x.id===id;}); if(!r) return;
  shExcelDownload(r.data||{});
}
function shExcelFromForm(){
  var d=shCollect();
  if(!d.name){ hubToast('氏名を選んでください'); return; }
  if(!d.trips.length){ hubToast('出張スケジュールを1行以上入力してください（日付が必要です）'); return; }
  shExcelDownload(d);
}
// ── PDF出力（PDFファイルとしてダウンロード。印刷ダイアログを経由しない） ──
function shPdfName(d){ return shFileName(d).replace(/\.xlsx$/,'.pdf'); }
// 画面外にA4幅で組んで画像化 → PDFに貼る（日本語フォントの埋め込みが不要）
function shRenderOffscreen(html){
  var box=document.createElement('div');
  box.style.cssText='position:fixed;left:-10000px;top:0;width:794px;background:#fff;padding:60px 60px;z-index:-1';
  box.innerHTML='<style>'+shStyle().replace(/<\/?style>/g,'')+'</style>'+html;
  document.body.appendChild(box);
  return box;
}
async function shPdfDownload(docs, name){
  try{
    hubToast('📄 PDFを作成中…');
    await shLoadPdfLibs();
    var pdf=new window.jspdf.jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    for(var i=0;i<docs.length;i++){
      var box=shRenderOffscreen(docs[i]);
      var canvas=await window.html2canvas(box,{scale:2,backgroundColor:'#ffffff',useCORS:true});
      box.remove();
      var w=210, h=canvas.height*w/canvas.width;
      if(h>297){ h=297; w=canvas.width*h/canvas.height; }   // 念のため1ページに収める
      if(i>0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',(210-w)/2,0,w,h);
    }
    pdf.save(name);
    hubToast('📄 '+name+' を書き出しました');
  }catch(e){
    console.error(e);
    hubToast('❌ PDF出力に失敗しました（オフラインの可能性あり）。「🖨 印刷」からPDF保存もできます');
  }
}
function shPdf(id){
  var r=shList().find(function(x){return x.id===id;}); if(!r) return;
  var d=r.data||{};
  shPdfDownload([shDocBlock(d)], shPdfName(shNorm(d)));
}
function shPdfFromForm(){
  var d=shCollect();
  if(!d.name){ hubToast('氏名を選んでください'); return; }
  if(!d.trips.length){ hubToast('出張スケジュールを1行以上入力してください（日付が必要です）'); return; }
  shPdfDownload([shDocBlock(d)], shPdfName(d));
}
// ── 選択したものをまとめて（印刷 / PDF） ──
function shSelIds(){
  var ids=[].slice.call(document.querySelectorAll('.sh-ck:checked')).map(function(c){ return c.value; });
  if(!ids.length){ hubToast('対象の精算書にチェックを入れてください'); return null; }
  return ids;
}
function shSelDocs(ids){
  var all=shList();
  return ids.map(function(id){ var r=all.find(function(x){return x.id===id;}); return r?shDocBlock(r.data||{}):''; }).filter(Boolean);
}
function shPrintSel(){
  var ids=shSelIds(); if(!ids) return;
  var docs=shSelDocs(ids);
  shPrintDirect(docs.map(function(h,i){ return '<div class="'+(i>0?'pgbreak':'')+'">'+h+'</div>'; }).join(''));
}
function shPdfSel(){
  var ids=shSelIds(); if(!ids) return;
  shPdfDownload(shSelDocs(ids), '出張旅費精算書_'+ids.length+'件.pdf');
}
// ── 一覧(氏名×対象月の精算書ごと) ──
function shPeriodKey(r){ var d=shNorm(r.data||{}); return d.period||'（対象月 未設定）'; }
function render(){
  var q=(document.getElementById('sh-q').value||'').trim().toLowerCase();
  var L=shList().filter(function(r){
    if(!q) return true;
    var d=shNorm(r.data||{});
    var hay=(d.name||'')+(d.period||'')+(d.note||'')+(d.trips||[]).map(function(t){return t.dest||'';}).join(' ');
    return hay.toLowerCase().indexOf(q)>=0;
  }).sort(function(a,b){
    var da=shNorm(a.data||{}).date||'', db2=shNorm(b.data||{}).date||'';
    return String(db2).localeCompare(String(da));
  });
  var byP={};
  L.forEach(function(r){ var p=shPeriodKey(r); (byP[p]=byP[p]||[]).push(r); });
  var periods=Object.keys(byP);
  var el=document.getElementById('sh-list');
  if(!periods.length){ el.innerHTML='<div style="color:#999;padding:24px;text-align:center">出張精算書はまだありません。「＋ 新規作成」から登録してください。</div>'; return; }
  el.innerHTML=periods.map(function(p){
    var rs=byP[p];
    var ptot=0; rs.forEach(function(r){ ptot+=shTotal(r.data||{}); });
    return '<div class="sh-month">'
      +'<div class="sh-mhead"><span>'+esc(p)+'</span>'
      +'<span style="font-size:12px;color:#64748b">'+rs.length+'件</span>'
      +'<span style="margin-left:auto;font-size:13px">日当合計 <b>¥'+ptot.toLocaleString()+'</b></span></div>'
      +rs.map(function(r){
        var d=shNorm(r.data||{}), c=shCounts(d);
        var dests=[]; (d.trips||[]).forEach(function(t){ if(t.dest && dests.indexOf(t.dest)<0) dests.push(t.dest); });
        return '<div class="sh-row">'
          +'<label style="display:flex;align-items:center;cursor:pointer"><input type="checkbox" class="sh-ck" value="'+esc(r.id)+'"></label>'
          +'<b style="min-width:90px">'+esc(d.name||'')+'</b>'
          +'<span class="sh-tag">日帰 '+c.day+'</span><span class="sh-tag">宿泊 '+c.stay+'</span>'
          +'<span style="flex:1;min-width:140px;color:#64748b">'+esc(dests.join('・'))+'</span>'
          +(d._legacy?'<span class="sh-tag" style="border-color:#f59e0b;background:#fef3c7" title="旧様式で作成されたデータを新様式に自動変換して表示しています">旧様式</span>':'')
          +'<span style="font-size:11px;color:#94a3b8">提出 '+esc(shFmtDate(d.date))+'</span>'
          +'<span class="sh-amt">¥'+c.total.toLocaleString()+'</span>'
          +'<span style="display:flex;gap:5px">'
          +'<button class="btn" style="padding:3px 9px;font-size:12px" onclick="shEdit(\''+r.id+'\')">✏ 編集</button>'
          +'<button class="btn" style="padding:3px 9px;font-size:12px" title="この精算書をコピーして新規作成" onclick="shCopy(\''+r.id+'\')">📋 複製</button>'
          +'<button class="btn" style="padding:3px 9px;font-size:12px" title="Excel(.xlsx)で書き出す" onclick="shExcel(\''+r.id+'\')">📊 Excel</button>'
          +'<button class="btn" style="padding:3px 9px;font-size:12px" title="PDFファイルで書き出す" onclick="shPdf(\''+r.id+'\')">📄 PDF</button>'
          +'<button class="btn" style="padding:3px 9px;font-size:12px" title="そのまま印刷（印刷ダイアログが開きます）" onclick="shPrint(\''+r.id+'\')">🖨 印刷</button>'
          +'<button class="btn" style="padding:3px 9px;font-size:12px;color:#c0261c" onclick="shDelete(\''+r.id+'\')">🗑</button>'
          +'</span></div>';
      }).join('')
      +'</div>';
  }).join('');
}
render();
</script>

<!-- HUB共通: 最新データに更新するフローティングボタン（自動挿入） -->
<style>
#hubRefreshBtn{position:fixed;right:16px;bottom:16px;z-index:99999;display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;color:#0f172a;background:#fde68a;
  border:1px solid #f59e0b;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.22);cursor:pointer;line-height:1;}
#hubRefreshBtn:hover{background:#fcd34d;}
#hubRefreshBtn:disabled{opacity:.6;cursor:default;}
@media print{#hubRefreshBtn{display:none!important;}}
</style>
<button id="hubRefreshBtn" title="クラウドの最新データに更新します" onclick="hubRefreshNow()">🔄 更新</button>
<script>
function hubRefreshNow(){
  var b=document.getElementById('hubRefreshBtn');
  var reset=function(){ if(b){ b.disabled=false; b.textContent='🔄 更新'; } };
  if(b){ b.disabled=true; b.textContent='⏳ 更新中…'; }
  // 入力中のセルを先に確定(保存)してから取り込む。未確定の入力がクラウドの古い値で消えるのを防ぐ。
  try{ var ae=document.activeElement; if(ae && ae.blur && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) ae.blur(); }catch(e){}
  try{
    // クラウド取込関数を持つツール（カレンダー受注台帳など）は、再読込せず最新だけ取り込む
    if(typeof hubCloudPull==='function'){
      Promise.resolve(hubCloudPull()).then(function(){
        try{ if(typeof _hubCacheClear==='function') _hubCacheClear(); }catch(e){}
        try{ if(typeof buildYears==='function') buildYears(); }catch(e){}
        try{ if(typeof buildCats==='function') buildCats(); }catch(e){}
        try{ if(typeof render==='function') render(); }catch(e){}
        try{ if(typeof hubToast==='function') hubToast('🔄 最新データに更新しました'); }catch(e){}
        reset();
      }).catch(function(){ location.reload(); });
      return;
    }
  }catch(e){}
  // それ以外のページはページごと再読込（本体アプリは再読込でクラウドから取り直す）
  location.reload();
}
</script>
<!-- HUB共通: アプリ自動更新＋更新履歴（自動挿入 hubUpdateKit） -->
<style>
#hubLogBtn{position:fixed;right:16px;bottom:58px;z-index:99999;width:38px;height:38px;border-radius:50%;
  border:1px solid #cbd5e1;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.18);cursor:pointer;font-size:17px;line-height:1;}
#hubLogBtn:hover{background:#f1f5f9;}
#hubLogPanel{position:fixed;right:16px;bottom:104px;z-index:99999;width:min(360px,calc(100vw - 32px));max-height:60vh;overflow:auto;
  background:#fff;border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:12px 14px;display:none;font-size:12px;color:#0f172a;text-align:left;}
#hubLogPanel h3{margin:0 0 8px;font-size:13px;}
#hubLogPanel .d{font-weight:700;margin:10px 0 3px;color:#0369a1;}
#hubLogPanel ul{margin:0 0 4px;padding-left:17px;}
#hubLogPanel li{margin:2px 0;line-height:1.45;}
#hubUpBanner{position:fixed;left:50%;transform:translateX(-50%);top:10px;z-index:100000;display:none;align-items:center;gap:10px;
  background:#0f172a;color:#fff;padding:9px 14px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.35);font-size:13px;}
#hubUpBanner button{font-family:inherit;font-size:12px;font-weight:700;border-radius:7px;border:0;padding:5px 11px;cursor:pointer;background:#fde68a;color:#0f172a;}
@media print{#hubLogBtn,#hubLogPanel,#hubUpBanner{display:none!important;}}
</style>
<button id="hubLogBtn" title="更新履歴を表示" onclick="hubToggleLog()">📋</button>
<div id="hubLogPanel"></div>
<div id="hubUpBanner"><span>🆕 新しい版があります（<b id="hubUpCnt">15</b>秒後に自動更新）</span><button onclick="hubDoUpdate()">今すぐ更新</button><button style="background:#334155;color:#fff" onclick="hubCancelUpdate()">後で</button></div>
<script>
(function(){
  var BASE = location.pathname.indexOf('/tools/')>=0 ? '../' : './';
  // ===== 更新履歴 =====
  window.hubToggleLog=function(){
    var p=document.getElementById('hubLogPanel');
    if(p.style.display==='block'){ p.style.display='none'; return; }
    p.style.display='block'; p.innerHTML='<h3>📋 更新履歴</h3>読み込み中…';
    fetch(BASE+'changelog.json?ts='+Date.now(), {cache:'no-store'}).then(function(r){return r.json();}).then(function(list){
      var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');};
      p.innerHTML='<h3>📋 更新履歴</h3>'+list.map(function(e){
        return '<div class="d">'+esc(e.date)+'</div><ul>'+e.items.map(function(i){return '<li>'+esc(i)+'</li>';}).join('')+'</ul>';
      }).join('');
    }).catch(function(){ p.innerHTML='<h3>📋 更新履歴</h3>取得できませんでした'; });
  };
  // ===== アプリ本体の自動更新 =====
  // service-worker.js の版番号を定期取得し、変わっていたら再読込して新しい版に切り替える。
  var curVer=null, timer=null;
  function fetchVer(){
    return fetch(BASE+'service-worker.js?ts='+Date.now(), {cache:'no-store'})
      .then(function(r){ return r.text(); })
      .then(function(t){ var m=t.match(/CACHE_VERSION\s*=\s*'([^']+)'/); return m?m[1]:null; })
      .catch(function(){ return null; });
  }
  window.hubDoUpdate=function(){ try{ sessionStorage.setItem('hubJustUpdated','1'); }catch(e){} location.reload(); };
  window.hubCancelUpdate=function(){ if(timer){ clearInterval(timer); timer=null; } var b=document.getElementById('hubUpBanner'); if(b) b.style.display='none'; };
  function showBanner(){
    var b=document.getElementById('hubUpBanner'); if(!b || b.style.display==='flex') return;
    b.style.display='flex';
    var n=15, c=document.getElementById('hubUpCnt'); c.textContent=n;
    timer=setInterval(function(){
      var ae=document.activeElement;
      if(ae && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) return;   // 入力中はカウントを止める
      n--; c.textContent=n;
      if(n<=0){ clearInterval(timer); hubDoUpdate(); }
    }, 1000);
  }
  function check(){
    fetchVer().then(function(v){
      if(!v) return;
      if(curVer===null){ curVer=v; return; }
      if(v===curVer) return;
      // 新しい版を検知: 非表示タブは即時、表示中はバナー＋カウントダウンで自動更新
      if(document.hidden){ hubDoUpdate(); } else { showBanner(); }
    });
  }
  fetchVer().then(function(v){ curVer=v; });
  setInterval(check, 180000);   // 3分ごとに版を確認
  window.addEventListener('focus', check);
  try{ if(sessionStorage.getItem('hubJustUpdated')){ sessionStorage.removeItem('hubJustUpdated'); } }catch(e){}
})();
</script>
