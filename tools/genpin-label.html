<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>現品票ラベル（トキワ・Nana C6I） | Tokiwa Hub Tools</title>
<style>
  :root{ --ink:#211f1c; --line:#e2e0da; --bg:#f4f3f0; --teal:#0e7c86; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:var(--bg); color:var(--ink); font-size:13px; }
  header{ background:var(--ink); color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; }
  header .logo{ font-weight:800; letter-spacing:.04em; font-size:14px; } header .logo b{ color:#a3e635; }
  header .tname{ font-size:15px; font-weight:800; } header .sub{ font-size:10px; color:#cbd5e1; letter-spacing:.12em; text-transform:uppercase; }
  header .back{ margin-left:auto; font-size:12px; color:#cbd5e1; text-decoration:none; }
  main{ max-width:1180px; margin:14px auto; padding:0 14px; display:grid; grid-template-columns:380px 1fr; gap:16px; }
  @media(max-width:900px){ main{ grid-template-columns:1fr; } }
  .card{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px 16px; }
  label{ display:block; font-size:11px; font-weight:700; color:#555; margin:8px 0 3px; }
  input,textarea,select{ width:100%; font-family:inherit; border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:13px; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .ck{ display:flex; align-items:center; gap:6px; font-weight:400; margin-top:10px; font-size:13px; }
  .ck input{ width:auto; }
  .btn{ background:#fff; border:1px solid var(--line); border-radius:7px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn.pri{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .hint{ font-size:11px; color:#94a3b8; margin-top:6px; line-height:1.6; }
  .st{ font-size:10px; font-weight:800; color:#999; letter-spacing:.08em; text-transform:uppercase; margin:14px 0 2px; border-top:1px solid var(--line); padding-top:10px; }
  #preview{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; overflow:auto; }

  /* ── ラベル設計（148.5×70mm 横向き。印刷時は各セルで90°回転してC6I(70×148.5縦)に収める）── */
  .gp{ width:148.5mm; height:70mm; border:.3mm solid #000; box-sizing:border-box; display:flex; flex-direction:column; font-size:9pt; color:#000; background:#fff; overflow:hidden; }
  .gp .r{ display:flex; border-bottom:.2mm solid #000; }
  .gp .r:last-child{ border-bottom:none; }
  .gp .c{ position:relative; border-right:.2mm solid #000; padding:2.6mm 1.6mm 1mm; overflow:hidden; }
  .gp .c:last-child{ border-right:none; }
  .gp .k{ position:absolute; top:.4mm; left:1.2mm; font-size:5.6pt; color:var(--teal); letter-spacing:.02em; }
  .gp .v{ font-size:10pt; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gp .v.big{ font-size:12pt; }
  .gp .sama{ position:absolute; right:1.4mm; bottom:.4mm; font-size:11pt; font-weight:700; }
  .gp .r1{ height:14mm; } .gp .r2{ height:9.5mm; } .gp .r3{ height:11mm; } .gp .r4{ height:12mm; } .gp .r5{ height:12mm; }
  .gp .foot{ height:11mm; display:flex; align-items:center; gap:2mm; padding:0 2mm; border-top:.2mm solid #000; }
  .gp .foot .co{ font-size:12pt; font-weight:800; letter-spacing:.02em; }
  .gp .foot .ad{ font-size:6.5pt; line-height:1.25; color:#111; }
  .gp .foot .mk{ font-size:11pt; font-weight:800; color:var(--teal); }
  .num{ display:flex; align-items:baseline; gap:1mm; }
  .num .s{ font-size:6pt; color:#000; }
  /* プレビュー用の縮尺枠 */
  .sheetprev{ transform-origin:top left; }
</style>
</head>
<body>
<header>
  <span class="logo">TOKIWA <b>HUB</b></span>
  <div><div class="tname">🏷 現品票ラベル（Nana C6I）</div><div class="sub">GENPIN LABEL / 6-UP A4 / 70×148.5</div></div>
  <a class="back" href="../index.html">← Hubへ戻る</a>
</header>
<main>
  <div style="grid-column:1/-1;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;color:#64748b;font-weight:700">種類：</span>
    <a href="label-maker.html" style="background:#fff;border:1px solid var(--line);border-radius:7px;padding:6px 12px;font-size:13px;font-weight:700;color:#334155;text-decoration:none">← 🏷 配送ラベル（汎用）</a>
    <span style="background:var(--ink);color:#fff;border-radius:7px;padding:6px 12px;font-size:13px;font-weight:700">🏷 現品票ラベル（トキワ様式・C6I）</span>
  </div>
  <div class="card">
    <div class="st">記載内容</div>
    <label>品名コード</label><input id="f-code" oninput="pv()">
    <div class="row">
      <div><label>サイズ・パーツ</label><input id="f-size" oninput="pv()"></div>
      <div><label>入　数</label><input id="f-iri" oninput="pv()" placeholder="例: 500"></div>
    </div>
    <label>品　名</label><input id="f-item" oninput="pv()">
    <label>御得意先様</label><input id="f-cust" oninput="pv()" placeholder="例: 丸山西木材産業">
    <div class="row">
      <div><label>オーダーナンバー</label><input id="f-order" oninput="pv()"></div>
      <div><label>連続ナンバー（開始・任意）</label><input id="f-serial" oninput="pv()" placeholder="例: 1001"></div>
    </div>

    <div class="st">箱・枚数</div>
    <div class="row3">
      <div><label>箱数（個口）</label><input id="f-boxes" type="number" min="1" max="200" value="1" oninput="pv()"></div>
      <div><label>各面コピー</label><input id="f-copies" type="number" min="1" max="60" value="1" oninput="pv()"></div>
      <div><label>開始位置(1-6)</label><input id="f-start" type="number" min="1" max="6" value="1" oninput="pv()"></div>
    </div>
    <div class="hint">箱数を入れると「個口N・番n」「連続ナンバー」を1..Nで連番生成します。開始位置＝使いかけシートの続き（左上=1）。</div>

    <div class="st">社名フッター</div>
    <label class="ck"><input type="checkbox" id="f-showco" checked onchange="pv()"> 社名フッターを表示する（OFF＝ブランク版）</label>
    <label>社名</label><input id="f-coname" value="トキワ印刷株式会社" oninput="pv()">
    <label>住所・TEL（改行で2行まで）</label><textarea id="f-coaddr" rows="2" oninput="pv()">静岡県浜松市中央区法枝町115　☎053-441-2784代</textarea>

    <div class="st">印刷位置の微調整（テスト印刷後に合わせる）</div>
    <div class="row">
      <div><label>上オフセット mm</label><input id="f-ox" type="number" step="0.5" value="0" oninput="pv()"></div>
      <div><label>左オフセット mm</label><input id="f-oy" type="number" step="0.5" value="0" oninput="pv()"></div>
    </div>

    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn" onclick="pv()">🔄 プレビュー更新</button>
      <button class="btn pri" onclick="doPrint()">🖨 印刷</button>
    </div>
    <div class="hint">⚠ 実ラベル(C6I)の前に、必ず<b>普通紙にテスト印刷</b>して台紙に重ね、上下左右のオフセットで合わせてください。印刷は「実際のサイズ・倍率100%・余白なし」で。</div>
  </div>

  <div id="preview"></div>
</main>

<script>
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function val(id){ return (document.getElementById(id).value||'').trim(); }
// C6I 諸元(mm)
var SHEET={ pw:210, ph:297, lw:70, lh:148.5, cols:3, rows:2, mt:0, ml:0, gx:0.2, gy:0.2 };

// ラベル1枚(横148.5×70)のHTML。n=この箱の番号 / N=個口総数
function labelHTML(o, n, N){
  var showco=o.showco;
  var serial = o.serial ? String((parseInt(o.serial,10)||0) + (n-1)) : '';
  var cust = o.cust ? (esc(o.cust)) : '';
  var h=''
   +'<div class="gp">'
   +  '<div class="r r1">'
   +    '<div class="c" style="flex:0 0 62%"><span class="k">品名コード</span><span class="v">'+esc(o.code)+'</span></div>'
   +    '<div class="c" style="flex:1"><span class="k">サイズ・パーツ</span><span class="v">'+esc(o.size)+'</span></div>'
   +  '</div>'
   +  '<div class="r r2"><div class="c" style="flex:1;border-right:none"><span class="k">品　名</span><span class="v">'+esc(o.item)+'</span></div></div>'
   +  '<div class="r r3"><div class="c" style="flex:1;border-right:none"><span class="k">御得意先様</span><span class="v big">'+cust+'</span><span class="sama">様</span></div></div>'
   +  '<div class="r r4">'
   +    '<div class="c" style="flex:0 0 34%"><span class="k">入　数</span><span class="v big">'+esc(o.iri)+'</span></div>'
   +    '<div class="c" style="flex:1"><span class="k">オーダーナンバー</span><span class="v">'+esc(o.order)+'</span></div>'
   +    '<div class="c" style="flex:0 0 16%;border-right:none"></div>'
   +  '</div>'
   +  '<div class="r r5">'
   +    '<div class="c" style="flex:0 0 22%"></div>'
   +    '<div class="c" style="flex:0 0 42%"><span class="k">箱ナンバー</span><span class="num" style="margin-top:2mm"><span class="v big">'+N+'</span><span class="s">個口</span><span class="v big">'+n+'</span><span class="s">番</span></span></div>'
   +    '<div class="c" style="flex:1;border-right:none"><span class="k">連続ナンバー</span><span class="v big">'+esc(serial)+'</span></div>'
   +  '</div>'
   + (showco ? ('<div class="foot"><span class="mk">◆</span><span class="co">'+esc(o.coname)+'</span><span class="ad">'+esc(o.coaddr).replace(/\n/g,'<br>')+'</span></div>') : '')
   +'</div>';
  return h;
}

function readForm(){
  return {
    code:val('f-code'), size:val('f-size'), iri:val('f-iri'), item:val('f-item'),
    cust:val('f-cust'), order:val('f-order'), serial:val('f-serial'),
    boxes:Math.max(1,Math.min(200,parseInt(val('f-boxes'))||1)),
    copies:Math.max(1,Math.min(60,parseInt(val('f-copies'))||1)),
    start:Math.max(1,Math.min(6,parseInt(val('f-start'))||1)),
    showco:document.getElementById('f-showco').checked,
    coname:val('f-coname'), coaddr:val('f-coaddr'),
    ox:parseFloat(val('f-ox'))||0, oy:parseFloat(val('f-oy'))||0
  };
}
// 全ラベル(箱1..N × copies)のHTML配列
function buildLabels(o){
  var arr=[]; var N=o.boxes;
  for(var n=1;n<=N;n++){ for(var c=0;c<o.copies;c++) arr.push(labelHTML(o,n,N)); }
  return arr;
}

// C6Iシート(3列×2行)のHTML。回転してセルに収める
function sheetsHTML(o){
  var labels=buildLabels(o);
  var per=SHEET.cols*SHEET.rows;   // 6
  var pos=Math.min(o.start,per)-1;
  var pages=[]; var cur=new Array(per).fill('');
  var filled=pos;
  // 先頭の空きを飛ばす
  labels.forEach(function(lab){
    if(filled>=per){ pages.push(cur); cur=new Array(per).fill(''); filled=0; }
    cur[filled]=lab; filled++;
  });
  pages.push(cur);
  var cellW=SHEET.lw, cellH=SHEET.lh;
  var html='';
  pages.forEach(function(cells){
    var inner='';
    cells.forEach(function(lab){
      inner += '<div class="cell">'+(lab?('<div class="rot">'+lab+'</div>'):'')+'</div>';
    });
    html += '<div class="page">'+inner+'</div>';
  });
  return html;
}

function sheetCSS(o){
  return '@page{size:A4 portrait;margin:0}'
    +'body{margin:0}'
    +'.page{width:'+SHEET.pw+'mm;height:'+SHEET.ph+'mm;box-sizing:border-box;padding-top:'+(SHEET.mt+o.ox)+'mm;padding-left:'+(SHEET.ml+o.oy)+'mm;'
    +'display:grid;grid-template-columns:repeat('+SHEET.cols+','+SHEET.lw+'mm);grid-template-rows:repeat('+SHEET.rows+','+SHEET.lh+'mm);column-gap:'+SHEET.gx+'mm;row-gap:'+SHEET.gy+'mm;page-break-after:always;break-after:page}'
    +'.page:last-child{page-break-after:auto;break-after:auto}'
    +'.cell{width:'+SHEET.lw+'mm;height:'+SHEET.lh+'mm;position:relative;overflow:hidden}'
    +'.rot{position:absolute;top:50%;left:50%;width:'+SHEET.lh+'mm;height:'+SHEET.lw+'mm;transform:translate(-50%,-50%) rotate(-90deg);transform-origin:center center}';
}

function pv(){
  var o=readForm();
  var css=[
    '.gp{width:148.5mm;height:70mm;border:.3mm solid #000;box-sizing:border-box;display:flex;flex-direction:column;font-size:9pt;color:#000;background:#fff;overflow:hidden}',
    document.querySelector('style').innerHTML  // 既存の .gp 系スタイルを流用
  ];
  // プレビューは回転せず横向きの1枚＋シート俯瞰
  var one=labelHTML(o,1,o.boxes);
  var prev=document.getElementById('preview');
  var scale=Math.min(1,(prev.clientWidth-40)/ (148.5*3.7795) );
  prev.innerHTML=
     '<div style="font-size:11px;color:#94a3b8;margin-bottom:6px">ラベル1枚（148.5×70mm・実寸の約'+Math.round(scale*100)+'%）</div>'
    +'<div class="sheetprev" style="transform:scale('+scale+')">'+one+'</div>'
    +'<div style="clear:both;height:'+Math.round(70*3.7795*scale+10)+'px"></div>'
    +'<div style="font-size:11px;color:#94a3b8;margin:10px 0 6px">C6I 6面（A4・3列×2行）に90°回転で配置。印刷イメージ↓</div>'
    +miniSheet(o, prev.clientWidth-40);
}
// A4シートのミニ俯瞰（面付け位置の確認用・軽量：枠と番号のみ）
function miniSheet(o, wpx){
  var mm2px=Math.min(wpx,260)/210;
  var labels=buildLabels(o);
  var per=6, pos=Math.min(o.start,6)-1;
  var used=Math.min(6, pos+labels.length);
  var html='<div style="position:relative;width:'+(210*mm2px)+'px;height:'+(297*mm2px)+'px;border:1px solid #cbd5e1;background:#fafafa">';
  for(var r=0;r<2;r++) for(var c=0;c<3;c++){
    var i=r*3+c;
    var x=(SHEET.ml + c*(SHEET.lw+SHEET.gx))*mm2px;
    var y=(SHEET.mt + r*(SHEET.lh+SHEET.gy))*mm2px;
    var w=SHEET.lw*mm2px, h=SHEET.lh*mm2px;
    var on=(i>=pos && i<used);
    html+='<div style="position:absolute;left:'+x+'px;top:'+y+'px;width:'+w+'px;height:'+h+'px;border:1px dashed '+(on?'#0e7c86':'#e2e0da')+';background:'+(on?'#ecfeff':'#fff')+';'
      +'display:flex;align-items:center;justify-content:center;font-size:10px;color:'+(on?'#0e7c86':'#cbd5e1')+'">'+(on?'ラベル':(i+1))+'</div>';
  }
  html+='</div><div style="font-size:10px;color:#94a3b8;margin-top:4px">※各セルに現品票を90°回転で配置（縦70×横148.5→縦148.5×横70）</div>';
  return html;
}

function doPrint(){
  var o=readForm();
  var w=window.open('','_blank');
  // 現行スタイルの .gp 系だけ取り出して埋め込む
  var base=document.querySelector('style').innerHTML;
  var css=base + sheetCSS(o);
  w.document.write('<html><head><meta charset="utf-8"><title>現品票ラベル C6I</title><style>'+css+'</style></head><body>'+sheetsHTML(o)+'</body></html>');
  w.document.close();
  setTimeout(function(){ try{ w.focus(); w.print(); }catch(e){} }, 350);
}

pv();
window.addEventListener('resize', pv);
</script>
</body>
</html>
