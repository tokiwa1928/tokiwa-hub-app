<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🖨 データ生成（差込・ラベル・名刺・連番）| Quote Tools</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
  body{font-family:system-ui,'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;margin:0;background:#f4f3f0;color:#1a1a1a}
  .top{background:#1e293b;color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .top b{font-size:15px}
  .tabs{display:flex;gap:4px;padding:10px 16px 0;background:#fff;border-bottom:1px solid #ddd;flex-wrap:wrap}
  .tab{padding:8px 16px;border:1px solid #ddd;border-bottom:none;border-radius:7px 7px 0 0;background:#eef0f3;color:#555;cursor:pointer;font-size:13px;font-weight:700}
  .tab.act{background:#fff;color:#1e293b;border-color:#1e293b}
  .pane{display:none;padding:16px;max-width:1000px;margin:0 auto}
  .pane.act{display:block}
  .card{background:#fff;border:1px solid #e0ddd6;border-radius:8px;padding:14px;margin-bottom:14px}
  label{font-size:12px;color:#444;font-weight:600;display:block;margin:6px 0 2px}
  input,select,textarea{font-size:13px;padding:6px 8px;border:1px solid #ccc;border-radius:6px;font-family:inherit;width:100%;box-sizing:border-box}
  textarea{min-height:120px;font-family:monospace;font-size:12px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>div{flex:1;min-width:120px}
  .btn{font-size:13px;font-weight:700;padding:8px 16px;border:1px solid #1e293b;background:#1e293b;color:#fff;border-radius:7px;cursor:pointer}
  .btn.sub{background:#fff;color:#1e293b}
  .hint{font-size:11px;color:#777;line-height:1.6;margin:4px 0}
  canvas{max-width:100%;border:1px solid #e0ddd6;border-radius:6px;background:#fff;margin-top:8px}
</style>
</head>
<body>
<div class="top"><b>🖨 データ生成ツール</b><span style="font-size:12px;opacity:.85">CSV/入力 → 印刷用PDF をブラウザ内で生成（DTP軽減）。日本語OK・PC内処理</span></div>
<div class="tabs">
  <div class="tab act" data-t="merge" onclick="sw('merge')">📋 差し込み(CSV→多面)</div>
  <div class="tab" data-t="label" onclick="sw('label')">🏷 宛名ラベル</div>
  <div class="tab" data-t="card" onclick="sw('card')">💳 名刺</div>
  <div class="tab" data-t="num" onclick="sw('num')">🔢 連番・ナンバリング</div>
</div>

<!-- 差し込み (ビジュアル編集) -->
<div class="pane act" id="pane-merge">
  <div class="card">
    <div class="hint">🎨 ビジュアル編集：要素をドラッグで移動、画像も配置できます。テキストに <b>{{見出し}}</b> を入れるとデータが差し込まれます。</div>
    <div class="row">
      <div style="flex:2;min-width:300px">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center">
          <button class="btn sub" onclick="edAddText()">＋ テキスト</button>
          <button class="btn sub" onclick="document.getElementById('ed-img-file').click()">＋ 画像</button>
          <input type="file" id="ed-img-file" accept="image/*" style="display:none" onchange="edAddImage(this)">
          <span style="font-size:11px;color:#777">面サイズ:</span>
          <input id="ed-cw" type="number" value="91" style="width:64px" onchange="edRenderEditor()" title="面の幅mm"> ×
          <input id="ed-ch" type="number" value="55" style="width:64px" onchange="edRenderEditor()" title="面の高さmm"> mm
          <button class="btn sub" onclick="edPreset('card')" style="font-size:11px">名刺91×55</button>
          <button class="btn sub" onclick="edPreset('postcard')" style="font-size:11px">ハガキ100×148</button>
          <button class="btn sub" onclick="edPreset('label')" style="font-size:11px">ラベル86×46</button>
        </div>
        <div id="ed-stage-wrap" style="background:#e5e7eb;padding:14px;border-radius:8px;overflow:auto">
          <div id="ed-stage" style="position:relative;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.2);margin:0 auto"></div>
        </div>
        <div class="hint">要素をクリックで選択→ドラッグ移動。画像は右下の□でリサイズ。Deleteキー/🗑で削除。</div>
      </div>
      <div style="flex:1;min-width:220px">
        <div id="ed-props" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;font-size:12px;min-height:120px">要素を選択すると編集できます</div>
        <label style="margin-top:10px">差込データ（1行目=見出し、1件1行）
          <button class="btn sub" style="font-size:10px;padding:2px 8px;margin-left:6px" onclick="document.getElementById('m-csv-file').click()">📄 CSV読込</button>
          <input type="file" id="m-csv-file" accept=".csv,.txt,text/csv" style="display:none" onchange="loadMergeCsv(this)">
        </label>
        <textarea id="m-data" style="min-height:90px">氏名,会社,住所
山田太郎,富士食品,東京都新宿区1-1-1
佐藤花子,北山商事,大阪府大阪市2-2-2</textarea>
        <div class="row">
          <div><label>面付横×縦</label><div class="row"><input id="m-cols" type="number" value="2"><input id="m-rows" type="number" value="5"></div></div>
          <div><label>用紙</label><select id="m-paper"><option value="A4">A4縦</option><option value="A4L">A4横</option></select></div>
        </div>
        <div style="margin-top:10px"><button class="btn" onclick="genMerge(false)">👁 プレビュー</button> <button class="btn" onclick="genMerge(true)">📄 PDF生成</button></div>
        <canvas id="m-cv" style="display:none"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- ラベル -->
<div class="pane" id="pane-label">
  <div class="card">
    <label>ラベル台紙</label>
    <select id="l-preset" onchange="">
      <option value="3,4,0,0">A4 12面 (横3×縦4 / 約63×72mm)</option>
      <option value="2,6,0,0">A4 12面 (横2×縦6 / 約86×46mm)</option>
      <option value="3,8,0,0">A4 24面 (横3×縦8 / 約63×34mm)</option>
      <option value="4,11,0,0">A4 44面 (横4×縦11 / 約45×25mm)</option>
    </select>
    <label>宛名データ（1件1行。改行で複数行ラベル可。空行で次のラベルへ）</label>
    <textarea id="l-data">〒100-0001
東京都千代田区1-1
富士食品株式会社
山田太郎 様

〒540-0001
大阪府大阪市2-2
北山商事
佐藤花子 様</textarea>
    <div class="row"><div><label>文字サイズ(pt)</label><input id="l-fs" type="number" value="10"></div><div><label>余白(mm)</label><input id="l-pad" type="number" value="4"></div></div>
    <div style="margin-top:10px"><button class="btn" onclick="genLabel(false)">👁 プレビュー</button> <button class="btn" onclick="genLabel(true)">📄 PDF生成</button></div>
    <canvas id="l-cv" style="display:none"></canvas>
  </div>
</div>

<!-- 名刺 -->
<div class="pane" id="pane-card">
  <div class="card">
    <div class="hint">A4に10面（91×55mm・横2×縦5）で配置。複数人はデータ欄に1人1行（氏名,部署,会社,TEL,Email）で量産。</div>
    <div class="row">
      <div><label>会社名</label><input id="c-co" value="トキワ印刷株式会社"></div>
      <div><label>住所</label><input id="c-addr" value="東京都武蔵村山市残堀2-1-1"></div>
    </div>
    <label>名刺データ（1人1行: 氏名,部署,会社(空欄可),TEL,Email）</label>
    <textarea id="c-data">本多 亮,営業部,,042-560-2431,honda@tokiwap.co.jp
山田 太郎,制作部,,042-560-2431,yamada@tokiwap.co.jp</textarea>
    <div class="row"><div><label>面数(同一人を何面)</label><input id="c-each" type="number" value="10"></div></div>
    <div style="margin-top:10px"><button class="btn" onclick="genCard(false)">👁 プレビュー</button> <button class="btn" onclick="genCard(true)">📄 PDF生成</button></div>
    <canvas id="c-cv" style="display:none"></canvas>
  </div>
</div>

<!-- 連番 -->
<div class="pane" id="pane-num">
  <div class="card">
    <div class="row">
      <div><label>接頭辞</label><input id="n-pre" value="No."></div>
      <div><label>開始番号</label><input id="n-start" type="number" value="1"></div>
      <div><label>桁数(0埋め)</label><input id="n-digits" type="number" value="4"></div>
      <div><label>総数</label><input id="n-count" type="number" value="100"></div>
    </div>
    <div class="row">
      <div><label>面付（横×縦）</label><div class="row"><input id="n-cols" type="number" value="4"><input id="n-rows" type="number" value="10"></div></div>
      <div><label>文字サイズ(pt)</label><input id="n-fs" type="number" value="18"></div>
      <div><label>用紙</label><select id="n-paper"><option value="A4">A4縦</option><option value="A4L">A4横</option></select></div>
    </div>
    <div style="margin-top:10px"><button class="btn" onclick="genNum(false)">👁 プレビュー</button> <button class="btn" onclick="genNum(true)">📄 PDF生成</button></div>
    <canvas id="n-cv" style="display:none"></canvas>
  </div>
</div>

<script>
var jsPDF = window.jspdf.jsPDF;
function sw(t){ document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('act',b.dataset.t===t);}); document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('act',p.id==='pane-'+t);}); }
// 案件管理からの受け渡し (納品ラベル等) — localStorage 経由でデータを受け取りラベルタブにセット
(function(){
  try{
    var raw = localStorage.getItem('tokiwa_datagen_handoff');
    if(!raw) return;
    localStorage.removeItem('tokiwa_datagen_handoff');
    var h = JSON.parse(raw);
    if(h && h.tab === 'label' && h.labelData){
      window.addEventListener('DOMContentLoaded', function(){
        document.getElementById('l-data').value = h.labelData;
        if(h.preset){ var sel=document.getElementById('l-preset'); for(var i=0;i<sel.options.length;i++){ if(sel.options[i].value===h.preset){ sel.selectedIndex=i; break; } } }
        sw('label');
        if(h.title){ var t=document.querySelector('.top b'); if(t) t.textContent='🖨 ' + h.title; }
      });
    }
  }catch(e){}
})();
var MM2PX = 11.81; // 300dpi相当 (mm * 300/25.4)
// 1セル(mm)をcanvasに描き、textsを配置
function drawCell(cw, ch, drawFn){
  var cv = document.createElement('canvas');
  cv.width = Math.round(cw*MM2PX); cv.height = Math.round(ch*MM2PX);
  var ctx = cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#111'; ctx.textBaseline='top';
  drawFn(ctx, cv);
  return cv;
}
function ptToPx(pt){ return pt*MM2PX*0.3528; } // pt→mm(0.3528)→px
// 多面PDF生成エンジン: items[].drawFn(ctx) を grid に配置
function buildGridPdf(opts){
  var paperW = opts.landscape?297:210, paperH = opts.landscape?210:297;
  var doc = new jsPDF({orientation: opts.landscape?'landscape':'portrait', unit:'mm', format:'a4'});
  var cols=opts.cols, rows=opts.rows, per=cols*rows;
  var cw = (opts.cellW || paperW/cols), ch=(opts.cellH || paperH/rows);
  var ox = (paperW - cw*cols)/2, oy=(paperH - ch*rows)/2;
  var firstCv=null;
  opts.items.forEach(function(it, idx){
    var page=Math.floor(idx/per), pos=idx%per;
    if(idx>0 && pos===0) doc.addPage();
    var c=pos%cols, r=Math.floor(pos/cols);
    var cv=drawCell(cw, ch, it);
    if(!firstCv) firstCv=cv;
    doc.addImage(cv.toDataURL('image/jpeg',0.92),'JPEG', ox+c*cw, oy+r*ch, cw, ch);
  });
  return {doc:doc, preview:firstCv};
}
function parseRows(txt){ return txt.split(/\r?\n/).map(function(l){return l.split(/[\t,]/).map(function(s){return s.trim();});}); }
// CSV読込 (Shift_JIS/UTF-8 自動判定)
function loadMergeCsv(inp){
  var f=inp.files[0]; if(!f) return;
  var fr=new FileReader();
  fr.onload=function(){
    var buf=fr.result, text;
    try{ text=new TextDecoder('utf-8',{fatal:true}).decode(buf); }
    catch(e){ try{ text=new TextDecoder('shift_jis').decode(buf); }catch(e2){ text=new TextDecoder('utf-8').decode(buf); } }
    // 文字化けっぽければShift_JISで再デコード
    if(/�/.test(text)){ try{ text=new TextDecoder('shift_jis').decode(buf); }catch(e){} }
    document.getElementById('m-data').value=text.replace(/\r\n?/g,'\n').trim();
    alert('📄 CSVを読み込みました（'+(text.split(/\r?\n/).filter(function(l){return l.trim();}).length-1)+'件）');
  };
  fr.readAsArrayBuffer(f);
  inp.value='';
}
function showPreview(id, cv){ var el=document.getElementById(id); el.style.display=''; el.width=cv.width; el.height=cv.height; el.getContext('2d').drawImage(cv,0,0); }

// 🎨 ビジュアル編集エンジン — 要素を mm 座標で保持しドラッグ編集
var ED = { els:[], sel:null, scale:3.2 }; // scale = px/mm の表示倍率
function edCW(){ return +document.getElementById('ed-cw').value||91; }
function edCH(){ return +document.getElementById('ed-ch').value||55; }
function edPreset(k){
  var p={card:[91,55],postcard:[100,148],label:[86,46]}[k]; if(!p) return;
  document.getElementById('ed-cw').value=p[0]; document.getElementById('ed-ch').value=p[1]; edRenderEditor();
}
function edAddText(){
  ED.els.push({type:'text', x:5, y:5, t:'{{氏名}} 様', fs:12, bold:true, color:'#111'});
  ED.sel=ED.els.length-1; edRenderEditor();
}
function edAddImage(inp){
  var f=inp.files[0]; if(!f) return;
  var fr=new FileReader();
  fr.onload=function(){
    var img=new Image();
    img.onload=function(){
      var maxW=edCW()*0.5, w=maxW, h=w*img.height/img.width;
      ED.els.push({type:'image', x:3, y:3, w:w, h:h, src:fr.result});
      ED.sel=ED.els.length-1; edRenderEditor();
    };
    img.src=fr.result;
  };
  fr.readAsDataURL(f);
  inp.value='';
}
function edRenderEditor(){
  var st=document.getElementById('ed-stage'); if(!st) return;
  var s=ED.scale, cw=edCW(), ch=edCH();
  st.style.width=(cw*s)+'px'; st.style.height=(ch*s)+'px';
  st.innerHTML='';
  ED.els.forEach(function(el,i){
    var d=document.createElement('div');
    d.style.cssText='position:absolute;left:'+(el.x*s)+'px;top:'+(el.y*s)+'px;cursor:move;'+(i===ED.sel?'outline:2px solid #2563eb;':'outline:1px dashed #cbd5e1;');
    if(el.type==='text'){
      d.style.font=(el.bold?'bold ':'')+(el.fs*s*0.3528)+'px sans-serif';
      d.style.color=el.color||'#111'; d.style.whiteSpace='nowrap'; d.style.padding='1px 2px';
      d.textContent=el.t||'';
    } else {
      d.style.width=(el.w*s)+'px'; d.style.height=(el.h*s)+'px';
      d.innerHTML='<img src="'+el.src+'" style="width:100%;height:100%;object-fit:contain;pointer-events:none">';
      if(i===ED.sel){ var hd=document.createElement('div'); hd.className='ed-resize'; hd.style.cssText='position:absolute;right:-6px;bottom:-6px;width:12px;height:12px;background:#2563eb;border-radius:50%;cursor:nwse-resize'; d.appendChild(hd); }
    }
    d.dataset.i=i;
    d.addEventListener('pointerdown', edDragStart);
    st.appendChild(d);
  });
  edRenderProps();
}
var _drag=null;
function edDragStart(e){
  var i=+this.dataset.i; ED.sel=i;
  var resize=e.target.classList.contains('ed-resize');
  _drag={ i:i, sx:e.clientX, sy:e.clientY, ox:ED.els[i].x, oy:ED.els[i].y, ow:ED.els[i].w, oh:ED.els[i].h, resize:resize };
  e.preventDefault(); edRenderEditor();
  window.addEventListener('pointermove', edDragMove);
  window.addEventListener('pointerup', edDragEnd);
}
function edDragMove(e){
  if(!_drag) return; var s=ED.scale, el=ED.els[_drag.i];
  var dx=(e.clientX-_drag.sx)/s, dy=(e.clientY-_drag.sy)/s;
  if(_drag.resize && el.type==='image'){ el.w=Math.max(5,_drag.ow+dx); el.h=Math.max(5,_drag.oh+dy); }
  else { el.x=Math.max(0,Math.round((_drag.ox+dx)*10)/10); el.y=Math.max(0,Math.round((_drag.oy+dy)*10)/10); }
  edRenderEditor();
}
function edDragEnd(){ _drag=null; window.removeEventListener('pointermove',edDragMove); window.removeEventListener('pointerup',edDragEnd); }
function edRenderProps(){
  var box=document.getElementById('ed-props'); var el=ED.els[ED.sel];
  if(!el){ box.innerHTML='要素を選択すると編集できます'; return; }
  if(el.type==='text'){
    box.innerHTML='<b>📝 テキスト</b>'
      +'<label>内容 ({{見出し}}で差込)</label><input id="ep-t" value="'+(el.t||'').replace(/"/g,'&quot;')+'" oninput="ED.els[ED.sel].t=this.value;edRenderEditor()">'
      +'<div class="row"><div><label>サイズpt</label><input type="number" id="ep-fs" value="'+el.fs+'" oninput="ED.els[ED.sel].fs=+this.value;edRenderEditor()"></div>'
      +'<div><label>色</label><input type="color" id="ep-c" value="'+(el.color||'#111111')+'" oninput="ED.els[ED.sel].color=this.value;edRenderEditor()"></div></div>'
      +'<label style="margin-top:4px"><input type="checkbox" '+(el.bold?'checked':'')+' onchange="ED.els[ED.sel].bold=this.checked;edRenderEditor()"> 太字</label>'
      +'<div class="row" style="margin-top:4px"><div><label>X mm</label><input type="number" step="0.5" value="'+el.x+'" oninput="ED.els[ED.sel].x=+this.value;edRenderEditor()"></div><div><label>Y mm</label><input type="number" step="0.5" value="'+el.y+'" oninput="ED.els[ED.sel].y=+this.value;edRenderEditor()"></div></div>'
      +'<button class="btn sub" style="margin-top:8px;color:#b91c1c" onclick="edDel()">🗑 削除</button>';
  } else {
    box.innerHTML='<b>🖼 画像</b>'
      +'<div class="row"><div><label>幅mm</label><input type="number" value="'+Math.round(el.w)+'" oninput="ED.els[ED.sel].w=+this.value;edRenderEditor()"></div><div><label>高mm</label><input type="number" value="'+Math.round(el.h)+'" oninput="ED.els[ED.sel].h=+this.value;edRenderEditor()"></div></div>'
      +'<div class="row"><div><label>X mm</label><input type="number" step="0.5" value="'+el.x+'" oninput="ED.els[ED.sel].x=+this.value;edRenderEditor()"></div><div><label>Y mm</label><input type="number" step="0.5" value="'+el.y+'" oninput="ED.els[ED.sel].y=+this.value;edRenderEditor()"></div></div>'
      +'<button class="btn sub" style="margin-top:8px;color:#b91c1c" onclick="edDel()">🗑 削除</button>';
  }
}
function edDel(){ if(ED.sel!=null){ ED.els.splice(ED.sel,1); ED.sel=null; edRenderEditor(); } }
document.addEventListener('keydown',function(e){ if((e.key==='Delete')&&ED.sel!=null&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){ edDel(); } });
// 1レコードを ctx に描画 (テキスト差込＋画像)
function edDrawRecord(ctx, head, rec){
  ED.els.forEach(function(el){
    if(el.type==='text'){
      var t=(el.t||'').replace(/\{\{(.+?)\}\}/g,function(_,k){var i=head.indexOf(k.trim());return i>=0?(rec[i]||''):'';});
      ctx.fillStyle=el.color||'#111'; ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.font=(el.bold?'bold ':'')+ptToPx(el.fs)+'px sans-serif';
      ctx.fillText(t, el.x*MM2PX, el.y*MM2PX);
    } else if(el.type==='image' && el._img){
      ctx.drawImage(el._img, el.x*MM2PX, el.y*MM2PX, el.w*MM2PX, el.h*MM2PX);
    }
  });
}
function genMerge(save){
  if(!ED.els.length){ alert('テキストや画像を配置してください'); return; }
  var rows=parseRows(document.getElementById('m-data').value).filter(function(r){return r.join('').trim();});
  var head=rows.length?rows[0]:[], recs=rows.length>1?rows.slice(1):[[]];
  var cols=+document.getElementById('m-cols').value||2, rws=+document.getElementById('m-rows').value||5, land=document.getElementById('m-paper').value==='A4L';
  var cw=edCW(), ch=edCH();
  // 画像をImageオブジェクト化してから生成 (描画同期のため)
  var imgs=ED.els.filter(function(e){return e.type==='image';});
  var loaded=0;
  function go(){
    var items=recs.map(function(rec){ return function(ctx){ edDrawRecord(ctx, head, rec); }; });
    var r=buildGridPdf({cols:cols,rows:rws,landscape:land,cellW:cw,cellH:ch,items:items});
    if(save) r.doc.save('差し込み_'+recs.length+'件.pdf'); else showPreview('m-cv', r.preview);
  }
  if(!imgs.length) return go();
  imgs.forEach(function(el){
    if(el._img){ if(++loaded===imgs.length) go(); return; }
    el._img=new Image(); el._img.onload=function(){ if(++loaded===imgs.length) go(); }; el._img.src=el.src;
  });
}
// 🏷 ラベル
function genLabel(save){
  var p=document.getElementById('l-preset').value.split(',').map(Number);
  var cols=p[0], rws=p[1], fs=+document.getElementById('l-fs').value||10, pad=+document.getElementById('l-pad').value||4;
  var blocks=document.getElementById('l-data').value.split(/\n\s*\n/).map(function(b){return b.trim();}).filter(Boolean);
  if(!blocks.length){ alert('宛名データを入力してください'); return; }
  var items=blocks.map(function(b){
    var lines=b.split(/\r?\n/);
    return function(ctx){
      ctx.font=ptToPx(fs)+'px sans-serif';
      var lh=ptToPx(fs)*1.5;
      lines.forEach(function(ln,i){ ctx.fillText(ln, pad*MM2PX, pad*MM2PX + i*lh); });
    };
  });
  var r=buildGridPdf({cols:cols,rows:rws,landscape:false,items:items});
  if(save) r.doc.save('宛名ラベル_'+blocks.length+'件.pdf'); else showPreview('l-cv', r.preview);
}
// 💳 名刺 (91×55, 横2×縦5=10面)
function genCard(save){
  var co=document.getElementById('c-co').value, addr=document.getElementById('c-addr').value;
  var each=+document.getElementById('c-each').value||10;
  var people=parseRows(document.getElementById('c-data').value).filter(function(r){return r.join('').trim();});
  if(!people.length){ alert('名刺データを入力してください'); return; }
  var CW=91, CH=55;
  var items=[];
  people.forEach(function(pp){
    var name=pp[0]||'', dept=pp[1]||'', company=pp[2]||co, tel=pp[3]||'', email=pp[4]||'';
    for(var k=0;k<each;k++){
      items.push(function(ctx){
        ctx.font='bold '+ptToPx(8)+'px sans-serif'; ctx.fillText(company, 6*MM2PX, 7*MM2PX);
        ctx.font=ptToPx(7)+'px sans-serif'; ctx.fillStyle='#555'; ctx.fillText(dept, 6*MM2PX, 16*MM2PX);
        ctx.fillStyle='#111'; ctx.font='bold '+ptToPx(13)+'px sans-serif'; ctx.fillText(name, 6*MM2PX, 24*MM2PX);
        ctx.font=ptToPx(6.5)+'px sans-serif'; ctx.fillStyle='#444';
        ctx.fillText(addr, 6*MM2PX, 40*MM2PX);
        ctx.fillText('TEL '+tel+(email?'   '+email:''), 6*MM2PX, 46*MM2PX);
      });
    }
  });
  var r=buildGridPdf({cols:2,rows:5,landscape:false,cellW:CW,cellH:CH,items:items});
  if(save) r.doc.save('名刺_'+people.length+'名.pdf'); else showPreview('c-cv', r.preview);
}
// 🔢 連番
function genNum(save){
  var pre=document.getElementById('n-pre').value, start=+document.getElementById('n-start').value||1;
  var digits=+document.getElementById('n-digits').value||0, count=+document.getElementById('n-count').value||1;
  var cols=+document.getElementById('n-cols').value||4, rws=+document.getElementById('n-rows').value||10;
  var fs=+document.getElementById('n-fs').value||18, land=document.getElementById('n-paper').value==='A4L';
  var items=[];
  for(var i=0;i<count;i++){
    var n=start+i; var s=digits>0?('0'.repeat(digits)+n).slice(-digits):(''+n);
    (function(txt){ items.push(function(ctx,cv){ ctx.font='bold '+ptToPx(fs)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(pre+txt, cv.width/2, cv.height/2); }); })(pre+s===pre+s? s : s);
  }
  var r=buildGridPdf({cols:cols,rows:rws,landscape:land,items:items});
  if(save) r.doc.save('連番_'+count+'枚.pdf'); else showPreview('n-cv', r.preview);
}
