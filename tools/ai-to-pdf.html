<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🅰 AI/PSD→PDF プレビュー・印刷 | Tokiwa Hub Tools</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2365a30d'/><circle cx='50' cy='50' r='30' fill='none' stroke='%23ffffff' stroke-width='6'/><circle cx='50' cy='20' r='9.5' fill='%23ffffff'/><circle cx='50' cy='50' r='8' fill='%23ffffff'/></svg>">
<!--
  Illustrator(.ai)・Photoshop(.psd)・PDF を PDF として プレビュー / PDF保存 / 印刷 するツール。
  - .ai/.pdf: 最近の .ai は「PDF互換ファイルを作成」で保存されていれば中身が PDF。
    その PDF 部分をそのまま使う(最も忠実)。任意で pdf-lib 再保存による軽量化も可。
  - .psd: ag-psd で合成画像を取り出し→解像度に合わせてPDF化(ラスタライズ)。
  - サイズ表示: トンボ(裁ち落とし枠)があれば「トンボまで」と「データ(仕上り)」、無ければデータのみ。複数ページはページ数も。
  - PC内処理(どこにも送信しない)。
  - InDesign(.indd)は独自形式でPDFを内包しないため非対応 → InDesignからPDF書き出しを。
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ag-psd@16.0.0/dist/bundle.js"></script>
<style>
  :root{ --ink:#1a1a1a; --line:#e0ddd6; --bg:#f4f3f0; --cyan:#0891b2; --grn:#16a34a; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:var(--bg); color:var(--ink); }
  header{ background:#1a1a1a; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; }
  header .logo{ font-weight:800; font-size:14px; } header .logo b{ color:#a3e635; }
  header .tname{ font-size:16px; font-weight:800; }
  header .user{ margin-left:auto; font-size:11px; color:#cbd5e1; }
  main{ max-width:920px; margin:14px auto; padding:0 14px; }
  .sec{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:.9rem 1.1rem; margin-bottom:.7rem; }
  .btn{ padding:9px 16px; border:1px solid #d0cec8; border-radius:7px; background:#fff; cursor:pointer; font-size:13.5px; font-family:inherit; font-weight:700; }
  .btn-g{ background:var(--grn); border-color:var(--grn); color:#fff; }
  .btn-c{ background:var(--cyan); border-color:var(--cyan); color:#fff; }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }
  .muted{ font-size:11px; color:#94a3b8; }
  #drop{ border:2.5px dashed #94a3b8; border-radius:10px; padding:26px 16px; text-align:center; color:#64748b; font-size:14px; cursor:pointer; background:#fff; }
  #drop.over{ border-color:var(--cyan); background:#ecfeff; }
  .frow{ display:flex; gap:8px; align-items:center; padding:6px 9px; border:1px solid var(--line); border-radius:7px; margin-top:5px; background:#fff; font-size:13px; cursor:pointer; }
  .frow.cur{ border-color:var(--cyan); background:#ecfeff; }
  .frow .nm{ flex:1; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chk{ display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#374151; cursor:pointer; }
  .chk input{ width:16px; height:16px; }
  #preview{ width:100%; height:560px; border:1px solid var(--line); border-radius:8px; background:#fff; display:none; }
  #toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:9px 18px; border-radius:8px; font-size:13px; display:none; z-index:99; }
</style>
</head>
<body>
<header>
  <span class="logo">TOKIWA <b>HUB</b> 🅰</span>
  <span class="tname">AI/PSD→PDF プレビュー・印刷</span>
  <span class="user">🔒 PC内処理・送信なし</span>
</header>
<main>
  <div class="sec">
    <div id="drop" onclick="document.getElementById('fi').click()">📂 .ai（イラレ）/ .psd（フォトショ）をドラッグ&ドロップ（複数OK）<div class="muted" style="margin-top:6px">※ .ai は「PDF互換ファイルを作成」で保存したもの／.psd は画像化してPDF化。PDFの連結や校正枠は「PDFツール」へ</div></div>
    <input type="file" id="fi" accept=".ai,.psd,application/postscript,application/illustrator,image/vnd.adobe.photoshop" multiple style="display:none" onchange="addFiles(this.files)">
    <div id="flist"></div>
  </div>

  <div class="sec">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-c" id="btn-print" onclick="printCurrent()" disabled>🖨 印刷</button>
      <button class="btn btn-g" id="btn-dl" onclick="downloadCurrent()" disabled>⬇ PDFで保存</button>
      <button class="btn" id="btn-zip" onclick="downloadAllZip()" disabled>⬇ 全部まとめてZIP</button>
      <label class="chk" style="margin-left:auto"><input type="checkbox" id="o-slim" onchange="refreshPreview()"> 軽量化（PDFのみ再保存）</label>
    </div>
    <div class="muted" id="status" style="margin-top:6px"></div>
    <iframe id="preview" title="プレビュー"></iframe>
  </div>
  <p class="muted">🔒 すべてPC内で処理（どこにも送信されません）。「PDF互換」なしで保存された .ai は変換できません→ Illustratorで保存し直してください。EPSはデスクトップの変換batでPDF化を。</p>
</main>
<div id="toast"></div>

<script>
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._tm); t._tm=setTimeout(function(){t.style.display='none';},2800); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function kb(n){ return n>1048576 ? (n/1048576).toFixed(1)+'MB' : Math.round(n/1024)+'KB'; }

var files=[];   // {name, buf, ok}
var cur=-1;     // 現在プレビュー中のindex
var _curUrl=null;

var MM=72/25.4;
function mm(pt){ var v=Math.round(pt/MM*10)/10; return (Math.abs(v-Math.round(v))<0.05?String(Math.round(v)):v.toFixed(1)); }
function fkind(name){ return /\.psd$/i.test(name) ? 'psd' : 'pdf'; }
// %PDF ヘッダを先頭付近から探す (PDF互換 .ai は %PDF- で始まる/含む)
function isPdfCompatible(buf){
  try{
    var head=new TextDecoder('latin1').decode(new Uint8Array(buf.slice(0, 2048)));
    return head.indexOf('%PDF-')>=0;
  }catch(e){ return false; }
}
// ファイルの寸法情報を採寸: ページ数 / トンボまで(MediaBox) / データ(TrimBox) / トンボ有無
async function measureFile(f){
  try{
    if(f.kind==='psd'){
      var psd=agPsd.readPsd(f.buf,{ skipLayerImageData:true, skipThumbnail:true });
      var dpi=(psd.imageResources&&psd.imageResources.resolutionInfo&&psd.imageResources.resolutionInfo.horizontalResolution)||72;
      return { pages:1, dpi:dpi, mediaW:psd.width/dpi*72, mediaH:psd.height/dpi*72, trimW:psd.width/dpi*72, trimH:psd.height/dpi*72, hasTonbo:false, px:psd.width+'×'+psd.height+'px' };
    }
    var d=await PDFLib.PDFDocument.load(f.buf,{ ignoreEncryption:true });
    var n=d.getPageCount(), p=d.getPage(0);
    var mb=p.getMediaBox(), tb=p.getTrimBox();
    var eps=2; // pt
    var hasTonbo=(mb.width-tb.width>eps)||(mb.height-tb.height>eps);
    return { pages:n, mediaW:mb.width, mediaH:mb.height, trimW:tb.width, trimH:tb.height, hasTonbo:hasTonbo };
  }catch(e){ return null; }
}
// 採寸結果を日本語表示
function sizeLabel(m){
  if(!m) return '';
  var parts=[];
  if(m.pages>1) parts.push('全'+m.pages+'ページ');
  if(m.hasTonbo){
    parts.push('トンボまで '+mm(m.mediaW)+'×'+mm(m.mediaH)+'mm');
    parts.push('データ '+mm(m.trimW)+'×'+mm(m.trimH)+'mm');
  } else {
    parts.push('データ '+mm(m.mediaW)+'×'+mm(m.mediaH)+'mm');
  }
  if(m.px) parts.push(m.px);
  return parts.join(' ／ ');
}
// PSD → 画像 → PDF (解像度に合わせた実寸)
async function psdToPdf(buf){
  var psd=agPsd.readPsd(buf,{ skipLayerImageData:true, skipThumbnail:true });
  var canvas=psd.canvas;
  if(!canvas){ throw new Error('PSDの合成画像を取得できませんでした'); }
  var dpi=(psd.imageResources&&psd.imageResources.resolutionInfo&&psd.imageResources.resolutionInfo.horizontalResolution)||72;
  var b64=canvas.toDataURL('image/jpeg',0.92).split(',')[1];
  var bytes=Uint8Array.from(atob(b64), function(c){ return c.charCodeAt(0); });
  var doc=await PDFLib.PDFDocument.create();
  var img=await doc.embedJpg(bytes);
  var wPt=psd.width/dpi*72, hPt=psd.height/dpi*72;
  var pg=doc.addPage([wPt,hPt]);
  pg.drawImage(img,{ x:0, y:0, width:wPt, height:hPt });
  return await doc.save();
}

var drop=document.getElementById('drop');
['dragover','dragenter'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.add('over');}); });
['dragleave','drop'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove('over');}); });
drop.addEventListener('drop',function(e){ addFiles(e.dataTransfer.files); });

function addFiles(fl){
  var arr=[].slice.call(fl).filter(function(f){ return /\.(ai|psd)$/i.test(f.name); });
  if(!arr.length){ toast('.ai（イラレ）/ .psd（フォトショ）を入れてください'); return; }
  if([].slice.call(fl).some(function(f){ return /\.indd$/i.test(f.name); })) toast('InDesign(.indd)は非対応です。PDF書き出ししてください');
  if([].slice.call(fl).some(function(f){ return /\.pdf$/i.test(f.name); })) toast('PDFの連結・校正枠は「PDFツール」をご利用ください');
  var pending=arr.length;
  arr.forEach(function(f){
    f.arrayBuffer().then(async function(buf){
      var kind=fkind(f.name);
      var ok=(kind==='psd') ? (typeof agPsd!=='undefined') : isPdfCompatible(buf);
      var rec={ name:f.name, buf:buf, kind:kind, ok:ok, m:null };
      files.push(rec);
      if(ok){ try{ rec.m=await measureFile(rec); }catch(e){} }
      if(--pending===0){ render(); if(cur<0){ var fi=files.findIndex(function(x){return x.ok;}); if(fi>=0) select(fi); } }
    }).catch(function(e){ pending--; toast('❌ '+f.name+': '+(e.message||e)); });
  });
}
function render(){
  document.getElementById('flist').innerHTML=files.map(function(f,i){
    var ico=f.ok?(f.kind==='psd'?'🅿':'🅰'):'⚠';
    var sz=f.ok ? (sizeLabel(f.m)||kb(f.buf.byteLength)) : (f.kind==='psd'?'読込失敗':'PDF互換なし');
    return '<div class="frow'+(i===cur?' cur':'')+'" onclick="select('+i+')">'
      + '<span>'+ico+'</span>'
      + '<span class="nm" style="flex:0 1 auto;max-width:46%">'+(i+1)+'. '+esc(f.name)+'</span>'
      + '<span class="muted" style="flex:1;text-align:right">'+sz+'</span>'
      + '<span class="frow-x" style="color:#b91c1c;padding:2px 8px;border:1px solid #d0cec8;border-radius:5px" onclick="event.stopPropagation();removeAt('+i+')">✕</span></div>';
  }).join('');
  var anyOk=files.some(function(f){return f.ok;});
  document.getElementById('btn-zip').disabled=!(files.filter(function(f){return f.ok;}).length>1);
  if(!anyOk){ document.getElementById('btn-print').disabled=true; document.getElementById('btn-dl').disabled=true; }
}
function removeAt(i){
  files.splice(i,1);
  if(cur===i){ cur=-1; var pv=document.getElementById('preview'); pv.style.display='none'; document.getElementById('btn-print').disabled=true; document.getElementById('btn-dl').disabled=true; document.getElementById('status').textContent=''; }
  else if(cur>i){ cur--; }
  render();
  if(cur<0){ var fi=files.findIndex(function(x){return x.ok;}); if(fi>=0) select(fi); }
}

// PDFバイト取得: psd は画像化、ai/pdf は中身PDF(忠実) / 軽量化ONなら pdf-lib再保存
async function toPdfBytes(f){
  if(f.kind==='psd'){ return await psdToPdf(f.buf); }
  if(document.getElementById('o-slim').checked){
    try{
      var d=await PDFLib.PDFDocument.load(f.buf,{ ignoreEncryption:true, updateMetadata:false });
      return await d.save({ useObjectStreams:true });
    }catch(e){ /* 失敗時は素のまま */ }
  }
  return new Uint8Array(f.buf);
}

async function select(i){
  var f=files[i]; if(!f) return;
  if(!f.ok){ toast(f.kind==='psd'?'このPSDは読み込めませんでした':'この .ai はPDF互換で保存されていません'); return; }
  cur=i; render();
  await refreshPreview();
}
async function refreshPreview(){
  if(cur<0 || !files[cur] || !files[cur].ok) return;
  var f=files[cur];
  var st=document.getElementById('status'); st.textContent='⏳ 変換中…';
  try{
    var bytes=await toPdfBytes(f);
    if(_curUrl){ URL.revokeObjectURL(_curUrl); }
    var blob=new Blob([bytes],{type:'application/pdf'});
    _curUrl=URL.createObjectURL(blob);
    window._curBytes=bytes;
    var pv=document.getElementById('preview'); pv.src=_curUrl; pv.style.display='block';
    document.getElementById('btn-print').disabled=false;
    document.getElementById('btn-dl').disabled=false;
    var mode=(f.kind==='psd')?'画像化':(document.getElementById('o-slim').checked?'軽量化':'忠実');
    var szl=sizeLabel(f.m);
    st.textContent='✅ '+esc(f.name)+' → PDF ('+kb(bytes.byteLength)+' / '+mode+')'+(szl?('　'+szl):'');
  }catch(e){ st.textContent=''; toast('❌ 変換失敗: '+(e.message||e)); }
}
function pdfName(f){ return f.name.replace(/\.(ai|psd|pdf)$/i,'')+'.pdf'; }

function downloadCurrent(){
  if(cur<0 || !window._curBytes){ toast('プレビューがありません'); return; }
  var blob=new Blob([window._curBytes],{type:'application/pdf'});
  var url=URL.createObjectURL(blob); var a=document.createElement('a');
  a.href=url; a.download=pdfName(files[cur]); a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},4000);
  toast('✅ PDFを保存しました');
}
function printCurrent(){
  if(cur<0){ toast('プレビューがありません'); return; }
  var pv=document.getElementById('preview');
  try{ pv.contentWindow.focus(); pv.contentWindow.print(); }
  catch(e){
    // フォールバック: 別タブで開いて印刷
    var w=window.open(_curUrl,'_blank');
    if(w){ try{ w.onload=function(){ w.focus(); w.print(); }; }catch(e2){} }
    else toast('ポップアップを許可してください');
  }
}
async function downloadAllZip(){
  var oks=files.filter(function(f){return f.ok;});
  if(oks.length<2){ toast('変換できるファイルが2件以上必要です'); return; }
  var st=document.getElementById('status'); st.textContent='⏳ まとめて変換中…';
  try{
    var zip=new JSZip();
    for(var i=0;i<oks.length;i++){ var b=await toPdfBytes(oks[i]); zip.file(pdfName(oks[i]), b); }
    var zb=await zip.generateAsync({type:'blob'});
    var url=URL.createObjectURL(zb); var a=document.createElement('a');
    a.href=url; a.download='AI_PDF変換_'+oks.length+'件.zip'; a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
    st.textContent='✅ '+oks.length+'件をZIPで保存';
  }catch(e){ st.textContent=''; toast('❌ 失敗: '+(e.message||e)); }
}

// 検証用フック
window.__test = {
  isPdf: isPdfCompatible,
  mm: mm, sizeLabel: sizeLabel, measureFile: measureFile, psdToPdf: psdToPdf,
  async pushBuf(name,buf){
    var kind=fkind(name);
    var ok=(kind==='psd')?(typeof agPsd!=='undefined'):isPdfCompatible(buf);
    var rec={name:name,buf:buf,kind:kind,ok:ok,m:null};
    files.push(rec);
    if(ok){ try{ rec.m=await measureFile(rec); }catch(e){} }
    render(); return files.length-1;
  },
  toPdfBytes: toPdfBytes,
  rec:function(i){ return files[i]; },
  state:function(){ return { count:files.length, cur:cur, oks:files.filter(function(f){return f.ok;}).length }; }
};
</script>
<!-- HUB共通: 最新データに更新するフローティングボタン（自動挿入） -->
<style>
#hubRefreshBtn{position:fixed;right:16px;bottom:16px;z-index:99999;display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;color:#0f172a;background:#fde68a;
  border:1px solid #f59e0b;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.22);cursor:pointer;line-height:1;}
#hubRefreshBtn:hover{background:#fcd34d;}
#hubRefreshBtn:disabled{opacity:.6;cursor:default;}
@media print{#hubRefreshBtn{display:none!important;}}
</style>
<button id="hubRefreshBtn" title="クラウドの最新データに更新します" onclick="hubRefreshNow()">🔄 更新</button>
<script>
function hubRefreshNow(){
  var b=document.getElementById('hubRefreshBtn');
  var reset=function(){ if(b){ b.disabled=false; b.textContent='🔄 更新'; } };
  if(b){ b.disabled=true; b.textContent='⏳ 更新中…'; }
  // 入力中のセルを先に確定(保存)してから取り込む。未確定の入力がクラウドの古い値で消えるのを防ぐ。
  try{ var ae=document.activeElement; if(ae && ae.blur && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) ae.blur(); }catch(e){}
  try{
    // クラウド取込関数を持つツール（カレンダー受注台帳など）は、再読込せず最新だけ取り込む
    if(typeof hubCloudPull==='function'){
      Promise.resolve(hubCloudPull()).then(function(){
        try{ if(typeof _hubCacheClear==='function') _hubCacheClear(); }catch(e){}
        try{ if(typeof buildYears==='function') buildYears(); }catch(e){}
        try{ if(typeof buildCats==='function') buildCats(); }catch(e){}
        try{ if(typeof render==='function') render(); }catch(e){}
        try{ if(typeof hubToast==='function') hubToast('🔄 最新データに更新しました'); }catch(e){}
        reset();
      }).catch(function(){ location.reload(); });
      return;
    }
  }catch(e){}
  // それ以外のページはページごと再読込（本体アプリは再読込でクラウドから取り直す）
  location.reload();
}
</script>
<!-- HUB共通: アプリ自動更新＋更新履歴（自動挿入 hubUpdateKit） -->
<style>
#hubLogBtn{position:fixed;right:16px;bottom:58px;z-index:99999;width:38px;height:38px;border-radius:50%;
  border:1px solid #cbd5e1;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.18);cursor:pointer;font-size:17px;line-height:1;}
#hubLogBtn:hover{background:#f1f5f9;}
#hubLogPanel{position:fixed;right:16px;bottom:104px;z-index:99999;width:min(360px,calc(100vw - 32px));max-height:60vh;overflow:auto;
  background:#fff;border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:12px 14px;display:none;font-size:12px;color:#0f172a;text-align:left;}
#hubLogPanel h3{margin:0 0 8px;font-size:13px;}
#hubLogPanel .d{font-weight:700;margin:10px 0 3px;color:#0369a1;}
#hubLogPanel ul{margin:0 0 4px;padding-left:17px;}
#hubLogPanel li{margin:2px 0;line-height:1.45;}
#hubUpBanner{position:fixed;left:50%;transform:translateX(-50%);top:10px;z-index:100000;display:none;align-items:center;gap:10px;
  background:#0f172a;color:#fff;padding:9px 14px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.35);font-size:13px;}
#hubUpBanner button{font-family:inherit;font-size:12px;font-weight:700;border-radius:7px;border:0;padding:5px 11px;cursor:pointer;background:#fde68a;color:#0f172a;}
@media print{#hubLogBtn,#hubLogPanel,#hubUpBanner{display:none!important;}}
</style>
<button id="hubLogBtn" title="更新履歴を表示" onclick="hubToggleLog()">📋</button>
<div id="hubLogPanel"></div>
<div id="hubUpBanner"><span>🆕 新しい版があります（<b id="hubUpCnt">15</b>秒後に自動更新）</span><button onclick="hubDoUpdate()">今すぐ更新</button><button style="background:#334155;color:#fff" onclick="hubCancelUpdate()">後で</button></div>
<script>
(function(){
  var BASE = location.pathname.indexOf('/tools/')>=0 ? '../' : './';
  // ===== 更新履歴 =====
  window.hubToggleLog=function(){
    var p=document.getElementById('hubLogPanel');
    if(p.style.display==='block'){ p.style.display='none'; return; }
    p.style.display='block'; p.innerHTML='<h3>📋 更新履歴</h3>読み込み中…';
    fetch(BASE+'changelog.json?ts='+Date.now(), {cache:'no-store'}).then(function(r){return r.json();}).then(function(list){
      var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');};
      p.innerHTML='<h3>📋 更新履歴</h3>'+list.map(function(e){
        return '<div class="d">'+esc(e.date)+'</div><ul>'+e.items.map(function(i){return '<li>'+esc(i)+'</li>';}).join('')+'</ul>';
      }).join('');
    }).catch(function(){ p.innerHTML='<h3>📋 更新履歴</h3>取得できませんでした'; });
  };
  // ===== アプリ本体の自動更新 =====
  // service-worker.js の版番号を定期取得し、変わっていたら再読込して新しい版に切り替える。
  var curVer=null, timer=null;
  function fetchVer(){
    return fetch(BASE+'service-worker.js?ts='+Date.now(), {cache:'no-store'})
      .then(function(r){ return r.text(); })
      .then(function(t){ var m=t.match(/CACHE_VERSION\s*=\s*'([^']+)'/); return m?m[1]:null; })
      .catch(function(){ return null; });
  }
  window.hubDoUpdate=function(){ try{ sessionStorage.setItem('hubJustUpdated','1'); }catch(e){} location.reload(); };
  window.hubCancelUpdate=function(){ if(timer){ clearInterval(timer); timer=null; } var b=document.getElementById('hubUpBanner'); if(b) b.style.display='none'; };
  function showBanner(){
    var b=document.getElementById('hubUpBanner'); if(!b || b.style.display==='flex') return;
    b.style.display='flex';
    var n=15, c=document.getElementById('hubUpCnt'); c.textContent=n;
    timer=setInterval(function(){
      var ae=document.activeElement;
      if(ae && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) return;   // 入力中はカウントを止める
      n--; c.textContent=n;
      if(n<=0){ clearInterval(timer); hubDoUpdate(); }
    }, 1000);
  }
  function check(){
    fetchVer().then(function(v){
      if(!v) return;
      if(curVer===null){ curVer=v; return; }
      if(v===curVer) return;
      // 新しい版を検知: 非表示タブは即時、表示中はバナー＋カウントダウンで自動更新
      if(document.hidden){ hubDoUpdate(); } else { showBanner(); }
    });
  }
  fetchVer().then(function(v){ curVer=v; });
  setInterval(check, 180000);   // 3分ごとに版を確認
  window.addEventListener('focus', check);
  try{ if(sessionStorage.getItem('hubJustUpdated')){ sessionStorage.removeItem('hubJustUpdated'); } }catch(e){}
})();
</script>
</body>
</html>
