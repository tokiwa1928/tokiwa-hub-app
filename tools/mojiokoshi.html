<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📝 文字起こし (OCR) | Quote Tools</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root{ --ink:#1a1a1a; --line:#e0ddd6; --bg:#f4f3f0; --cyan:#0891b2; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:var(--bg); color:var(--ink); }
  header{ background:#1a1a1a; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; }
  header .logo{ font-weight:800; font-size:14px; } header .logo b{ color:#a3e635; }
  header .tname{ font-size:16px; font-weight:800; }
  header .user{ margin-left:auto; font-size:11px; color:#cbd5e1; }
  main{ max-width:860px; margin:14px auto; padding:0 14px; }
  .sec{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:.9rem 1.1rem; margin-bottom:.7rem; }
  .btn{ padding:9px 16px; border:1px solid #d0cec8; border-radius:7px; background:#fff; cursor:pointer; font-size:13.5px; font-family:inherit; font-weight:700; }
  .btn-p{ background:var(--cyan); border-color:var(--cyan); color:#fff; }
  .muted{ font-size:11px; color:#94a3b8; }
  #drop{ border:2.5px dashed #94a3b8; border-radius:10px; padding:28px 16px; text-align:center; color:#64748b; font-size:14px; cursor:pointer; background:#fff; }
  #drop.over{ border-color:var(--cyan); background:#ecfeff; }
  #bar-wrap{ height:10px; background:#e5e7eb; border-radius:6px; overflow:hidden; margin-top:8px; display:none; }
  #bar{ height:100%; width:0%; background:var(--cyan); transition:width .2s; }
  textarea{ width:100%; min-height:280px; padding:10px 12px; border:1px solid #d0cec8; border-radius:7px; font-size:13.5px; line-height:1.8; font-family:inherit; }
  #toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:9px 18px; border-radius:8px; font-size:13px; display:none; z-index:99; }
</style>
</head>
<body>
<header>
  <span class="logo">QUOTE <b>TOOLS</b> 📝</span>
  <span class="tname">文字起こし（OCR）</span>
  <span class="user">🔒 PC内処理・ログイン不要</span>
</header>
<main>
  <div class="sec">
    <div id="drop" onclick="document.getElementById('fi').click()">
      📂 スキャン画像 (JPG/PNG) や PDF をドラッグ&ドロップ<br>
      <span class="muted">FAX原稿・手書き以外の印刷文字に対応。複数ファイルOK</span>
    </div>
    <input type="file" id="fi" accept="image/*,application/pdf" multiple style="display:none" onchange="startOcr(this.files)">
    <div style="display:flex;gap:14px;align-items:center;margin-top:8px;flex-wrap:wrap">
      <label style="font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="lang" value="jpn" checked> 日本語（横書き）</label>
      <label style="font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="lang" value="jpn_vert"> 日本語（縦書き）</label>
      <label style="font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="lang" value="jpn+eng"> 日本語＋英数字</label>
    </div>
    <div id="bar-wrap"><div id="bar"></div></div>
    <div id="status" class="muted" style="margin-top:5px"></div>
  </div>

  <div class="sec">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:11px;font-weight:700;color:#888;letter-spacing:.08em">抽出テキスト（編集できます）</span>
      <button class="btn" style="font-size:11.5px;padding:4px 12px;margin-left:auto" onclick="copyText()">📋 コピー</button>
      <button class="btn" style="font-size:11.5px;padding:4px 12px" onclick="dlText()">⬇ .txt保存</button>
    </div>
    <textarea id="out" placeholder="ここに文字起こし結果が出ます"></textarea>
  </div>
  <p class="muted">※ 初回は日本語認識データ（数十MB）を自動ダウンロードするため少し時間がかかります（2回目からは速い）。<br>
  ※ 精度が必要な原稿（くずれたFAX・手書き）は、Tokiwa Hub 問い合わせ画面の「📋テキスト抽出」(AI) の方が高精度です（1件数円）。</p>
</main>
<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._tm); t._tm=setTimeout(function(){t.style.display='none';},2600); }

var drop=document.getElementById('drop');
['dragover','dragenter'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.add('over');}); });
['dragleave','drop'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove('over');}); });
drop.addEventListener('drop',function(e){ startOcr(e.dataTransfer.files); });

function setProgress(p, msg){
  document.getElementById('bar-wrap').style.display='block';
  document.getElementById('bar').style.width=Math.round(p*100)+'%';
  document.getElementById('status').textContent=msg||'';
}

async function fileToCanvases(file){
  if(/\.pdf$/i.test(file.name)){
    var buf=await file.arrayBuffer();
    var doc=await pdfjsLib.getDocument({data:buf}).promise;
    var cvs=[];
    for(var p=1;p<=doc.numPages;p++){
      var page=await doc.getPage(p);
      var vp=page.getViewport({scale:2.2}); // OCR用に高解像度
      var cv=document.createElement('canvas');
      cv.width=Math.round(vp.width); cv.height=Math.round(vp.height);
      await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
      cvs.push({cv:cv,label:file.name+' p'+p});
    }
    return cvs;
  }
  // 画像
  return new Promise(function(res,rej){
    var img=new Image();
    img.onload=function(){
      var cv=document.createElement('canvas');
      cv.width=img.naturalWidth; cv.height=img.naturalHeight;
      cv.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(img.src);
      res([{cv:cv,label:file.name}]);
    };
    img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}

var running=false;
async function startOcr(fl){
  if(running){ toast('処理中です…'); return; }
  var files=[].slice.call(fl||[]).filter(function(f){ return /\.(pdf|png|jpe?g|gif|bmp|webp|tiff?)$/i.test(f.name); });
  if(!files.length){ toast('画像かPDFを入れてください'); return; }
  running=true;
  var lang=document.querySelector('input[name=lang]:checked').value;
  var out=document.getElementById('out');
  try{
    setProgress(0.02,'認識エンジン準備中… (初回は日本語データのDLで時間がかかります)');
    var worker=await Tesseract.createWorker(lang, 1, {
      logger:function(m){
        if(m.status==='recognizing text') setProgress(0.2+0.8*(m.progress||0)*window.__share, window.__label+' 認識中 '+Math.round((m.progress||0)*100)+'%');
        else setProgress(0.05,'準備中: '+m.status);
      }
    });
    var total=0, done=0, allCvs=[];
    for(var i=0;i<files.length;i++){
      var cvs=await fileToCanvases(files[i]);
      allCvs=allCvs.concat(cvs);
    }
    total=allCvs.length;
    for(var k=0;k<allCvs.length;k++){
      window.__label=allCvs[k].label+' ('+(k+1)+'/'+total+')';
      window.__share=1/total;
      setProgress(0.2+0.8*(k/total), window.__label+' 認識中...');
      var r=await worker.recognize(allCvs[k].cv);
      out.value += (out.value?'\n\n':'') + '──── '+allCvs[k].label+' ────\n' + (r.data.text||'').trim();
      done++;
    }
    await worker.terminate();
    setProgress(1,'✅ 完了: '+done+' ページ/枚 を文字起こししました');
    toast('✅ 文字起こし完了');
  }catch(e){
    console.error(e);
    setProgress(0,'⚠ エラー: '+(e.message||e));
    toast('❌ 失敗: '+(e.message||e));
  }finally{ running=false; }
}
function copyText(){
  var out=document.getElementById('out');
  out.select(); document.execCommand('copy');
  toast('📋 コピーしました');
}
function dlText(){
  var blob=new Blob([document.getElementById('out').value],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='文字起こし_'+new Date().toISOString().slice(0,10)+'.txt';
  a.click(); setTimeout(function(){URL.revokeObjectURL(url);},4000);
}
</script>
</body>
</html>
