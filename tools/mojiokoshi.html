<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📝 文字起こし (OCR) | Quote Tools</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root{ --ink:#1a1a1a; --line:#e0ddd6; --bg:#f4f3f0; --cyan:#0891b2; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:var(--bg); color:var(--ink); }
  header{ background:#1a1a1a; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; }
  header .logo{ font-weight:800; font-size:14px; } header .logo b{ color:#a3e635; }
  header .tname{ font-size:16px; font-weight:800; }
  header .user{ margin-left:auto; font-size:11px; color:#cbd5e1; }
  main{ max-width:860px; margin:14px auto; padding:0 14px; }
  .sec{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:.9rem 1.1rem; margin-bottom:.7rem; }
  .btn{ padding:9px 16px; border:1px solid #d0cec8; border-radius:7px; background:#fff; cursor:pointer; font-size:13.5px; font-family:inherit; font-weight:700; }
  .btn-p{ background:var(--cyan); border-color:var(--cyan); color:#fff; }
  .muted{ font-size:11px; color:#94a3b8; }
  #drop{ border:2.5px dashed #94a3b8; border-radius:10px; padding:28px 16px; text-align:center; color:#64748b; font-size:14px; cursor:pointer; background:#fff; }
  #drop.over{ border-color:var(--cyan); background:#ecfeff; }
  #bar-wrap{ height:10px; background:#e5e7eb; border-radius:6px; overflow:hidden; margin-top:8px; display:none; }
  #bar{ height:100%; width:0%; background:var(--cyan); transition:width .2s; }
  textarea{ width:100%; min-height:280px; padding:10px 12px; border:1px solid #d0cec8; border-radius:7px; font-size:13.5px; line-height:1.8; font-family:inherit; }
  #toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:9px 18px; border-radius:8px; font-size:13px; display:none; z-index:99; }
</style>
<script src="_ai.js"></script>
</head>
<body>
<header>
  <span class="logo">QUOTE <b>TOOLS</b> 📝</span>
  <span class="tname">文字起こし（OCR）</span>
  <span class="user">🔒 PC内処理・ログイン不要</span>
</header>
<main>
  <div class="sec">
    <div id="drop" onclick="document.getElementById('fi').click()">
      📂 スキャン画像 (JPG/PNG) や PDF をドラッグ&ドロップ<br>
      <span class="muted">FAX原稿・手書き以外の印刷文字に対応。複数ファイルOK</span>
    </div>
    <input type="file" id="fi" accept="image/*,application/pdf" multiple style="display:none" onchange="startOcr(this.files)">
    <div style="display:flex;gap:14px;align-items:center;margin-top:8px;flex-wrap:wrap">
      <b style="font-size:12px">エンジン:</b>
      <label style="font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="engine" value="std" checked> 標準（無料・印刷文字向け）</label>
      <label style="font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer;color:#5b21b6;font-weight:700"><input type="radio" name="engine" value="ai"> 🤖 AI高精度（FAX・表・かすれに強い / 1ページ約1〜2円）</label>
    </div>
    <div style="display:flex;gap:14px;align-items:center;margin-top:6px;flex-wrap:wrap" id="lang-row">
      <b style="font-size:12px">言語:</b>
      <label style="font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="lang" value="jpn" checked> 日本語（横書き）</label>
      <label style="font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="lang" value="jpn_vert"> 日本語（縦書き）</label>
      <label style="font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="lang" value="jpn+eng"> 日本語＋英数字</label>
    </div>
    <div id="bar-wrap"><div id="bar"></div></div>
    <div id="status" class="muted" style="margin-top:5px"></div>
  </div>

  <div class="sec">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:11px;font-weight:700;color:#888;letter-spacing:.08em">抽出テキスト（編集できます）</span>
      <button class="btn" style="font-size:11.5px;padding:4px 12px;margin-left:auto" onclick="copyText()">📋 コピー</button>
      <button class="btn" style="font-size:11.5px;padding:4px 12px" onclick="dlText()">⬇ .txt保存</button>
    </div>
    <textarea id="out" placeholder="ここに文字起こし結果が出ます"></textarea>
  </div>
  <p class="muted">※ 初回は日本語認識データ（数十MB）を自動ダウンロードするため少し時間がかかります（2回目からは速い）。<br>
  ※ 精度が必要な原稿（くずれたFAX・手書き）は、Tokiwa Hub 問い合わせ画面の「📋テキスト抽出」(AI) の方が高精度です（1件数円）。</p>
</main>
<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._tm); t._tm=setTimeout(function(){t.style.display='none';},2600); }

var drop=document.getElementById('drop');
['dragover','dragenter'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.add('over');}); });
['dragleave','drop'].forEach(function(ev){ drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove('over');}); });
drop.addEventListener('drop',function(e){ startOcr(e.dataTransfer.files); });

function setProgress(p, msg){
  document.getElementById('bar-wrap').style.display='block';
  document.getElementById('bar').style.width=Math.round(p*100)+'%';
  document.getElementById('status').textContent=msg||'';
}

async function fileToCanvases(file){
  if(/\.pdf$/i.test(file.name)){
    var buf=await file.arrayBuffer();
    var doc=await pdfjsLib.getDocument({data:buf}).promise;
    var cvs=[];
    for(var p=1;p<=doc.numPages;p++){
      var page=await doc.getPage(p);
      var vp=page.getViewport({scale:2.2}); // OCR用に高解像度
      var cv=document.createElement('canvas');
      cv.width=Math.round(vp.width); cv.height=Math.round(vp.height);
      await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
      cvs.push({cv:cv,label:file.name+' p'+p});
    }
    return cvs;
  }
  // 画像
  return new Promise(function(res,rej){
    var img=new Image();
    img.onload=function(){
      var cv=document.createElement('canvas');
      cv.width=img.naturalWidth; cv.height=img.naturalHeight;
      cv.getContext('2d').drawImage(img,0,0);
      URL.revokeObjectURL(img.src);
      res([{cv:cv,label:file.name}]);
    };
    img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}

// ── MOJI-2: コントラスト前処理 (標準エンジン用 — 薄いFAX等の認識率改善) ──
function preprocess(cv){
  var c=document.createElement('canvas'); c.width=cv.width; c.height=cv.height;
  var ctx=c.getContext('2d'); ctx.drawImage(cv,0,0);
  var id=ctx.getImageData(0,0,c.width,c.height), d=id.data;
  var min=255, max=0;
  for(var i=0;i<d.length;i+=16){ var l=(d[i]*0.3+d[i+1]*0.59+d[i+2]*0.11)|0; if(l<min)min=l; if(l>max)max=l; }
  var range=Math.max(1,max-min);
  for(var j=0;j<d.length;j+=4){
    var lum=(d[j]*0.3+d[j+1]*0.59+d[j+2]*0.11);
    var v=Math.max(0,Math.min(255,((lum-min)/range)*255));
    d[j]=d[j+1]=d[j+2]=v;
  }
  ctx.putImageData(id,0,0);
  return c;
}
// ── MOJI-3: AI高精度 (GAS経由・全社共通キー / 手動実行・実行前に費用確認) ──
async function aiOcr(cv){
  return await tqAiVision('この画像の文字をすべて忠実に書き起こしてください。レイアウトに沿って改行し、表はマークダウンの表にしてください。読めない文字は〓にしてください。前置きや説明は不要、本文のみ出力。', [cv], 4000);
}

var running=false;
async function startOcr(fl){
  if(running){ toast('処理中です…'); return; }
  var files=[].slice.call(fl||[]).filter(function(f){ return /\.(pdf|png|jpe?g|gif|bmp|webp|tiff?)$/i.test(f.name); });
  if(!files.length){ toast('画像かPDFを入れてください'); return; }
  running=true;
  var engine=document.querySelector('input[name=engine]:checked').value;
  var lang=document.querySelector('input[name=lang]:checked').value;
  var out=document.getElementById('out');
  try{
    setProgress(0.02,'ファイル読込中…');
    var allCvs=[];
    for(var i=0;i<files.length;i++){
      allCvs=allCvs.concat(await fileToCanvases(files[i]));
    }
    var total=allCvs.length, done=0;
    if(engine==='ai'){
      if(!confirm('🤖 AI高精度で '+total+' ページ/枚 を文字起こしします\n費用目安: 約'+total+'〜'+(total*2)+'円 (Claude Haiku)\n続行?')){ running=false; setProgress(0,''); return; }
      for(var k=0;k<total;k++){
        setProgress(0.05+0.95*(k/total), '🤖 '+allCvs[k].label+' ('+(k+1)+'/'+total+') AI認識中...');
        var txt=await aiOcr(allCvs[k].cv);
        out.value += (out.value?'\n\n':'') + '──── '+allCvs[k].label+' (AI) ────\n' + txt;
        done++;
      }
    } else {
      setProgress(0.05,'認識エンジン準備中… (初回は日本語データのDLで時間がかかります)');
      var worker=await Tesseract.createWorker(lang, 1, {
        logger:function(m){
          if(m.status==='recognizing text') setProgress(0.2+0.8*((window.__base||0)+(m.progress||0)*(window.__share||1)), (window.__label||'')+' 認識中 '+Math.round((m.progress||0)*100)+'%');
        }
      });
      for(var k2=0;k2<total;k2++){
        window.__label=allCvs[k2].label+' ('+(k2+1)+'/'+total+')';
        window.__share=1/total; window.__base=k2/total;
        var r=await worker.recognize(preprocess(allCvs[k2].cv));
        var text=(r.data.text||'').trim();
        // 低確信ワード (60%未満) を要確認として併記
        var low=[];
        (r.data.words||[]).forEach(function(wd){ if(wd.confidence<60 && (wd.text||'').trim().length>=1) low.push(wd.text.trim()); });
        low=low.filter(function(v,ix,a){return a.indexOf(v)===ix;}).slice(0,20);
        out.value += (out.value?'\n\n':'') + '──── '+allCvs[k2].label+' ────\n' + text
          + (low.length ? '\n⚠ 要確認(認識が曖昧): '+low.join(' / ') : '');
        done++;
      }
      await worker.terminate();
    }
    setProgress(1,'✅ 完了: '+done+' ページ/枚'+(engine==='ai'?' (AI高精度)':''));
    toast('✅ 文字起こし完了');
  }catch(e){
    console.error(e);
    setProgress(0,'⚠ エラー: '+(e.message||e));
    toast('❌ 失敗: '+(e.message||e));
  }finally{ running=false; }
}
function copyText(){
  var out=document.getElementById('out');
  out.select(); document.execCommand('copy');
  toast('📋 コピーしました');
}
function dlText(){
  var blob=new Blob([document.getElementById('out').value],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='文字起こし_'+new Date().toISOString().slice(0,10)+'.txt';
  a.click(); setTimeout(function(){URL.revokeObjectURL(url);},4000);
}
</script>
<!-- HUB共通: 最新データに更新するフローティングボタン（自動挿入） -->
<style>
#hubRefreshBtn{position:fixed;right:16px;bottom:16px;z-index:99999;display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;font-size:13px;font-weight:700;font-family:inherit;color:#0f172a;background:#fde68a;
  border:1px solid #f59e0b;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.22);cursor:pointer;line-height:1;}
#hubRefreshBtn:hover{background:#fcd34d;}
#hubRefreshBtn:disabled{opacity:.6;cursor:default;}
@media print{#hubRefreshBtn{display:none!important;}}
</style>
<button id="hubRefreshBtn" title="クラウドの最新データに更新します" onclick="hubRefreshNow()">🔄 更新</button>
<script>
function hubRefreshNow(){
  var b=document.getElementById('hubRefreshBtn');
  var reset=function(){ if(b){ b.disabled=false; b.textContent='🔄 更新'; } };
  if(b){ b.disabled=true; b.textContent='⏳ 更新中…'; }
  // 入力中のセルを先に確定(保存)してから取り込む。未確定の入力がクラウドの古い値で消えるのを防ぐ。
  try{ var ae=document.activeElement; if(ae && ae.blur && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) ae.blur(); }catch(e){}
  try{
    // クラウド取込関数を持つツール（カレンダー受注台帳など）は、再読込せず最新だけ取り込む
    if(typeof hubCloudPull==='function'){
      Promise.resolve(hubCloudPull()).then(function(){
        try{ if(typeof _hubCacheClear==='function') _hubCacheClear(); }catch(e){}
        try{ if(typeof buildYears==='function') buildYears(); }catch(e){}
        try{ if(typeof buildCats==='function') buildCats(); }catch(e){}
        try{ if(typeof render==='function') render(); }catch(e){}
        try{ if(typeof hubToast==='function') hubToast('🔄 最新データに更新しました'); }catch(e){}
        reset();
      }).catch(function(){ location.reload(); });
      return;
    }
  }catch(e){}
  // それ以外のページはページごと再読込（本体アプリは再読込でクラウドから取り直す）
  location.reload();
}
</script>
<!-- HUB共通: アプリ自動更新＋更新履歴（自動挿入 hubUpdateKit） -->
<style>
#hubLogBtn{position:fixed;right:16px;bottom:58px;z-index:99999;width:38px;height:38px;border-radius:50%;
  border:1px solid #cbd5e1;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.18);cursor:pointer;font-size:17px;line-height:1;}
#hubLogBtn:hover{background:#f1f5f9;}
#hubLogPanel{position:fixed;right:16px;bottom:104px;z-index:99999;width:min(360px,calc(100vw - 32px));max-height:60vh;overflow:auto;
  background:#fff;border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:12px 14px;display:none;font-size:12px;color:#0f172a;text-align:left;}
#hubLogPanel h3{margin:0 0 8px;font-size:13px;}
#hubLogPanel .d{font-weight:700;margin:10px 0 3px;color:#0369a1;}
#hubLogPanel ul{margin:0 0 4px;padding-left:17px;}
#hubLogPanel li{margin:2px 0;line-height:1.45;}
#hubUpBanner{position:fixed;left:50%;transform:translateX(-50%);top:10px;z-index:100000;display:none;align-items:center;gap:10px;
  background:#0f172a;color:#fff;padding:9px 14px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.35);font-size:13px;}
#hubUpBanner button{font-family:inherit;font-size:12px;font-weight:700;border-radius:7px;border:0;padding:5px 11px;cursor:pointer;background:#fde68a;color:#0f172a;}
@media print{#hubLogBtn,#hubLogPanel,#hubUpBanner{display:none!important;}}
</style>
<button id="hubLogBtn" title="更新履歴を表示" onclick="hubToggleLog()">📋</button>
<div id="hubLogPanel"></div>
<div id="hubUpBanner"><span>🆕 新しい版があります（<b id="hubUpCnt">15</b>秒後に自動更新）</span><button onclick="hubDoUpdate()">今すぐ更新</button><button style="background:#334155;color:#fff" onclick="hubCancelUpdate()">後で</button></div>
<script>
(function(){
  var BASE = location.pathname.indexOf('/tools/')>=0 ? '../' : './';
  // ===== 更新履歴 =====
  window.hubToggleLog=function(){
    var p=document.getElementById('hubLogPanel');
    if(p.style.display==='block'){ p.style.display='none'; return; }
    p.style.display='block'; p.innerHTML='<h3>📋 更新履歴</h3>読み込み中…';
    fetch(BASE+'changelog.json?ts='+Date.now(), {cache:'no-store'}).then(function(r){return r.json();}).then(function(list){
      var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');};
      p.innerHTML='<h3>📋 更新履歴</h3>'+list.map(function(e){
        return '<div class="d">'+esc(e.date)+'</div><ul>'+e.items.map(function(i){return '<li>'+esc(i)+'</li>';}).join('')+'</ul>';
      }).join('');
    }).catch(function(){ p.innerHTML='<h3>📋 更新履歴</h3>取得できませんでした'; });
  };
  // ===== アプリ本体の自動更新 =====
  // service-worker.js の版番号を定期取得し、変わっていたら再読込して新しい版に切り替える。
  var curVer=null, timer=null;
  function fetchVer(){
    return fetch(BASE+'service-worker.js?ts='+Date.now(), {cache:'no-store'})
      .then(function(r){ return r.text(); })
      .then(function(t){ var m=t.match(/CACHE_VERSION\s*=\s*'([^']+)'/); return m?m[1]:null; })
      .catch(function(){ return null; });
  }
  window.hubDoUpdate=function(){ try{ sessionStorage.setItem('hubJustUpdated','1'); }catch(e){} location.reload(); };
  window.hubCancelUpdate=function(){ if(timer){ clearInterval(timer); timer=null; } var b=document.getElementById('hubUpBanner'); if(b) b.style.display='none'; };
  function showBanner(){
    var b=document.getElementById('hubUpBanner'); if(!b || b.style.display==='flex') return;
    b.style.display='flex';
    var n=15, c=document.getElementById('hubUpCnt'); c.textContent=n;
    timer=setInterval(function(){
      var ae=document.activeElement;
      if(ae && ['INPUT','TEXTAREA','SELECT'].indexOf(ae.tagName)>=0) return;   // 入力中はカウントを止める
      n--; c.textContent=n;
      if(n<=0){ clearInterval(timer); hubDoUpdate(); }
    }, 1000);
  }
  function check(){
    fetchVer().then(function(v){
      if(!v) return;
      if(curVer===null){ curVer=v; return; }
      if(v===curVer) return;
      // 新しい版を検知: 非表示タブは即時、表示中はバナー＋カウントダウンで自動更新
      if(document.hidden){ hubDoUpdate(); } else { showBanner(); }
    });
  }
  fetchVer().then(function(v){ curVer=v; });
  setInterval(check, 180000);   // 3分ごとに版を確認
  window.addEventListener('focus', check);
  try{ if(sessionStorage.getItem('hubJustUpdated')){ sessionStorage.removeItem('hubJustUpdated'); } }catch(e){}
})();
</script>
</body>
</html>
