<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>案件管理（各社・相互送信）</title>
<style>
  :root{ --line:#1a1a1a; --hd:#211f1c; --muted:#64748b; --accent:#1e40af; --red:#c0261c; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; color:#1a1a1a; background:#f4f3f0; font-size:12.5px; }
  .wrap{ padding:12px; }
  h1{ font-size:16px; margin:0 0 2px; } .sub{ color:var(--muted); font-size:11px; margin-bottom:10px; }
  .toolbar{ position:sticky; top:0; z-index:10; background:#f4f3f0; display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:8px 0; border-bottom:1px solid #ddd; }
  select,input,textarea,button{ font-family:inherit; font-size:12.5px; }
  select,input,textarea{ padding:6px 8px; border:1px solid #c9c6bf; border-radius:6px; background:#fff; }
  .btn{ padding:6px 12px; border:1px solid #c9c6bf; border-radius:7px; background:#fff; cursor:pointer; font-weight:700; }
  .btn.p{ background:var(--accent); color:#fff; border-color:var(--accent); } .btn.g{ background:#15803d; color:#fff; border-color:#15803d; } .btn.d{ background:#fee; color:var(--red); border-color:#fca5a5; }
  .btn.sm{ padding:3px 8px; font-size:11px; }
  #kpis{ display:flex; gap:8px; flex-wrap:wrap; margin:10px 0; }
  .kpi{ background:#211f1c; color:#fff; border-radius:8px; padding:7px 13px; } .kpi .k{ font-size:10px; color:#bbb; } .kpi .v{ font-size:17px; font-weight:800; font-family:'Roboto Mono',monospace; }
  .kpi.clk{ cursor:pointer } .kpi.on{ background:#0e7490; outline:2px solid #60a5fa }
  .tblwrap{ overflow:auto; max-height:70vh; border:1.5px solid var(--line); border-radius:10px; background:#fff; }
  table{ border-collapse:separate; border-spacing:0; width:100%; font-size:11.5px; }
  thead th{ position:sticky; top:0; z-index:3; background:var(--hd); color:#fff; padding:6px 8px; white-space:nowrap; text-align:left; border-right:1px solid #444; }
  tbody td{ padding:3px 8px; border-bottom:1px solid #1a1a1a; border-right:1px solid #1a1a1a; vertical-align:top; white-space:normal; word-break:break-word; max-width:240px; }
  tbody td.num{ text-align:right; font-family:'Roboto Mono',monospace; white-space:nowrap; }
  tbody tr:nth-child(even){ background:#faf9f6 } tbody tr:hover{ background:#eef6fb }
  .rowred td{ color:var(--red); font-weight:700; }
  .flag{ color:var(--red); font-weight:800; }
  #status{ font-size:11px; color:var(--muted) }
  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-start; justify-content:center; padding:2rem; overflow:auto; z-index:50 }
  .card{ background:#fff; border-radius:10px; width:100%; max-width:720px; }
  .card h2{ margin:0; padding:12px 16px; background:var(--accent); color:#fff; font-size:14px; display:flex; justify-content:space-between; align-items:center; border-radius:10px 10px 0 0 }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:16px }
  .grid label{ font-size:11px; color:#475569; font-weight:700; display:block; margin-bottom:3px }
  .grid .full{ grid-column:1/3 }
  .grid input,.grid select,.grid textarea{ width:100% }
  .foot{ display:flex; justify-content:space-between; gap:8px; padding:0 16px 16px }
  /* ── 帳票 ── */
  #doc-print{ display:none; }
  .dsheet{ width:210mm; box-sizing:border-box; padding:16mm 15mm; background:#fff; color:#111; font-size:13px; }
  .dsheet .dtitle{ text-align:center; font-size:26px; font-weight:800; letter-spacing:.4em; margin:0 0 14px; }
  .dsheet .dhead{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:14px; }
  .dsheet .dto{ font-size:15px; } .dsheet .dto .nm{ font-size:19px; font-weight:800; border-bottom:2px solid #111; padding-bottom:2px; display:inline-block; }
  .dsheet .dfrom{ text-align:right; font-size:12px; line-height:1.7; }
  .dsheet .dfrom .nm{ font-size:15px; font-weight:800; }
  .dsheet table{ width:100%; border-collapse:collapse; font-size:13px; margin:8px 0; }
  .dsheet th,.dsheet td{ border:1px solid #333; padding:6px 8px; }
  .dsheet th{ background:#eee; } .dsheet .r{ text-align:right; font-variant-numeric:tabular-nums; } .dsheet .c{ text-align:center; }
  .dsheet .big{ font-size:24px; font-weight:800; text-align:center; border:2px solid #111; padding:10px; letter-spacing:.1em; }
  /* 三連納品書（控／納品書／受領書） */
  .dpanel{ border:1px solid #333; padding:5mm 7mm; margin-bottom:5mm; }
  .dpanel:last-child{ margin-bottom:0; }
  .pttl{ text-align:center; font-size:16px; font-weight:800; letter-spacing:.35em; margin:0 0 6px; }
  .phead{ display:flex; justify-content:space-between; align-items:flex-end; font-size:11px; margin-bottom:6px; gap:16px; }
  .phead .pto{ line-height:1.5; } .phead .pto b{ font-size:14px; border-bottom:1px solid #333; padding-bottom:1px; } .pmeta{ font-size:10px; color:#555; margin-top:3px; }
  .phead .pfrom{ text-align:right; line-height:1.55; } .phead .pfrom b{ font-size:12px; }
  .ptbl{ width:100%; border-collapse:collapse; font-size:11px; }
  .ptbl th,.ptbl td{ border:1px solid #333; padding:3px 6px; } .ptbl th{ background:#eee; }
  .prcv{ text-align:right; font-size:11px; margin-top:8px; } .pseal{ display:inline-block; width:44px; height:44px; border:1px dashed #999; vertical-align:middle; margin-left:6px; }
  .dsheet .note{ font-size:12px; color:#333; margin-top:6px; } .dsheet .seal{ float:right; width:64px; height:64px; border:1px dashed #999; text-align:center; font-size:9px; color:#999; line-height:64px; }
  @media print{
    body.printing-doc>*:not(#doc-print){ display:none !important; }
    #doc-print{ display:block !important; } .dsheet{ padding:16mm 15mm; }
    @page{ size:A4 portrait; margin:0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>案件管理（各社・相互送信） <span style="font-size:10px;color:#b6b2a8;font-weight:400">v183</span></h1>
  <div class="sub">自社の管理表（スプレッドシート）を直接 追加・編集・削除。📤で他社に案件を送ると相手の管理表に同じ伝票番号で追加されます。希望納期＝各社の着日。※将来はHubへ移管。</div>
  <div class="toolbar">
    <div id="co-current" style="font-weight:800;font-size:15px;white-space:nowrap"></div>
    <button class="btn" id="co-switch-btn" onclick="openCoSelect()" title="会社を切り替える" style="display:none">🏢 会社切替</button>
    <button class="btn" id="dist-url-btn" onclick="openDistUrls()" title="各社に配るショートカット用URL（ログイン不要でその会社の画面が開く）" style="display:none">🔗 配布用リンク</button>
    <span id="scope-badge" style="display:none;font-size:11px;font-weight:700;color:#0e7490;background:#e0f2fe;padding:4px 9px;border-radius:6px"></span>
    <button class="btn g" onclick="openForm()">＋ 新規追加</button>
    <button class="btn p" onclick="openReuse()" title="過去案件から引用して追加（リピート）。トキワは他社案件の流用も可（伝票番号でリンク）">🔁 リピート追加</button>
    <input id="q" placeholder="🔍 伝票番号・顧客・案件で検索" style="width:220px" oninput="render()">
    <select id="f-status" onchange="render()"><option value="">状況：すべて</option></select>
    <button class="btn" onclick="loadList(true)">🔄 再読込</button>
    <span id="status"></span>
  </div>
  <div id="kpis"></div>
  <div class="tblwrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
</div>
<!-- 会社選択画面（トキワ管理者のみ・ログイン時の社名選択と同じイメージ） -->
<div id="co-select-screen" style="display:none;position:fixed;inset:0;background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);z-index:80;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:1.8rem 2rem;width:min(440px,92vw);max-height:84vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.35)">
    <div style="text-align:center;font-size:19px;font-weight:800;color:#1a1a1a">🏢 管理する会社を選択</div>
    <div style="text-align:center;font-size:12px;color:#888;margin:4px 0 16px">トキワ印刷（管理会社）はすべての会社を切り替えて見られます</div>
    <div id="co-select-list" style="display:flex;flex-direction:column;gap:8px"></div>
  </div>
</div>
<div id="doc-print"></div>
<div class="modal" id="doc-modal">
  <div class="card" style="max-width:900px">
    <h2><span id="doc-title">🧾 帳票を作成</span><button onclick="closeDocs()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer">×</button></h2>
    <div style="padding:14px 16px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <button class="btn g" onclick="genDoc('納品書3連')">🧾 納品書3連（控/納品/受領）</button>
        <button class="btn" onclick="genDoc('納品書')">📦 納品書</button>
        <button class="btn" onclick="genDoc('受領書')">✍ 受領書</button>
        <button class="btn" onclick="genDoc('請求書')">📄 請求書</button>
        <button class="btn" onclick="genDoc('領収書')">🧾 領収書</button>
        <button class="btn p" id="doc-print-btn" onclick="printDoc()" style="margin-left:auto;display:none">🖨 印刷（発行を記録）</button>
      </div>
      <details style="margin-bottom:10px"><summary style="cursor:pointer;font-size:12px;color:var(--accent);font-weight:700">🏢 会社情報（帳票用・この会社の枠を編集／保存）</summary>
        <div class="grid" id="co-info-grid" style="padding:10px 0"></div>
      </details>
      <div id="doc-preview" style="border:1px solid #ddd;border-radius:8px;overflow:auto;max-height:52vh;background:#f0f0ee;padding:10px;display:flex;justify-content:center"></div>
      <div style="margin-top:10px">
        <div style="font-size:12px;font-weight:700;color:#334155;margin-bottom:4px">🕘 出力履歴（この案件）</div>
        <div id="doc-history" style="font-size:11px;color:#475569;max-height:120px;overflow:auto"></div>
      </div>
    </div>
  </div>
</div>
<datalist id="denpyo-list"></datalist>
<datalist id="customer-list"></datalist>

<div class="modal" id="form-modal">
  <div class="card">
    <h2><span id="form-title">案件入力</span><button onclick="closeForm()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer">×</button></h2>
    <div class="grid">
      <input type="hidden" id="f-id">
      <div class="full" style="position:relative;background:#f1f5f9;padding:8px;border-radius:8px">
        <label style="display:flex;justify-content:space-between;align-items:center">
          <span>🔁 過去案件から引用（顧客・案件・伝票番号で検索→選ぶと下欄に流し込み）</span>
          <span id="quote-all-wrap" style="font-weight:400;font-size:11px"><input type="checkbox" id="quote-all" onchange="quoteSearch()"> 全社から探す（他社案件を流用＝伝票番号でリンク）</span>
        </label>
        <input id="f-quote" placeholder="過去の顧客名・案件名・伝票番号で検索…" oninput="quoteSearch()" autocomplete="off">
        <div id="quote-results" style="display:none;position:absolute;left:8px;right:8px;top:100%;z-index:5;background:#fff;border:1px solid #c9c6bf;border-radius:0 0 8px 8px;max-height:240px;overflow:auto;box-shadow:0 6px 16px rgba(0,0,0,.15)"></div>
      </div>
      <div><label>伝票番号（トキワ採番）*</label><input id="f-denpyo" list="denpyo-list" placeholder="a0xxxxx" oninput="onDenpyo()"></div>
      <div><label>状況</label><input id="f-status2" list="status-list" placeholder="進行中 / 納品済 / 中止…"></div>
      <div><label>顧客名（社名マスタから）</label><input id="f-customer" list="customer-list" placeholder="社名を入力または選択"></div>
      <div><label>案件名</label><input id="f-item"></div>
      <div><label>数量</label><input id="f-qty" type="number"></div>
      <div><label>単位</label><input id="f-unit" placeholder="枚 / 冊 / 式"></div>
      <div><label>受注日</label><input id="f-orderDate" type="date"></div>
      <div><label>希望納期（＝各社の着日）</label><input id="f-hopeDate" type="date"></div>
      <div><label>納品日</label><input id="f-deliveryDate" type="date"></div>
      <div><label>着日リンク（他社の希望納期）</label><input id="f-linked" readonly style="background:#f1f5f9"></div>
      <div><label>単価（自社）</label><input id="f-unitSelf" type="number" step="any" oninput="calcAmt()"></div>
      <div><label>金額（自社）</label><input id="f-amtSelf" type="number" oninput="calcProfit()"></div>
      <div><label>単価（トキワ）</label><input id="f-unitTokiwa" type="number" step="any" oninput="calcAmt()"></div>
      <div><label>金額（トキワ）</label><input id="f-amtTokiwa" type="number" oninput="calcProfit()"></div>
      <div><label>利益</label><input id="f-profit" type="number"></div>
      <div><label style="color:var(--red)">複数梱包</label><label style="font-weight:400"><input type="checkbox" id="f-multiPack"> 複数梱包あり（赤字表示）</label></div>
      <div class="full"><label style="color:var(--red)">納品先（普段と違う場合のみ入力→赤字表示）</label><input id="f-deliverTo" placeholder="通常と異なる納品先"></div>
      <div class="full"><label>備考</label><textarea id="f-memo" rows="2"></textarea></div>
    </div>
    <div class="foot">
      <button class="btn d" id="del-btn" onclick="delCase()" style="visibility:hidden">🗑 削除</button>
      <div style="display:flex;gap:8px"><button class="btn" onclick="closeForm()">キャンセル</button><button class="btn p" onclick="saveCase()">保存</button></div>
    </div>
  </div>
</div>
<datalist id="status-list"><option value="進行中"><option value="校正中"><option value="製版中"><option value="印刷中"><option value="加工中"><option value="納品済"><option value="中止"></datalist>

<script>
var GAS_URL='https://script.google.com/a/macros/tokiwap-group.com/s/AKfycbw9-8Nnq3jV9lCDUEf7JOvQM_yAy1ZYnOIab-TYP3TZ-BtH7RosxKSeXmr-FvkxMVhv/exec';
var GAS_KEY='mitsumori-2024';
var CASES=[], COMPANY='', deliveryMode='', NAMEKEY={}, ALL_TARGETS=[];
var IMPORTABLE={murayama:1, kitakami:1}; // シート取込対応の会社key（マッピング実装済）
var COLS=[['denpyo','伝票番号'],['customer','顧客名'],['item','案件名'],['qty','数量'],['unit','単位'],['orderDate','受注日'],['hopeDate','希望納期'],['_linkedArrival','着日リンク'],['deliveryDate','納品日'],['status','状況'],['amtSelf','金額(自社)'],['amtTokiwa','金額(トキワ)'],['profit','利益'],['multiPack','複数梱包'],['deliverTo','納品先'],['memo','備考']];
function esc(s){ s=(s==null?'':String(s)); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function yen(n){ n=Math.round(Number(n)||0); return (n<0?'−¥'+Math.abs(n).toLocaleString():'¥'+n.toLocaleString()); }
function toNum(v){ var n=Number(String(v==null?'':v).replace(/[,¥]/g,'')); return isNaN(n)?0:n; }
function parseD(v){ if(!v)return null; var s=String(v).trim(); var m=s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/); return m?new Date(+m[1],+m[2]-1,+m[3]):null; }
function ymd(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function weekRange(){ var t=new Date();t.setHours(0,0,0,0); var dow=(t.getDay()+6)%7; var mon=new Date(t);mon.setDate(t.getDate()-dow); var sun=new Date(mon);sun.setDate(mon.getDate()+6); return [mon,sun]; }
async function api(action, params, post){
  var url=new URL(GAS_URL); url.searchParams.set('action',action); url.searchParams.set('apiKey',GAS_KEY);
  Object.keys(params||{}).forEach(function(k){ url.searchParams.set(k,params[k]); });
  var opt={redirect:'follow'}; if(post){ opt.method='POST'; opt.body=JSON.stringify(post); }
  var r=await fetch(url.toString(),opt); return r.json();
}
// ── 会社スコープ：関連会社は自社のみ、トキワ(TK/COMP002)=管理会社は全社 ──
var AUTH_KEY_HUB='murayama_auth';
var CODE2LEDGER={ MU:'村山印刷', KT:'北上プリント', YM:'ヤマウチ印刷', NK:'中尾印刷', AS:'アート・エス', TS:'津島プリント' };
var CODE2KEY={ MU:'murayama', KT:'kitakami', YM:'yamauchi', NK:'nakao', AS:'arteso', TS:'tsushima' };
var SHEET_CAPABLE={ murayama:1, kitakami:1, nakao:1, yamauchi:1, arteso:1, tsushima:1 }; // 全6社対応済
var MY_CODE='', MY_LEDGER='', MY_KEY='', IS_TK=true;
function _readAuth_(){
  // 1) URLの ?co=XX が最優先（ショートカット配布用・Hubログイン不要）
  //    例: ?co=MU(村山) ?co=KT(北上) ?co=TK(トキワ=全社切替)
  try{
    var qco=(new URLSearchParams(location.search).get('co')||'').toUpperCase();
    if(qco==='TK'){ MY_CODE='TK'; MY_LEDGER=''; MY_KEY=''; IS_TK=true; return; }
    if(CODE2LEDGER[qco]){ MY_CODE=qco; MY_LEDGER=CODE2LEDGER[qco]; MY_KEY=CODE2KEY[qco]; IS_TK=false; return; }
  }catch(e){}
  // 2) 従来: Hubのログイン情報から判定
  try{ var s=localStorage.getItem(AUTH_KEY_HUB); if(s){ var a=JSON.parse(s)||{};
    MY_CODE=a.companyCode||''; MY_LEDGER=CODE2LEDGER[MY_CODE]||''; MY_KEY=CODE2KEY[MY_CODE]||'';
    IS_TK=(a.companyId==='COMP002'||a.companyCode==='TK'||!MY_LEDGER); // TK・未判定は全社
  } }catch(e){ IS_TK=true; }
}
var COMPANIES_CASE=[];
async function init(){
  _readAuth_();
  try{
    var r=await api('caseCompanies');
    COMPANIES_CASE=(r.companies||[]).filter(function(c){return c.cat==='案件管理';}); // 案件管理6社
    COMPANIES_CASE.forEach(function(c){ NAMEKEY[c.name]=c.key; });
    ALL_TARGETS=COMPANIES_CASE.filter(function(c){return SHEET_CAPABLE[c.key];}).map(function(c){ return {name:c.name, key:c.key}; });
    if(IS_TK){
      // トキワ管理者：ログイン時と同じ会社選択画面（カード）で全社を切替
      document.getElementById('co-switch-btn').style.display='';
      document.getElementById('dist-url-btn').style.display='';
      openCoSelect(); // 起動時に選択画面を表示（選ぶと入る）
    } else {
      // 関連会社：会社選択画面は出さず自社に直行
      if(!MY_KEY || !SHEET_CAPABLE[MY_KEY]){
        document.getElementById('co-current').textContent=(MY_LEDGER||MY_CODE||'');
        document.getElementById('status').textContent='この会社はまだ移行対応していません（対応: 村山・北上）';
        return;
      }
      COMPANY=MY_LEDGER;
      document.getElementById('co-current').textContent='🏢 '+MY_LEDGER;
      var badge=document.getElementById('scope-badge'); if(badge){ badge.style.display=''; badge.textContent='自社のみ'; }
      var qw=document.getElementById('quote-all-wrap'); if(qw) qw.style.display='none';
      loadList();
    }
  }catch(e){ document.getElementById('status').textContent='会社一覧取得失敗: '+e.message; }
}
// 会社選択画面（トキワ管理者のみ）
function renderCoSelect(){
  var box=document.getElementById('co-select-list'); if(!box) return;
  box.innerHTML=COMPANIES_CASE.map(function(c){
    var cap=!!SHEET_CAPABLE[c.key], cur=(c.name===COMPANY);
    if(cap) return '<div onclick="pickCompany(\''+c.name+'\')" style="padding:12px 16px;border:1px solid '+(cur?'#15803d':'#e0e0e0')+';border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:12px;background:'+(cur?'#f0fdf4':'#fff')+'" onmouseover="this.style.background=\'#eef6fb\'" onmouseout="this.style.background=\''+(cur?'#f0fdf4':'#fff')+'\'"><span style="font-size:22px">🏢</span><div style="font-weight:700;font-size:14px">'+c.name+(cur?' <span style="color:#15803d;font-size:11px">（表示中）</span>':'')+'</div></div>';
    return '<div style="padding:12px 16px;border:1px dashed #ddd;border-radius:8px;display:flex;align-items:center;gap:12px;color:#aaa;background:#fafafa"><span style="font-size:22px">🏢</span><div style="font-size:13px">'+c.name+'<span style="font-size:11px">（移行準備中）</span></div></div>';
  }).join('');
}
function openCoSelect(){ renderCoSelect(); document.getElementById('co-select-screen').style.display='flex'; }
// 配布用リンク（ショートカット用・?co=会社コード でログイン不要でその会社の画面が開く）
function openDistUrls(){
  var base=location.origin+location.pathname;

// 各社スプレッドシートを直読み（唯一の正）。会社別はキー単位で読み、メモリ＆セッションにキャッシュ。
var _ALL_TS=0, _STALE_MS=60000;
function _cacheKey_(){ return 'sheet_led_'+(IS_TK?'ALL':(MY_CODE||'X')); }
function _scopeKeys_(){
  if(IS_TK) return Object.keys(SHEET_CAPABLE);            // トキワ=対応済全社
  return (MY_KEY && SHEET_CAPABLE[MY_KEY]) ? [MY_KEY] : []; // 関連会社=自社のみ
}
async function loadAll(){
  var keys=_scopeKeys_();
  var results=await Promise.all(keys.map(function(k){
    return api('sheetLedgerLoad',{company:k}).then(function(r){ return {k:k,r:r}; }).catch(function(){ return {k:k,r:null}; });
  }));
  var all=[];
  results.forEach(function(x){
    if(x.r&&x.r.success){ (x.r.records||[]).forEach(function(rec){ rec._key=x.k; rec.id=x.k+'#'+rec._row;
      // 備考に畳んだ 複数梱包/納品先 を解釈（赤字表示・フォーム用）
      var mm=String(rec.memo||''); if(/【複数梱包】/.test(mm)) rec.multiPack=true; var dm=mm.match(/【納品先:([^】]*)】/); if(dm) rec.deliverTo=dm[1];
    }); all=all.concat(x.r.records||[]); }
  });
  ALLCASES=all; _ALL_TS=Date.now();
  try{ sessionStorage.setItem(_cacheKey_(),JSON.stringify({t:_ALL_TS,c:ALLCASES})); }catch(e){}
  return ALLCASES||[];
}
function _sessionCache_(){ try{ var s=sessionStorage.getItem(_cacheKey_()); if(s){ var o=JSON.parse(s); if(o&&o.c) return o; } }catch(e){} return null; }
// 伝票番号で他社の希望納期(=着日)を端末側で解決
function _linkArrivals_(all, rows){
  var byDen={}; all.forEach(function(r){ if(r.denpyo){ (byDen[r.denpyo]=byDen[r.denpyo]||[]).push(r); } });
  rows.forEach(function(r){ var l=(byDen[r.denpyo]||[]).filter(function(x){ return x.company!==r.company && x.hopeDate; });
    r._linkedArrival=l.length?l.map(function(x){ return x.company+':'+x.hopeDate; }).join(' / '):''; });
}
function _applyCompany_(){
  CASES=(ALLCASES||[]).filter(function(c){ return c.company===COMPANY; });
  _linkArrivals_(ALLCASES||[], CASES);
  buildStatusFilter(); buildDenpyoList(); buildCustomerMaster(); render();
}
async function loadList(force){
  if(!COMPANY) return; // 会社未選択（トキワの選択画面待ち）
  // 1) メモリ→セッションの順でまず即描画（stale-while-revalidate）
  if(!ALLCASES){ var cc=_sessionCache_(); if(cc){ ALLCASES=cc.c; _ALL_TS=cc.t; } }
  if(ALLCASES) _applyCompany_(); else document.getElementById('status').textContent='読込中…';
  // 2) 初回・強制・古い(60秒)なら最新を取得して差し替え
  var stale=force||!_ALL_TS||(Date.now()-_ALL_TS>_STALE_MS);
  if(!ALLCASES||stale){
    if(ALLCASES){ var st=document.getElementById('status'); st.textContent=st.textContent+'　（最新に更新中…）'; }
    try{ await loadAll(); _applyCompany_(); }
    catch(e){ if(!ALLCASES) document.getElementById('status').textContent='読込失敗: '+e.message; }
  }
}
function buildStatusFilter(){ var set={}; CASES.forEach(function(c){ if(c.status) set[c.status]=1; }); document.getElementById('f-status').innerHTML='<option value="">状況：すべて</option>'+Object.keys(set).sort().map(function(v){return '<option>'+esc(v)+'</option>';}).join(''); }
function buildDenpyoList(){ var set={}; CASES.forEach(function(c){ if(c.denpyo) set[c.denpyo]=1; }); document.getElementById('denpyo-list').innerHTML=Object.keys(set).sort().map(function(v){return '<option value="'+esc(v)+'">';}).join(''); }
// 社名マスタ：全社の受注実績から重複なしの顧客名を集める（全社データ取得後はそちらを優先）
function buildCustomerMaster(){
  var pool=(ALLCASES&&ALLCASES.length)?ALLCASES:CASES, set={};
  pool.forEach(function(c){ var n=(c.customer==null?'':String(c.customer)).trim(); if(n) set[n]=1; });
  var names=Object.keys(set).sort(function(a,b){ return a.localeCompare(b,'ja'); });
  document.getElementById('customer-list').innerHTML=names.map(function(v){return '<option value="'+esc(v)+'">';}).join('');
}
function filtered(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim(), qs=q?q.split(/\s+/):[];
  var fs=document.getElementById('f-status').value, wk=weekRange(), today=ymd(new Date());
  return CASES.filter(function(c){
    if(fs && c.status!==fs) return false;
    if(deliveryMode){ var d=parseD(c.deliveryDate); if(!d) return false; if(deliveryMode==='today'&&ymd(d)!==today) return false; if(deliveryMode==='week'&&(d<wk[0]||d>wk[1])) return false; }
    if(qs.length){ var hay=[c.denpyo,c.customer,c.item,c.memo].join(' ').toLowerCase(); for(var i=0;i<qs.length;i++){ if(hay.indexOf(qs[i])<0) return false; } }
    return true;
  });
}
var DISPLAY_CAP=400;
function _caseTime_(c){ var d=parseD(c.orderDate); if(d) return d.getTime(); var u=c.updatedAt?Date.parse(c.updatedAt):0; return u||0; }
function render(){
  var V=filtered();
  V.sort(function(a,b){ return _caseTime_(b)-_caseTime_(a); }); // 新しい順（過去は検索で引く）
  var shown=V.slice(0,DISPLAY_CAP);
  document.getElementById('thead').innerHTML='<tr>'+COLS.map(function(c){return '<th>'+c[1]+'</th>';}).join('')+'<th>操作</th></tr>';
  document.getElementById('tbody').innerHTML=shown.map(function(c){
    var red=(c.multiPack===true||c.multiPack==='true'||c.multiPack==='TRUE'||c.deliverTo);
    var tds=COLS.map(function(col){ var k=col[0], v=c[k];
      if(k==='multiPack') v=(c.multiPack===true||c.multiPack==='true'||c.multiPack==='TRUE')?'⚠ 複数梱包':'';
      var cls=(/金額|利益/.test(col[1])&&v!=='')?' class="num"':'';
      return '<td'+cls+'>'+esc(v)+'</td>';
    }).join('');
    return '<tr class="'+(red?'rowred':'')+'">'+tds+'<td style="white-space:nowrap"><button class="btn sm" title="編集" onclick="openForm(\''+c.id+'\')">✏</button> <button class="btn sm" title="この内容で新規（過去から引用）" onclick="openForm(\''+c.id+'\',true)">🔁</button> <button class="btn sm" title="他社へ送る（相手の管理表に追加）" onclick="openSend(\''+c.id+'\')">📤</button> <button class="btn sm" title="帳票（納品書・受領書・請求書・領収書）" onclick="openDocs(\''+c.id+'\')">🧾</button></td></tr>';
  }).join('');
  renderKpis(V);
  var more=V.length>DISPLAY_CAP?('　（新しい順 先頭'+DISPLAY_CAP+'件を表示。過去は🔍検索で絞込）'):'';
  document.getElementById('status').textContent=COMPANY+'：'+CASES.length+'件 / 絞込 '+V.length+'件'+more;
}
function renderKpis(V){
  var wk=weekRange(), today=ymd(new Date()), tN=0,wN=0;
  CASES.forEach(function(c){ var d=parseD(c.deliveryDate); if(!d)return; if(ymd(d)===today)tN++; if(d>=wk[0]&&d<=wk[1])wN++; });
  var now=new Date(), curK=now.getFullYear()+'-'+(now.getMonth()+1);
  var pm=new Date(now.getFullYear(),now.getMonth()-1,1), pmK=pm.getFullYear()+'-'+(pm.getMonth()+1);
  var agg={}; CASES.forEach(function(c){ var d=parseD(c.orderDate); if(!d)return; var k=d.getFullYear()+'-'+(d.getMonth()+1); agg[k]=agg[k]||{n:0,a:0}; agg[k].n++; agg[k].a+=toNum(c.amtSelf); });
  var cur=agg[curK]||{n:0,a:0}, prev=agg[pmK]||{n:0,a:0};
  var sumSelf=V.reduce(function(s,c){return s+toNum(c.amtSelf);},0), sumTok=V.reduce(function(s,c){return s+toNum(c.amtTokiwa);},0), sumP=V.reduce(function(s,c){return s+toNum(c.profit);},0);
  document.getElementById('kpis').innerHTML=
    '<div class="kpi"><div class="k">件数（絞込）</div><div class="v">'+V.length+'</div></div>'+
    '<div class="kpi"><div class="k">金額(自社) 計</div><div class="v" style="font-size:15px">'+yen(sumSelf)+'</div></div>'+
    '<div class="kpi"><div class="k">金額(トキワ) 計</div><div class="v" style="font-size:15px">'+yen(sumTok)+'</div></div>'+
    '<div class="kpi"><div class="k">利益 計</div><div class="v" style="font-size:15px">'+yen(sumP)+'</div></div>'+
    '<div class="kpi clk'+(deliveryMode==='today'?' on':'')+'" onclick="tglDlv(\'today\')"><div class="k">今日の納品</div><div class="v">'+tN+'</div></div>'+
    '<div class="kpi clk'+(deliveryMode==='week'?' on':'')+'" onclick="tglDlv(\'week\')"><div class="k">今週の納品</div><div class="v">'+wN+'</div></div>'+
    '<div class="kpi"><div class="k">今月の案件数</div><div class="v">'+cur.n+' <span style="font-size:11px;color:#9db">'+(cur.n-prev.n>=0?'+':'')+(cur.n-prev.n)+'</span></div></div>'+
    '<div class="kpi"><div class="k">今月の受注額</div><div class="v" style="font-size:14px">'+yen(cur.a)+'</div></div>';
}

function openForm(id, asCopy){
  var src=id?CASES.find(function(c){return c.id===id;}):null;
  editing=(src && !asCopy)?src:null; // asCopy時は新規扱い（保存で別案件になる）
  var g=function(f){ return src?(src[f]!=null?src[f]:''):''; };
  document.getElementById('form-title').textContent=editing?'案件を編集':(asCopy?'新規入力（過去から引用）':'新規入力（'+COMPANY+'）');
  document.getElementById('f-id').value=editing?editing.id:'';
  ['denpyo','customer','item','qty','unit','orderDate','hopeDate','deliveryDate','unitSelf','amtSelf','unitTokiwa','amtTokiwa','profit','deliverTo','memo'].forEach(function(f){ var el=document.getElementById('f-'+f); if(el) el.value=g(f); });
  document.getElementById('f-status2').value=g('status');
  var mmEl=document.getElementById('f-memo'); if(mmEl) mmEl.value=(mmEl.value||'').replace(/^(【複数梱包】|【納品先:[^】]*】)+\s*/,''); // タグは別欄で管理
  document.getElementById('f-multiPack').checked=(src&&(src.multiPack===true||src.multiPack==='true'||src.multiPack==='TRUE'));
  document.getElementById('f-linked').value=(editing?g('_linkedArrival'):'');
  if(asCopy){ // 引用は「元の内容を土台に、新規伝票・新規日付」で入れ直す想定
    document.getElementById('f-denpyo').value='';       // 伝票番号はトキワが新規採番
    document.getElementById('f-orderDate').value=ymd(new Date());
    document.getElementById('f-hopeDate').value='';
    document.getElementById('f-deliveryDate').value='';
    document.getElementById('f-status2').value='';
    document.getElementById('f-linked').value='';
  }
  document.getElementById('del-btn').style.visibility=editing?'visible':'hidden';
  document.getElementById('form-modal').style.display='flex';
  if(asCopy) setTimeout(function(){ document.getElementById('f-denpyo').focus(); },50);
}

function _quoteClear_(){ var q=document.getElementById('f-quote'); if(q) q.value=''; var box=document.getElementById('quote-results'); if(box){ box.style.display='none'; box.innerHTML=''; } }
var _quoteHits_=[], ALLCASES=null;
async function _ensureAllCases_(){ if(ALLCASES) return; try{ await loadAll(); }catch(e){ ALLCASES=ALLCASES||[]; } }
async function quoteSearch(){
  var q=(document.getElementById('f-quote').value||'').toLowerCase().trim(), box=document.getElementById('quote-results');
  var allScope=IS_TK && document.getElementById('quote-all').checked; // 全社流用はトキワのみ

function quotePick(i){
  var c=_quoteHits_[i]; if(!c) return;
  var other=(c.company&&c.company!==COMPANY);
  // 内容を土台に流し込み。他社からの流用は伝票番号を保持（=関連会社リンク成立）／同社リピートは新規採番のため空
  ['customer','item','qty','unit','unitSelf','amtSelf','unitTokiwa','amtTokiwa','profit','deliverTo','memo'].forEach(function(f){ var el=document.getElementById('f-'+f); if(el) el.value=(c[f]!=null?c[f]:''); });

    document.getElementById('f-denpyo').value=c.denpyo||'';   // 流用＝同じ伝票番号で自社行を作る
    if(c.hopeDate) document.getElementById('f-hopeDate').value=c.hopeDate; // 希望納期(=着日)も引き継ぐ
    onDenpyo();
  }
  if(!document.getElementById('f-orderDate').value) document.getElementById('f-orderDate').value=ymd(new Date());
  _quoteClear_();
  document.getElementById('f-denpyo').focus();

function onDenpyo(){ // 同じ伝票番号が既にあれば顧客/案件を補完＋着日リンク表示
  var dp=document.getElementById('f-denpyo').value.trim(); if(!dp) return;

function calcAmt(){ var q=toNum(document.getElementById('f-qty').value); var us=toNum(document.getElementById('f-unitSelf').value), ut=toNum(document.getElementById('f-unitTokiwa').value); if(q&&us) document.getElementById('f-amtSelf').value=Math.round(q*us); if(q&&ut) document.getElementById('f-amtTokiwa').value=Math.round(q*ut); calcProfit(); }
function calcProfit(){ var a=toNum(document.getElementById('f-amtSelf').value), b=toNum(document.getElementById('f-amtTokiwa').value); if(a||b) document.getElementById('f-profit').value=a-b; }
// 保存：新規=シート末尾に追加 / 編集=該当行を上書き（対象会社のスプレッドシートに直書き）
async function saveCase(){
  var dp=document.getElementById('f-denpyo').value.trim(); if(!dp){ alert('伝票番号は必須です'); return; }
  var c={ denpyo:dp,
    customer:document.getElementById('f-customer').value, item:document.getElementById('f-item').value,
    qty:document.getElementById('f-qty').value, unit:document.getElementById('f-unit').value,
    orderDate:document.getElementById('f-orderDate').value, hopeDate:document.getElementById('f-hopeDate').value, deliveryDate:document.getElementById('f-deliveryDate').value,
    status:document.getElementById('f-status2').value,
    unitSelf:document.getElementById('f-unitSelf').value, amtSelf:document.getElementById('f-amtSelf').value,
    unitTokiwa:document.getElementById('f-unitTokiwa').value, amtTokiwa:document.getElementById('f-amtTokiwa').value, profit:document.getElementById('f-profit').value };
  // 複数梱包・納品先はシートに専用列が無いため備考に畳んで保存（情報を失わない・重複防止）
  var mp=document.getElementById('f-multiPack').checked, dt=(document.getElementById('f-deliverTo').value||'').trim();
  var memo=(document.getElementById('f-memo').value||'').replace(/^(【複数梱包】|【納品先:[^】]*】)+\s*/,'');
  var pre=''; if(mp) pre+='【複数梱包】'; if(dt) pre+='【納品先:'+dt+'】';
  c.memo=(pre?pre+' ':'')+memo;
  // 対象会社キー（編集時は元レコードの会社、新規時は選択中の会社）
  var key = (editing && editing._key) ? editing._key : NAMEKEY[COMPANY];
  if(!key || !SHEET_CAPABLE[key]){ alert('この会社はシート運用に未対応です'); return; }
  try{
    var r;
    if(editing && editing._row){ // 編集＝該当行を上書き（元denpyoで行照合）
      r=await api('sheetLedgerUpdate',{},{company:key,row:editing._row,denpyo:editing.denpyo,case:c});
    } else {                     // 新規＝末尾に追加
      r=await api('sheetLedgerAppend',{},{company:key,case:c});
    }
    if(!r.success){ alert('保存失敗: '+(r.error||'')+'\n（他の人がシートを編集した可能性。再読込してやり直してください）'); return; }
    closeForm(); await loadList(true);
  }catch(e){ alert('保存失敗: '+e.message); }
}
async function delCase(){
  if(!editing || !editing._row){ return; }
  if(!confirm('この案件をシートから削除しますか？\n伝票番号: '+(editing.denpyo||'')+'\n'+(editing.item||''))) return;
  var key=editing._key;
  try{ var r=await api('sheetLedgerDelete',{company:key,row:editing._row,denpyo:editing.denpyo},{});
    if(!r.success){ alert('削除失敗: '+(r.error||'')+'\n（行がずれた可能性。再読込してやり直してください）'); return; }
    closeForm(); await loadList(true);
  }catch(e){ alert('削除失敗: '+e.message); }
}

  var m=document.createElement('div'); m.id='send-modal';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:2rem;z-index:60';
  m.innerHTML='<div style="background:#fff;border-radius:10px;width:min(420px,92vw)">'
    +'<div style="padding:12px 16px;background:#15803d;color:#fff;border-radius:10px 10px 0 0;font-weight:700;display:flex;justify-content:space-between;align-items:center">📤 他社へ送る<span onclick="document.getElementById(\'send-modal\').remove()" style="cursor:pointer">×</span></div>'
    +'<div style="padding:14px 16px">'
    +'<div style="font-size:12px;color:#475569;margin-bottom:10px">この案件を選んだ会社の管理表に<b>同じ伝票番号で追加</b>します（相手にも受注として出現）。<br>伝票番号 <b>'+(c.denpyo||'')+'</b> ／ '+(c.customer||'')+' ／ '+(c.item||'')+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:7px">'
    +(targets.length?targets.map(function(t){ return '<button class="btn" style="justify-content:flex-start" onclick="doSend(\''+t.key+'\')">🏢 '+t.name+' に送る</button>'; }).join(''):'<div style="color:#94a3b8;font-size:12px">送信先がありません</div>')
    +'</div></div></div>';
  document.body.appendChild(m);
}
async function doSend(targetKey){
  var c=_sendCase_; if(!c) return;
  var tname=(ALL_TARGETS.find(function(t){return t.key===targetKey;})||{}).name||targetKey;
  var payload={ denpyo:c.denpyo, customer:c.customer, item:c.item, qty:c.qty, unit:c.unit,
    orderDate:ymd(new Date()), hopeDate:c.hopeDate, memo:('【'+(c.company||'')+'より依頼】 '+(c.memo||'')).trim() };
  var btns=document.querySelectorAll('#send-modal button'); btns.forEach(function(b){ b.disabled=true; });
  try{ var r=await api('sheetLedgerAppend',{},{company:targetKey,case:payload});
    if(!r.success){ alert('送信失敗: '+(r.error||'')); btns.forEach(function(b){ b.disabled=false; }); return; }
    var m=document.getElementById('send-modal'); if(m) m.remove();
    alert('✅ '+tname+' の管理表に追加しました（伝票番号 '+(c.denpyo||'')+'）');
    if(NAMEKEY[COMPANY]===targetKey || IS_TK) await loadList(true); // 表示中に反映
  }catch(e){ alert('送信失敗: '+e.message); btns.forEach(function(b){ b.disabled=false; }); }
}
// ── 帳票（納品書・受領書・請求書・領収書） ──
var CO_NAMES={ murayama:'村山印刷有限会社', kitakami:'有限会社北上プリント', yamauchi:'ヤマウチ印刷株式会社', nakao:'中尾印刷株式会社', arteso:'有限会社アート・エス', tsushima:'株式会社津島プリント社' };
var CO_INFO_KEY='ledger_co_info_v1', CO_FIELDS=[['zip','郵便番号'],['addr','住所'],['tel','TEL'],['fax','FAX'],['regno','登録番号'],['bank','振込先'],['rep','代表者']];
function _coAll_(){ try{ return JSON.parse(localStorage.getItem(CO_INFO_KEY)||'{}'); }catch(e){ return {}; } }
function coInfo(key){ var c=(_coAll_()[key])||{}; var o={name:CO_NAMES[key]||''}; CO_FIELDS.forEach(function(f){ o[f[0]]=c[f[0]]||''; }); return o; }
function saveCoInfo(key){ var all=_coAll_(); var o={}; CO_FIELDS.forEach(function(f){ var el=document.getElementById('coi-'+f[0]); o[f[0]]=el?el.value:''; }); all[key]=o; try{ localStorage.setItem(CO_INFO_KEY,JSON.stringify(all)); }catch(e){} _docState_.co=coInfo(key); if(_docState_.type) genDoc(_docState_.type); }
var _docState_={c:null, key:'', type:'', co:null, html:'', issueDate:''};
function openDocs(id){
  var c=(CASES||[]).find(function(x){return x.id===id;}); if(!c) return;
  var key=c._key||NAMEKEY[c.company]||NAMEKEY[COMPANY];
  _docState_={c:c, key:key, type:'', co:coInfo(key), html:'', issueDate:ymd(new Date())};
  document.getElementById('doc-title').textContent='🧾 帳票を作成 ｜ '+(CO_NAMES[key]||c.company)+' ／ '+(c.denpyo||'');
  // 会社情報の編集欄
  var g=document.getElementById('co-info-grid');
  g.innerHTML='<div class="full msub" style="font-size:11px;color:#64748b">'+(CO_NAMES[key]||c.company)+' の帳票用情報（空欄は後で入力可・端末に保存）</div>'
    +CO_FIELDS.map(function(f){ var v=_docState_.co[f[0]]||''; return '<div'+((f[0]==='addr'||f[0]==='bank')?' class="full"':'')+'><label>'+f[1]+'</label><input id="coi-'+f[0]+'" value="'+String(v).replace(/"/g,'&quot;')+'"></div>'; }).join('')
    +'<div class="full"><button class="btn sm p" onclick="saveCoInfo(\''+key+'\')">この会社の情報を保存</button></div>';
  document.getElementById('doc-preview').innerHTML='<div class="msub" style="padding:24px;color:#94a3b8">上の帳票ボタンを選んでください</div>';
  document.getElementById('doc-print-btn').style.display='none';
  loadDocHistory(c.denpyo);
  document.getElementById('doc-modal').style.display='flex';
}
function closeDocs(){ document.getElementById('doc-modal').style.display='none'; }
function _docAmt_(c){ var a=toNum(c.amtSelf)||toNum(c.amtTokiwa)||0; if(!a){ var u=toNum(c.unitSelf)||toNum(c.unitTokiwa)||0, q=toNum(c.qty)||0; a=u*q; } return a; }
function _docUnit_(c){ return toNum(c.unitSelf)||toNum(c.unitTokiwa)||''; }
function _kanjiYen_(n){ return '金 '+ (Math.round(n)||0).toLocaleString() +' 円 也'; }
function _panel3_(title, c, co, iss, isReceipt){
  var esc2=function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var amt=_docAmt_(c), tax=Math.round(amt*0.1), inc=amt+tax, unit=_docUnit_(c);
  return '<div class="dpanel"><div class="pttl">'+title+'</div>'
    +'<div class="phead"><div class="pto"><b>'+esc2(c.customer||'')+'</b>　御中<div class="pmeta">伝票番号：'+esc2(c.denpyo||'')+(c.deliveryDate?'　／　納品日：'+esc2(c.deliveryDate):'')+'</div></div>'
      +'<div class="pfrom">発行日 '+esc2(iss)+'<br><b>'+esc2(co.name)+'</b>'+(co.tel?'<br>TEL '+esc2(co.tel):'')+(co.regno?'<br>登録番号 '+esc2(co.regno):'')+'</div></div>'
    +'<table class="ptbl"><tr><th>品名・摘要</th><th style="width:56px">数量</th><th style="width:44px">単位</th><th style="width:84px">単価</th><th style="width:96px">金額</th></tr>'
      +'<tr><td>'+esc2(c.item||'')+'</td><td class="c">'+esc2(c.qty||'')+'</td><td class="c">'+esc2(c.unit||'')+'</td><td class="r">'+(unit?'¥'+Math.round(unit).toLocaleString():'')+'</td><td class="r">¥'+Math.round(amt).toLocaleString()+'</td></tr>'
      +'<tr><td colspan="3"></td><td class="r">税込計</td><td class="r"><b>¥'+inc.toLocaleString()+'</b></td></tr></table>'
    +(isReceipt?'<div class="prcv">上記正に受領しました。　受領日 ＿＿＿＿＿＿＿　受領印<span class="pseal"></span></div>':'')
    +'</div>';
}
function genDoc(type){
  var c=_docState_.c, co=_docState_.co, iss=_docState_.issueDate; if(!c) return;
  _docState_.type=type;
  if(type==='納品書3連'){
    _docState_.html=_panel3_('納品書 （控）',c,co,iss,false)+_panel3_('納品書',c,co,iss,false)+_panel3_('受領書',c,co,iss,true);
    document.getElementById('doc-preview').innerHTML='<div class="dsheet" style="transform:scale(.62);transform-origin:top center;box-shadow:0 2px 12px rgba(0,0,0,.15)">'+_docState_.html+'</div>';
    document.getElementById('doc-print-btn').style.display='';
    return;
  }
  var amt=_docAmt_(c), tax=Math.round(amt*0.1), inc=amt+tax, unit=_docUnit_(c);
  var esc2=function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var fromLines='<div class="nm">'+esc2(co.name)+'</div>'
    +(co.zip?'〒'+esc2(co.zip)+'<br>':'')+(co.addr?esc2(co.addr)+'<br>':'')
    +(co.tel?'TEL '+esc2(co.tel)+(co.fax?' ／ FAX '+esc2(co.fax):'')+'<br>':'')
    +(co.regno?'登録番号 '+esc2(co.regno)+'<br>':'')+(co.rep?'代表者 '+esc2(co.rep):'');
  var head='<div class="dhead"><div class="dto"><span class="nm">'+esc2(c.customer||'')+'</span>　御中'
    +'<div style="margin-top:10px;font-size:12px">伝票番号：'+esc2(c.denpyo||'')+'</div></div>'
    +'<div class="dfrom"><div style="margin-bottom:6px">発行日：'+esc2(iss)+'</div>'+fromLines+'</div></div>';
  var itemRows='<tr><td>'+esc2(c.item||'')+'</td><td class="c">'+esc2(c.qty||'')+'</td><td class="c">'+esc2(c.unit||'')+'</td><td class="r">'+(unit?'¥'+Math.round(unit).toLocaleString():'')+'</td><td class="r">¥'+Math.round(amt).toLocaleString()+'</td></tr>';
  var itemTable='<table><thead><tr><th>品名・摘要</th><th class="c" style="width:70px">数量</th><th class="c" style="width:56px">単位</th><th class="r" style="width:100px">単価</th><th class="r" style="width:120px">金額</th></tr></thead><tbody>'+itemRows
    +'<tr><td colspan="4" class="r">小計</td><td class="r">¥'+Math.round(amt).toLocaleString()+'</td></tr>'
    +'<tr><td colspan="4" class="r">消費税(10%)</td><td class="r">¥'+tax.toLocaleString()+'</td></tr>'
    +'<tr class="tot"><td colspan="4" class="r" style="font-weight:800">合計（税込）</td><td class="r" style="font-weight:800">¥'+inc.toLocaleString()+'</td></tr></tbody></table>';
  var body='';
  if(type==='領収書'){
    body='<div class="seal">印</div><div style="clear:both"></div><div class="big">'+_kanjiYen_(inc)+'</div>'
      +'<div class="note" style="margin-top:14px">但し　'+esc2(c.item||'')+'　代として<br>上記正に領収いたしました。</div>'
      +'<div class="note">内訳：本体 ¥'+Math.round(amt).toLocaleString()+' ／ 消費税(10%) ¥'+tax.toLocaleString()+'</div>';
  } else if(type==='受領書'){
    body=itemTable+'<div class="note" style="margin-top:20px">上記の品を正に受領いたしました。</div>'
      +'<div style="margin-top:24px;text-align:right">受領日：__________________　　受領印 <span style="display:inline-block;width:56px;height:56px;border:1px dashed #999;vertical-align:middle"></span></div>';
  } else if(type==='請求書'){
    body='<div class="big" style="font-size:20px;margin-bottom:12px">ご請求金額　¥'+inc.toLocaleString()+' －</div>'+itemTable
      +'<div class="note" style="margin-top:12px">お支払期限：翌月末日　／　振込先：'+(esc2(co.bank)||'（未登録）')+'</div>';
  } else { // 納品書
    body=itemTable+'<div class="note" style="margin-top:12px">上記の通り納品いたします。</div>';
  }
  _docState_.html='<div class="dtitle">'+type+'</div>'+head+body;
  document.getElementById('doc-preview').innerHTML='<div class="dsheet" style="transform:scale(.62);transform-origin:top center;box-shadow:0 2px 12px rgba(0,0,0,.15)">'+_docState_.html+'</div>';
  document.getElementById('doc-print-btn').style.display='';
}
function printDoc(){
  if(!_docState_.html) return;
  document.getElementById('doc-print').innerHTML='<div class="dsheet">'+_docState_.html+'</div>';
  document.body.classList.add('printing-doc');
  window.print();
  document.body.classList.remove('printing-doc');
  // 発行を記録
  var c=_docState_.c;
  api('docLogAdd',{},{ denpyo:c.denpyo, company:CO_NAMES[_docState_.key]||c.company, docType:_docState_.type, issueDate:_docState_.issueDate, customer:c.customer, amount:_docAmt_(c), by:(MY_CODE||'hub') })
    .then(function(){ loadDocHistory(c.denpyo); });
}
async function loadDocHistory(denpyo){
  var box=document.getElementById('doc-history'); if(!box) return; box.textContent='読込中…';
  try{ var r=await api('docLogList',{denpyo:denpyo});
    var logs=(r&&r.logs)||[];
    box.innerHTML=logs.length? logs.map(function(l){ return '<div>・'+(l.issueDate||'')+'　<b>'+l.docType+'</b>　'+(l.company||'')+(l.amount?'　¥'+Math.round(l.amount).toLocaleString():'')+'</div>'; }).join('')
      : '<span class="msub" style="color:#94a3b8">まだ出力履歴はありません</span>';
  }catch(e){ box.textContent='履歴取得失敗'; }
}
init();
</script>
