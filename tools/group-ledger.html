<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>グループ 統合案件台帳（入力・運用）</title>
<style>
  :root{ --line:#1a1a1a; --hd:#211f1c; --muted:#64748b; --accent:#1e40af; --red:#c0261c; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; color:#1a1a1a; background:#f4f3f0; font-size:12.5px; }
  .wrap{ padding:12px; }
  h1{ font-size:16px; margin:0 0 2px; } .sub{ color:var(--muted); font-size:11px; margin-bottom:10px; }
  .toolbar{ position:sticky; top:0; z-index:10; background:#f4f3f0; display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:8px 0; border-bottom:1px solid #ddd; }
  select,input,textarea,button{ font-family:inherit; font-size:12.5px; }
  select,input,textarea{ padding:6px 8px; border:1px solid #c9c6bf; border-radius:6px; background:#fff; }
  .btn{ padding:6px 12px; border:1px solid #c9c6bf; border-radius:7px; background:#fff; cursor:pointer; font-weight:700; }
  .btn.p{ background:var(--accent); color:#fff; border-color:var(--accent); } .btn.g{ background:#15803d; color:#fff; border-color:#15803d; } .btn.d{ background:#fee; color:var(--red); border-color:#fca5a5; }
  .btn.sm{ padding:3px 8px; font-size:11px; }
  #kpis{ display:flex; gap:8px; flex-wrap:wrap; margin:10px 0; }
  .kpi{ background:#211f1c; color:#fff; border-radius:8px; padding:7px 13px; } .kpi .k{ font-size:10px; color:#bbb; } .kpi .v{ font-size:17px; font-weight:800; font-family:'Roboto Mono',monospace; }
  .kpi.clk{ cursor:pointer } .kpi.on{ background:#0e7490; outline:2px solid #60a5fa }
  .tblwrap{ overflow:auto; max-height:70vh; border:1.5px solid var(--line); border-radius:10px; background:#fff; }
  table{ border-collapse:separate; border-spacing:0; width:100%; font-size:11.5px; }
  thead th{ position:sticky; top:0; z-index:3; background:var(--hd); color:#fff; padding:6px 8px; white-space:nowrap; text-align:left; border-right:1px solid #444; }
  tbody td{ padding:3px 8px; border-bottom:1px solid #1a1a1a; border-right:1px solid #1a1a1a; vertical-align:top; white-space:normal; word-break:break-word; max-width:240px; }
  tbody td.num{ text-align:right; font-family:'Roboto Mono',monospace; white-space:nowrap; }
  tbody tr:nth-child(even){ background:#faf9f6 } tbody tr:hover{ background:#eef6fb }
  .rowred td{ color:var(--red); font-weight:700; }
  .flag{ color:var(--red); font-weight:800; }
  #status{ font-size:11px; color:var(--muted) }
  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-start; justify-content:center; padding:2rem; overflow:auto; z-index:50 }
  .card{ background:#fff; border-radius:10px; width:100%; max-width:720px; }
  .card h2{ margin:0; padding:12px 16px; background:var(--accent); color:#fff; font-size:14px; display:flex; justify-content:space-between; align-items:center; border-radius:10px 10px 0 0 }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:16px }
  .grid label{ font-size:11px; color:#475569; font-weight:700; display:block; margin-bottom:3px }
  .grid .full{ grid-column:1/3 }
  .grid input,.grid select,.grid textarea{ width:100% }
  .foot{ display:flex; justify-content:space-between; gap:8px; padding:0 16px 16px }
</style>
</head>
<body>
<div class="wrap">
  <h1>グループ 統合案件台帳（入力・運用）</h1>
  <div class="sub">Hubが正の統合台帳。伝票番号（トキワ採番）で会社横断リンク。希望納期＝各社の着日。同じ伝票番号が他社にあれば着日が自動で出ます。※移管期間中は各社シート（閲覧ツール）と併用。</div>
  <div class="toolbar">
    <select id="company" onchange="loadList()"></select>
    <button class="btn g" onclick="openForm()">＋ 新規入力</button>
    <input id="q" placeholder="🔍 伝票番号・顧客・案件で検索" style="width:220px" oninput="render()">
    <select id="f-status" onchange="render()"><option value="">状況：すべて</option></select>
    <button class="btn" onclick="loadList()">🔄 再読込</button>
    <span id="status"></span>
  </div>
  <div id="kpis"></div>
  <div class="tblwrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
</div>
<datalist id="denpyo-list"></datalist>

<div class="modal" id="form-modal">
  <div class="card">
    <h2><span id="form-title">案件入力</span><button onclick="closeForm()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer">×</button></h2>
    <div class="grid">
      <input type="hidden" id="f-id">
      <div><label>伝票番号（トキワ採番）*</label><input id="f-denpyo" list="denpyo-list" placeholder="a0xxxxx" oninput="onDenpyo()"></div>
      <div><label>状況</label><input id="f-status2" list="status-list" placeholder="進行中 / 納品済 / 中止…"></div>
      <div><label>顧客名</label><input id="f-customer"></div>
      <div><label>案件名</label><input id="f-item"></div>
      <div><label>数量</label><input id="f-qty" type="number"></div>
      <div><label>単位</label><input id="f-unit" placeholder="枚 / 冊 / 式"></div>
      <div><label>受注日</label><input id="f-orderDate" type="date"></div>
      <div><label>希望納期（＝各社の着日）</label><input id="f-hopeDate" type="date"></div>
      <div><label>納品日</label><input id="f-deliveryDate" type="date"></div>
      <div><label>着日リンク（他社の希望納期）</label><input id="f-linked" readonly style="background:#f1f5f9"></div>
      <div><label>単価（自社）</label><input id="f-unitSelf" type="number" step="any" oninput="calcAmt()"></div>
      <div><label>金額（自社）</label><input id="f-amtSelf" type="number" oninput="calcProfit()"></div>
      <div><label>単価（トキワ）</label><input id="f-unitTokiwa" type="number" step="any" oninput="calcAmt()"></div>
      <div><label>金額（トキワ）</label><input id="f-amtTokiwa" type="number" oninput="calcProfit()"></div>
      <div><label>利益</label><input id="f-profit" type="number"></div>
      <div><label style="color:var(--red)">複数梱包</label><label style="font-weight:400"><input type="checkbox" id="f-multiPack"> 複数梱包あり（赤字表示）</label></div>
      <div class="full"><label style="color:var(--red)">納品先（普段と違う場合のみ入力→赤字表示）</label><input id="f-deliverTo" placeholder="通常と異なる納品先"></div>
      <div class="full"><label>備考</label><textarea id="f-memo" rows="2"></textarea></div>
    </div>
    <div class="foot">
      <button class="btn d" id="del-btn" onclick="delCase()" style="visibility:hidden">🗑 削除</button>
      <div style="display:flex;gap:8px"><button class="btn" onclick="closeForm()">キャンセル</button><button class="btn p" onclick="saveCase()">保存</button></div>
    </div>
  </div>
</div>
<datalist id="status-list"><option value="進行中"><option value="校正中"><option value="製版中"><option value="印刷中"><option value="加工中"><option value="納品済"><option value="中止"></datalist>

<script>
var GAS_URL='https://script.google.com/a/macros/tokiwap-group.com/s/AKfycbw9-8Nnq3jV9lCDUEf7JOvQM_yAy1ZYnOIab-TYP3TZ-BtH7RosxKSeXmr-FvkxMVhv/exec';
var GAS_KEY='mitsumori-2024';
var CASES=[], COMPANY='', deliveryMode='';
var COLS=[['denpyo','伝票番号'],['customer','顧客名'],['item','案件名'],['qty','数量'],['unit','単位'],['orderDate','受注日'],['hopeDate','希望納期'],['_linkedArrival','着日リンク'],['deliveryDate','納品日'],['status','状況'],['amtSelf','金額(自社)'],['amtTokiwa','金額(トキワ)'],['profit','利益'],['multiPack','複数梱包'],['deliverTo','納品先'],['memo','備考']];
function esc(s){ s=(s==null?'':String(s)); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function yen(n){ n=Math.round(Number(n)||0); return (n<0?'−¥'+Math.abs(n).toLocaleString():'¥'+n.toLocaleString()); }
function toNum(v){ var n=Number(String(v==null?'':v).replace(/[,¥]/g,'')); return isNaN(n)?0:n; }
function parseD(v){ if(!v)return null; var s=String(v).trim(); var m=s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/); return m?new Date(+m[1],+m[2]-1,+m[3]):null; }
function ymd(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function weekRange(){ var t=new Date();t.setHours(0,0,0,0); var dow=(t.getDay()+6)%7; var mon=new Date(t);mon.setDate(t.getDate()-dow); var sun=new Date(mon);sun.setDate(mon.getDate()+6); return [mon,sun]; }
async function api(action, params, post){
  var url=new URL(GAS_URL); url.searchParams.set('action',action); url.searchParams.set('apiKey',GAS_KEY);
  Object.keys(params||{}).forEach(function(k){ url.searchParams.set(k,params[k]); });
  var opt={redirect:'follow'}; if(post){ opt.method='POST'; opt.body=JSON.stringify(post); }
  var r=await fetch(url.toString(),opt); return r.json();
}
async function init(){
  try{ var r=await api('caseCompanies'); var sel=document.getElementById('company');
    (r.companies||[]).filter(function(c){return c.cat==='案件管理';}).forEach(function(c){ sel.add(new Option(c.name,c.name)); });
    loadList();
  }catch(e){ document.getElementById('status').textContent='会社一覧取得失敗: '+e.message; }
}
async function loadList(){
  COMPANY=document.getElementById('company').value;
  document.getElementById('status').textContent='読込中…';
  try{ var r=await api('ledgerList',{company:COMPANY}); if(!r.success){ document.getElementById('status').textContent='読込失敗: '+r.error; return; }
    CASES=r.cases||[]; buildStatusFilter(); buildDenpyoList(); render();
  }catch(e){ document.getElementById('status').textContent='読込失敗: '+e.message; }
}
function buildStatusFilter(){ var set={}; CASES.forEach(function(c){ if(c.status) set[c.status]=1; }); document.getElementById('f-status').innerHTML='<option value="">状況：すべて</option>'+Object.keys(set).sort().map(function(v){return '<option>'+esc(v)+'</option>';}).join(''); }
function buildDenpyoList(){ var set={}; CASES.forEach(function(c){ if(c.denpyo) set[c.denpyo]=1; }); document.getElementById('denpyo-list').innerHTML=Object.keys(set).sort().map(function(v){return '<option value="'+esc(v)+'">';}).join(''); }
function filtered(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim(), qs=q?q.split(/\s+/):[];
  var fs=document.getElementById('f-status').value, wk=weekRange(), today=ymd(new Date());
  return CASES.filter(function(c){
    if(fs && c.status!==fs) return false;
    if(deliveryMode){ var d=parseD(c.deliveryDate); if(!d) return false; if(deliveryMode==='today'&&ymd(d)!==today) return false; if(deliveryMode==='week'&&(d<wk[0]||d>wk[1])) return false; }
    if(qs.length){ var hay=[c.denpyo,c.customer,c.item,c.memo].join(' ').toLowerCase(); for(var i=0;i<qs.length;i++){ if(hay.indexOf(qs[i])<0) return false; } }
    return true;
  });
}
function render(){
  var V=filtered();
  document.getElementById('thead').innerHTML='<tr>'+COLS.map(function(c){return '<th>'+c[1]+'</th>';}).join('')+'<th>操作</th></tr>';
  document.getElementById('tbody').innerHTML=V.map(function(c){
    var red=(c.multiPack===true||c.multiPack==='true'||c.multiPack==='TRUE'||c.deliverTo);
    var tds=COLS.map(function(col){ var k=col[0], v=c[k];
      if(k==='multiPack') v=(c.multiPack===true||c.multiPack==='true'||c.multiPack==='TRUE')?'⚠ 複数梱包':'';
      var cls=(/金額|利益/.test(col[1])&&v!=='')?' class="num"':'';
      return '<td'+cls+'>'+esc(v)+'</td>';
    }).join('');
    return '<tr class="'+(red?'rowred':'')+'">'+tds+'<td><button class="btn sm" onclick="openForm(\''+c.id+'\')">✏</button></td></tr>';
  }).join('');
  renderKpis(V);
  document.getElementById('status').textContent=COMPANY+'：'+CASES.length+'件 / 絞込 '+V.length+'件';
}
function renderKpis(V){
  var wk=weekRange(), today=ymd(new Date()), tN=0,wN=0;
  CASES.forEach(function(c){ var d=parseD(c.deliveryDate); if(!d)return; if(ymd(d)===today)tN++; if(d>=wk[0]&&d<=wk[1])wN++; });
  var now=new Date(), curK=now.getFullYear()+'-'+(now.getMonth()+1);
  var pm=new Date(now.getFullYear(),now.getMonth()-1,1), pmK=pm.getFullYear()+'-'+(pm.getMonth()+1);
  var agg={}; CASES.forEach(function(c){ var d=parseD(c.orderDate); if(!d)return; var k=d.getFullYear()+'-'+(d.getMonth()+1); agg[k]=agg[k]||{n:0,a:0}; agg[k].n++; agg[k].a+=toNum(c.amtSelf); });
  var cur=agg[curK]||{n:0,a:0}, prev=agg[pmK]||{n:0,a:0};
  var sumSelf=V.reduce(function(s,c){return s+toNum(c.amtSelf);},0), sumTok=V.reduce(function(s,c){return s+toNum(c.amtTokiwa);},0), sumP=V.reduce(function(s,c){return s+toNum(c.profit);},0);
  document.getElementById('kpis').innerHTML=
    '<div class="kpi"><div class="k">件数（絞込）</div><div class="v">'+V.length+'</div></div>'+
    '<div class="kpi"><div class="k">金額(自社) 計</div><div class="v" style="font-size:15px">'+yen(sumSelf)+'</div></div>'+
    '<div class="kpi"><div class="k">金額(トキワ) 計</div><div class="v" style="font-size:15px">'+yen(sumTok)+'</div></div>'+
    '<div class="kpi"><div class="k">利益 計</div><div class="v" style="font-size:15px">'+yen(sumP)+'</div></div>'+
    '<div class="kpi clk'+(deliveryMode==='today'?' on':'')+'" onclick="tglDlv(\'today\')"><div class="k">今日の納品</div><div class="v">'+tN+'</div></div>'+
    '<div class="kpi clk'+(deliveryMode==='week'?' on':'')+'" onclick="tglDlv(\'week\')"><div class="k">今週の納品</div><div class="v">'+wN+'</div></div>'+
    '<div class="kpi"><div class="k">今月の案件数</div><div class="v">'+cur.n+' <span style="font-size:11px;color:#9db">'+(cur.n-prev.n>=0?'+':'')+(cur.n-prev.n)+'</span></div></div>'+
    '<div class="kpi"><div class="k">今月の受注額</div><div class="v" style="font-size:14px">'+yen(cur.a)+'</div></div>';
}
function tglDlv(m){ deliveryMode=(deliveryMode===m?'':m); render(); }
// ── 入力フォーム ──
var editing=null;
function openForm(id){
  editing=id?CASES.find(function(c){return c.id===id;}):null;
  var g=function(f){ return editing?(editing[f]!=null?editing[f]:''):''; };
  document.getElementById('form-title').textContent=editing?'案件を編集':'新規入力（'+COMPANY+'）';
  document.getElementById('f-id').value=editing?editing.id:'';
  ['denpyo','customer','item','qty','unit','orderDate','hopeDate','deliveryDate','unitSelf','amtSelf','unitTokiwa','amtTokiwa','profit','deliverTo','memo'].forEach(function(f){ var el=document.getElementById('f-'+f); if(el) el.value=g(f); });
  document.getElementById('f-status2').value=g('status');
  document.getElementById('f-multiPack').checked=(editing&&(editing.multiPack===true||editing.multiPack==='true'||editing.multiPack==='TRUE'));
  document.getElementById('f-linked').value=g('_linkedArrival');
  document.getElementById('del-btn').style.visibility=editing?'visible':'hidden';
  document.getElementById('form-modal').style.display='flex';
}
function closeForm(){ document.getElementById('form-modal').style.display='none'; }
function onDenpyo(){ // 同じ伝票番号が既にあれば顧客/案件を補完＋着日リンク表示
  var dp=document.getElementById('f-denpyo').value.trim(); if(!dp) return;
  var same=CASES.find(function(c){ return c.denpyo===dp && c.id!==document.getElementById('f-id').value; });
  if(same){ if(!document.getElementById('f-customer').value) document.getElementById('f-customer').value=same.customer||''; if(!document.getElementById('f-item').value) document.getElementById('f-item').value=same.item||''; }
}
function calcAmt(){ var q=toNum(document.getElementById('f-qty').value); var us=toNum(document.getElementById('f-unitSelf').value), ut=toNum(document.getElementById('f-unitTokiwa').value); if(q&&us) document.getElementById('f-amtSelf').value=Math.round(q*us); if(q&&ut) document.getElementById('f-amtTokiwa').value=Math.round(q*ut); calcProfit(); }
function calcProfit(){ var a=toNum(document.getElementById('f-amtSelf').value), b=toNum(document.getElementById('f-amtTokiwa').value); if(a||b) document.getElementById('f-profit').value=a-b; }
async function saveCase(){
  var dp=document.getElementById('f-denpyo').value.trim(); if(!dp){ alert('伝票番号は必須です'); return; }
  var c={ id:document.getElementById('f-id').value||'', company:COMPANY, denpyo:dp,
    customer:document.getElementById('f-customer').value, item:document.getElementById('f-item').value,
    qty:document.getElementById('f-qty').value, unit:document.getElementById('f-unit').value,
    orderDate:document.getElementById('f-orderDate').value, hopeDate:document.getElementById('f-hopeDate').value, deliveryDate:document.getElementById('f-deliveryDate').value,
    status:document.getElementById('f-status2').value,
    unitSelf:document.getElementById('f-unitSelf').value, amtSelf:document.getElementById('f-amtSelf').value,
    unitTokiwa:document.getElementById('f-unitTokiwa').value, amtTokiwa:document.getElementById('f-amtTokiwa').value, profit:document.getElementById('f-profit').value,
    multiPack:document.getElementById('f-multiPack').checked, deliverTo:document.getElementById('f-deliverTo').value, memo:document.getElementById('f-memo').value };
  try{ var r=await api('ledgerSave',{},{case:c,by:'hub'}); if(!r.success){ alert('保存失敗: '+r.error); return; } closeForm(); await loadList(); }
  catch(e){ alert('保存失敗: '+e.message); }
}
async function delCase(){
  var id=document.getElementById('f-id').value; if(!id) return; if(!confirm('この案件を削除しますか？')) return;
  try{ var r=await api('ledgerDelete',{id:id},{}); if(!r.success){ alert('削除失敗: '+r.error); return; } closeForm(); await loadList(); }
  catch(e){ alert('削除失敗: '+e.message); }
}
init();
</script>
</body>
</html>
