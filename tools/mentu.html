<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🖨 面付計算・面付PDF | Quote Tools</title>
<style>
  :root{ --ink:#1a1a1a; --line:#e0ddd6; --bg:#f4f3f0; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Yu Gothic','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:var(--bg); color:var(--ink); }
  header{ background:#1a1a1a; color:#fff; padding:10px 18px; display:flex; align-items:center; gap:12px; }
  header .logo{ font-weight:800; font-size:14px; } header .logo b{ color:#a3e635; }
  header .tname{ font-size:16px; font-weight:800; }
  header .user{ margin-left:auto; font-size:11px; color:#cbd5e1; }
  main{ max-width:1060px; margin:16px auto; padding:0 14px; }
  .btn{ padding:8px 14px; border:1px solid #d0cec8; border-radius:7px; background:#fff; cursor:pointer; font-size:13px; font-family:inherit; font-weight:700; }
  .btn-p{ background:#0891b2; border-color:#0891b2; color:#fff; }
  .mentu-embed{ background:#f9f9f7; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .me-top{ display:flex; gap:1rem; padding:1rem; flex-wrap:wrap; }
  .me-inputs{ flex:1; min-width:280px; display:flex; flex-direction:column; gap:8px; }
  .me-preview{ flex:1; min-width:300px; min-height:350px; background:#fff; border:1px solid var(--line); border-radius:6px; position:relative; display:flex; align-items:center; justify-content:center; }
  .me-preset-row{ display:flex; gap:4px; flex-wrap:wrap; }
  .me-preset{ padding:3px 10px; border:1px solid #d0cec8; border-radius:14px; font-size:11px; cursor:pointer; background:#fff; color:#555; font-family:inherit; }
  .me-preset.act{ background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
  .me-field{ display:grid; grid-template-columns:70px 1fr 1fr; gap:6px; align-items:center; font-size:12px; }
  .me-field label{ color:#888; font-size:11px; }
  .me-field input{ padding:4px 6px; border:1px solid #d0cec8; border-radius:4px; font-size:12px; text-align:right; font-family:'JetBrains Mono',Consolas,monospace; }
  .me-field input:focus{ outline:none; border-color:#1a1a1a; }
  .me-result-bar{ display:flex; gap:16px; padding:10px 1rem; background:#1a1a1a; color:#fff; flex-wrap:wrap; }
  .me-result-item span{ font-size:9px; color:#94a3b8; display:block; letter-spacing:.06em; }
  .me-result-item strong{ font-size:15px; }
  .muted{ font-size:11px; color:#94a3b8; }
</style>
</head>
<body>
<header>
  <span class="logo">QUOTE <b>TOOLS</b> 🖨</span>
  <span class="tname">面付計算・面付PDF</span>
  <span class="user">単体ツール（ログイン不要）</span>
</header>
<main>
  <div class="mentu-embed">
    <div class="me-result-bar" id="me-results">
      <div class="me-result-item"><span>合計面数</span><strong id="me-total">—</strong></div>
      <div class="me-result-item"><span>列 × 行</span><strong id="me-grid">—</strong></div>
      <div class="me-result-item"><span>回転</span><strong id="me-rotate">—</strong></div>
      <div class="me-result-item"><span>有効エリア</span><strong id="me-area">—</strong></div>
      <div id="me-note" style="margin-left:auto;font-size:11px;color:#aaa"></div>
    </div>
    <div class="me-top">
      <div class="me-inputs">
        <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:2px">📄 用紙プリセット（原紙・断裁）</div>
        <select id="me-paper-sel" style="width:100%;font-size:12px;padding:5px" onchange="mePaperSel(this)">
          <option value="">── 用紙サイズを選択 ──</option>
          <optgroup label="四六判 (788×1091)">
            <option value="788,1091">四六 全判 788×1091</option>
            <option value="545,788">四六 半裁 545×788</option>
            <option value="394,545">四六 4切 394×545</option>
            <option value="272,394">四六 8切 272×394</option>
          </optgroup>
          <optgroup label="菊判 (636×939)">
            <option value="636,939">菊 全判 636×939</option>
            <option value="469,636">菊 半裁 469×636</option>
            <option value="318,469">菊 4切 318×469</option>
          </optgroup>
          <optgroup label="A列本判 (625×880)">
            <option value="625,880">A列本判 全判 625×880</option>
            <option value="440,625">A列本判 半裁 440×625</option>
            <option value="312,440">A列本判 4切 312×440</option>
          </optgroup>
          <optgroup label="B列本判 (765×1085)">
            <option value="765,1085">B列本判 全判 765×1085</option>
            <option value="542,765">B列本判 半裁 542×765</option>
            <option value="382,542">B列本判 4切 382×542</option>
          </optgroup>
          <optgroup label="ハトロン判 (900×1200)">
            <option value="900,1200">ハトロン 全判 900×1200</option>
            <option value="600,900">ハトロン 半裁 600×900</option>
          </optgroup>
          <optgroup label="A判 (仕上がり系)">
            <option value="594,841">A1 594×841</option>
            <option value="420,594">A2 420×594</option>
            <option value="297,420">A3 297×420</option>
            <option value="329,483">A3ノビ 329×483</option>
            <option value="210,297">A4 210×297</option>
          </optgroup>
          <optgroup label="B判 (JIS)">
            <option value="728,1030">B1 728×1030</option>
            <option value="515,728">B2 515×728</option>
            <option value="364,515">B3 364×515</option>
            <option value="257,364">B4 257×364</option>
          </optgroup>
        </select>
        <div class="me-preset-row" id="me-paper-presets" style="margin-top:4px">
          <button class="me-preset" onclick="mePaperPreset(this,788,1091)">四六全</button>
          <button class="me-preset" onclick="mePaperPreset(this,545,788)">四六半裁</button>
          <button class="me-preset" onclick="mePaperPreset(this,636,939)">菊全</button>
          <button class="me-preset" onclick="mePaperPreset(this,469,636)">菊半裁</button>
          <button class="me-preset act" onclick="mePaperPreset(this,625,880)">A本判</button>
          <button class="me-preset" onclick="mePaperPreset(this,440,625)">A半裁</button>
          <button class="me-preset" onclick="mePaperPreset(this,297,420)">A3</button>
          <button class="me-preset" onclick="mePaperPreset(this,364,515)">B3</button>
        </div>
        <div class="me-field"><label>用紙</label>
          <input type="number" id="me-pw" value="625" oninput="meCalc()"><input type="number" id="me-ph" value="880" oninput="meCalc()">
        </div>
        <div style="font-size:11px;font-weight:700;color:#888;margin:4px 0 2px">📋 仕上がりプリセット</div>
        <div class="me-preset-row" id="me-page-presets">
          <button class="me-preset" onclick="mePagePreset(this,297,420)">A3</button>
          <button class="me-preset" onclick="mePagePreset(this,210,297)">A4</button>
          <button class="me-preset act" onclick="mePagePreset(this,148,210)">A5</button>
          <button class="me-preset" onclick="mePagePreset(this,105,148)">A6</button>
          <button class="me-preset" onclick="mePagePreset(this,257,364)">B4</button>
          <button class="me-preset" onclick="mePagePreset(this,182,257)">B5</button>
          <button class="me-preset" onclick="mePagePreset(this,128,182)">B6</button>
          <button class="me-preset" onclick="mePagePreset(this,100,148)">はがき</button>
          <button class="me-preset" onclick="mePagePreset(this,91,55)">名刺</button>
          <button class="me-preset" onclick="mePagePreset(this,120,235)">長3</button>
        </div>
        <div class="me-field"><label>仕上がり</label>
          <input type="number" id="me-pgw" value="148" oninput="meCalc()"><input type="number" id="me-pgh" value="210" oninput="meCalc()">
        </div>
        <!-- MNTU-4: 面付パターンの保存・呼び出し -->
        <div style="font-size:11px;font-weight:700;color:#888;margin:6px 0 2px">💾 面付パターン（よく使う設定を保存）</div>
        <div class="me-preset-row" id="me-pat-chips"></div>
        <div style="display:flex;gap:5px;margin-top:3px">
          <input type="text" id="me-pat-name" placeholder="パターン名 (例: A4ﾁﾗｼ 四六半裁4面)" style="flex:1;padding:5px 8px;border:1px solid #d0cec8;border-radius:5px;font-size:12px">
          <button class="btn" style="font-size:12px;padding:5px 12px" onclick="meSavePattern()">💾 保存</button>
        </div>
        <div style="font-size:11px;font-weight:700;color:#888;margin:4px 0 2px">📐 余白・ドブ</div>
        <div class="me-field"><label>クワエ</label><input type="number" id="me-kw" value="10" oninput="meCalc()"><input type="number" id="me-sh" value="10" oninput="meCalc()" placeholder="尻"></div>
        <div class="me-field"><label>左右余白</label><input type="number" id="me-ml" value="10" oninput="meCalc()"><input type="number" id="me-mr" value="10" oninput="meCalc()"></div>
        <div class="me-field"><label>ドブ天地</label><input type="number" id="me-dv" value="3" oninput="meCalc()"><input type="number" id="me-dh" value="3" oninput="meCalc()" placeholder="ドブ左右"></div>
        <div style="margin-top:4px"><label style="font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px"><input type="checkbox" id="me-rot" onchange="meCalc()"> 回転配置も試す</label></div>
        <button class="btn btn-p" style="margin-top:8px;width:100%" onclick="meCalc()">▶ 計算する</button>
        <!-- 実 PDF 面付出力 -->
        <div style="margin-top:12px;padding:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px">
          <div style="font-size:11px;font-weight:700;color:#1e3a8a;margin-bottom:6px">📄 実 PDF 面付出力</div>
          <select id="me-mode" style="width:100%;font-size:11px;padding:4px" onchange="document.getElementById('me-mode-hint').textContent = this.value==='multi' ? '複数PDFを選択 → 面1=ファイル1, 面2=ファイル2… の順に並べます (繰り返し)' : '1面データ(1ファイル)を全面に並べます。複数ページPDFは1ページ=1シート。';">
            <option value="same">同一データ 多面付け（1面データ → 全面同じ）</option>
            <option value="multi">他面付け（異なるデータを面ごとに配置）</option>
          </select>
          <div id="me-mode-hint" style="font-size:10px;color:#64748b;margin:3px 0 5px">1面データ(1ファイル)を全面に並べます。複数ページPDFは1ページ=1シート。</div>
          <input type="file" id="me-pdf-file" accept="application/pdf" multiple style="font-size:11px;width:100%">
          <div style="font-size:10px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:4px;padding:3px 7px;margin-top:5px">EPS はデスクトップの「EPSをPDFに変換」にドラッグしてPDF化してから入れてください</div>
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#374151;margin-top:6px;cursor:pointer">
            <input type="checkbox" id="me-trim-marks" checked> トンボ (トリムマーク) を入れる
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#374151;margin-top:4px;cursor:pointer">
            <input type="checkbox" id="me-page-numbers"> ページ番号を入れる
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#374151;margin-top:4px;cursor:pointer" title="両面物の裏面用: 配置を左右反転し、左右余白も入れ替えて表と刷り合わせます">
            <input type="checkbox" id="me-mirror"> 裏面モード（左右ミラー配置）
          </label>
          <button class="btn btn-p" id="me-impose-btn" style="margin-top:8px;width:100%;background:#1e40af;border-color:#1e40af" onclick="meExecuteImposition()">📄 面付した PDF をダウンロード</button>
          <div id="me-impose-status" style="font-size:10px;color:#666;margin-top:4px;text-align:center"></div>
        </div>
      </div>
      <div class="me-preview" id="me-canvas-area">
        <canvas id="me-canvas"></canvas>
      </div>
    </div>
  </div>
  <p class="muted">🔒 ファイルはこのPC内だけで処理されます。両面物は「表を通常 → 裏を裏面モード」で2つ出力してください。</p>
</main>

<script>
// ═════ MNTU-4: 面付パターン保存 (このブラウザに保存) ═════
var ME_PAT_KEY='tokiwa_mentu_patterns_v1';
var ME_FIELDS=['me-pw','me-ph','me-pgw','me-pgh','me-kw','me-sh','me-ml','me-mr','me-dv','me-dh'];
function mePatterns(){ try { return JSON.parse(localStorage.getItem(ME_PAT_KEY))||[]; } catch(e){ return []; } }
function mePatSave(list){ try { localStorage.setItem(ME_PAT_KEY, JSON.stringify(list)); } catch(e){ alert('保存失敗: '+e); } }
function meSavePattern(){
  var name=(document.getElementById('me-pat-name').value||'').trim();
  if(!name){ alert('パターン名を入れてください (例: A4ﾁﾗｼ 四六半裁4面)'); return; }
  var vals={};
  ME_FIELDS.forEach(function(id){ vals[id]=document.getElementById(id).value; });
  vals.rot=document.getElementById('me-rot').checked;
  vals.mode=document.getElementById('me-mode').value;
  vals.mirror=document.getElementById('me-mirror').checked;
  vals.trim=document.getElementById('me-trim-marks').checked;
  vals.pnum=document.getElementById('me-page-numbers').checked;
  var list=mePatterns();
  var ex=list.findIndex(function(p){ return p.name===name; });
  if(ex>=0){ if(!confirm('「'+name+'」を上書きしますか?')) return; list[ex]={name:name,vals:vals}; }
  else list.push({name:name,vals:vals});
  mePatSave(list);
  document.getElementById('me-pat-name').value='';
  meRenderPatterns();
}
function meApplyPattern(i){
  var p=mePatterns()[i]; if(!p) return;
  ME_FIELDS.forEach(function(id){ if(p.vals[id]!==undefined) document.getElementById(id).value=p.vals[id]; });
  document.getElementById('me-rot').checked=!!p.vals.rot;
  if(p.vals.mode) document.getElementById('me-mode').value=p.vals.mode;
  document.getElementById('me-mirror').checked=!!p.vals.mirror;
  document.getElementById('me-trim-marks').checked=p.vals.trim!==false;
  document.getElementById('me-page-numbers').checked=!!p.vals.pnum;
  meCalc();
}
function meDeletePattern(i, ev){
  ev.stopPropagation();
  var list=mePatterns();
  if(!confirm('パターン「'+list[i].name+'」を削除しますか?')) return;
  list.splice(i,1); mePatSave(list); meRenderPatterns();
}
function meRenderPatterns(){
  var box=document.getElementById('me-pat-chips');
  var list=mePatterns();
  box.innerHTML = list.length
    ? list.map(function(p,i){
        return '<button class="me-preset" style="display:inline-flex;align-items:center;gap:5px" onclick="meApplyPattern('+i+')" title="クリックで適用">⭐ '
          + p.name.replace(/&/g,'&amp;').replace(/</g,'&lt;')
          + ' <span style="color:#b91c1c;font-weight:800" onclick="meDeletePattern('+i+',event)" title="削除">✕</span></button>';
      }).join('')
    : '<span style="font-size:10.5px;color:#94a3b8">まだ保存されていません。設定を作って名前を付けて保存→次回ワンクリックで呼出し。</span>';
}
function mePaperSel(sel){
  if(!sel.value) return;
  var p=sel.value.split(',');
  document.getElementById('me-pw').value=p[0];
  document.getElementById('me-ph').value=p[1];
  document.querySelectorAll('#me-paper-presets .me-preset').forEach(function(b){b.classList.remove('act');});
  meCalc();
}
function mePaperPreset(btn,w,h){
  document.querySelectorAll('#me-paper-presets .me-preset').forEach(function(b){b.classList.remove('act');});
  btn.classList.add('act');
  document.getElementById('me-pw').value=w; document.getElementById('me-ph').value=h;
  meCalc();
}
function mePagePreset(btn,w,h){
  document.querySelectorAll('#me-page-presets .me-preset').forEach(function(b){b.classList.remove('act');});
  btn.classList.add('act');
  document.getElementById('me-pgw').value=w; document.getElementById('me-pgh').value=h;
  meCalc();
}
function meCalc(){
  var pw=parseFloat(document.getElementById('me-pw').value)||0;
  var ph=parseFloat(document.getElementById('me-ph').value)||0;
  var pgw=parseFloat(document.getElementById('me-pgw').value)||0;
  var pgh=parseFloat(document.getElementById('me-pgh').value)||0;
  var kw=parseFloat(document.getElementById('me-kw').value)||0;
  var sh=parseFloat(document.getElementById('me-sh').value)||0;
  var ml=parseFloat(document.getElementById('me-ml').value)||0;
  var mr=parseFloat(document.getElementById('me-mr').value)||0;
  var dv=parseFloat(document.getElementById('me-dv').value)||0;
  var dh=parseFloat(document.getElementById('me-dh').value)||0;
  var tryRot=document.getElementById('me-rot').checked;
  if(!pw||!ph||!pgw||!pgh) return;
  var aW=pw-ml-mr, aH=ph-kw-sh;
  if(aW<=0||aH<=0) return;
  function fit(aw,ah,w,h,dbh,dbv){
    var cols=Math.max(0,Math.floor((aw+dbh)/(w+dbh)));
    var rows=Math.max(0,Math.floor((ah+dbv)/(h+dbv)));
    return {cols:cols,rows:rows,total:cols*rows};
  }
  var normal=fit(aW,aH,pgw,pgh,dh,dv); normal.rotated=false;
  var best=normal;
  if(tryRot){ var rotated=fit(aW,aH,pgh,pgw,dv,dh); rotated.rotated=true; if(rotated.total>normal.total) best=rotated; }
  document.getElementById('me-total').textContent=best.total;
  document.getElementById('me-grid').textContent=best.cols+'×'+best.rows;
  document.getElementById('me-rotate').textContent=best.rotated?'90°回転':'なし';
  document.getElementById('me-area').textContent=aW.toFixed(1)+'×'+aH.toFixed(1)+'mm';
  if(best.total>0){
    var usedPw=best.rotated?pgh:pgw, usedPh=best.rotated?pgw:pgh;
    var usedW=best.cols*usedPw+(best.cols-1)*(best.rotated?dv:dh);
    var usedH=best.rows*usedPh+(best.rows-1)*(best.rotated?dh:dv);
    document.getElementById('me-note').innerHTML='使用率: 横'+((usedW/aW)*100).toFixed(1)+'% / 縦'+((usedH/aH)*100).toFixed(1)+'%';
  }
  meDrawPreview({pw:pw,ph:ph,aW:aW,aH:aH,pgw:pgw,pgh:pgh,kw:kw,sh:sh,ml:ml,mr:mr,dv:dv,dh:dh,cols:best.cols,rows:best.rows,rotated:best.rotated,total:best.total});
}
function meDrawPreview(p){
  var canvas=document.getElementById('me-canvas');
  var area=document.getElementById('me-canvas-area');
  if(!canvas||!area||!p.total) return;
  var PAD=24, maxW=area.clientWidth-PAD*2, maxH=area.clientHeight-PAD*2;
  if(maxW<=0||maxH<=0) return;
  var scale=Math.min(maxW/p.pw,maxH/p.ph,2);
  var cw=Math.round(p.pw*scale+PAD*2), ch=Math.round(p.ph*scale+PAD*2);
  canvas.width=cw; canvas.height=ch;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,cw,ch);
  var ox=PAD, oy=PAD, spw=p.pw*scale, sph=p.ph*scale;
  ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(ox+3,oy+3,spw,sph);
  ctx.fillStyle='#fff'; ctx.fillRect(ox,oy,spw,sph);
  ctx.strokeStyle='rgba(200,200,200,0.3)'; ctx.lineWidth=0.5;
  var gs=10*scale;
  for(var x=0;x<=spw;x+=gs){ctx.beginPath();ctx.moveTo(ox+x,oy);ctx.lineTo(ox+x,oy+sph);ctx.stroke();}
  for(var y=0;y<=sph;y+=gs){ctx.beginPath();ctx.moveTo(ox,oy+y);ctx.lineTo(ox+spw,oy+y);ctx.stroke();}
  var smL=p.ml*scale,smR=p.mr*scale,smT=p.kw*scale,smB=p.sh*scale;
  ctx.fillStyle='rgba(255,165,0,0.08)';
  ctx.fillRect(ox,oy,spw,smT); ctx.fillRect(ox,oy+sph-smB,spw,smB);
  ctx.fillRect(ox,oy+smT,smL,sph-smT-smB); ctx.fillRect(ox+spw-smR,oy+smT,smR,sph-smT-smB);
  ctx.strokeStyle='rgba(255,165,0,0.5)'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
  ctx.strokeRect(ox+smL,oy+smT,spw-smL-smR,sph-smT-smB);
  ctx.setLineDash([]);
  var rpw=p.rotated?p.pgh:p.pgw, rph=p.rotated?p.pgw:p.pgh;
  var rdh=p.rotated?p.dv:p.dh, rdv=p.rotated?p.dh:p.dv;
  var spgw=rpw*scale, spgh=rph*scale, sdh=rdh*scale, sdv=rdv*scale;
  var idx=0;
  for(var r=0;r<p.rows;r++){
    for(var c=0;c<p.cols;c++){
      var x2=ox+smL+c*(spgw+sdh), y2=oy+smT+r*(spgh+sdv);
      var hue=(c+r*p.cols)*37%360;
      ctx.fillStyle='hsla('+hue+',45%,82%,0.85)';
      ctx.fillRect(x2,y2,spgw,spgh);
      ctx.strokeStyle='rgba(30,30,60,0.4)';ctx.lineWidth=0.8;ctx.strokeRect(x2,y2,spgw,spgh);
      idx++;
      if(spgw>16&&spgh>12){
        ctx.fillStyle='rgba(20,20,50,0.7)';
        ctx.font='bold '+Math.min(11,spgh*0.2)+'px monospace';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(idx,x2+spgw/2,y2+spgh/2);
      }
    }
  }
  ctx.fillStyle='#999';ctx.font='10px monospace';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(p.pw+'mm',ox+spw/2,oy+sph+4);
  ctx.strokeStyle='#e0ddd6';ctx.lineWidth=1.5;ctx.strokeRect(ox,oy,spw,sph);
}

// ── 実PDF面付 (pdf-lib) ──
async function _loadPdfLib_(){
  if(window.PDFLib) return window.PDFLib;
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
    s.onload=function(){ resolve(window.PDFLib); };
    s.onerror=reject;
    document.head.appendChild(s);
  });
}
async function meExecuteImposition(){
  var status=document.getElementById('me-impose-status');
  var btn=document.getElementById('me-impose-btn');
  var fileInput=document.getElementById('me-pdf-file');
  if(!fileInput.files || !fileInput.files[0]){ alert('面付する PDF ファイルを選択してください'); return; }
  var files=[].slice.call(fileInput.files);
  var file=files[0];
  var impMode=document.getElementById('me-mode').value||'same';
  var mirror=document.getElementById('me-mirror').checked;
  if(files.some(function(f){ return /\.eps$/i.test(f.name); })){
    alert('EPS は直接読めません。\nデスクトップの「EPSをPDFに変換」にドラッグして PDF にしてから入れてください。');
    return;
  }
  var pw=parseFloat(document.getElementById('me-pw').value)||0;
  var ph=parseFloat(document.getElementById('me-ph').value)||0;
  var pgw=parseFloat(document.getElementById('me-pgw').value)||0;
  var pgh=parseFloat(document.getElementById('me-pgh').value)||0;
  var kw=parseFloat(document.getElementById('me-kw').value)||0;
  var sh=parseFloat(document.getElementById('me-sh').value)||0;
  var ml=parseFloat(document.getElementById('me-ml').value)||0;
  var mr=parseFloat(document.getElementById('me-mr').value)||0;
  var dv=parseFloat(document.getElementById('me-dv').value)||0;
  var dh=parseFloat(document.getElementById('me-dh').value)||0;
  var tryRot=document.getElementById('me-rot').checked;
  var trimMarks=document.getElementById('me-trim-marks').checked;
  var pageNumbers=document.getElementById('me-page-numbers').checked;
  if(!pw||!ph||!pgw||!pgh){ alert('用紙・仕上がりサイズを入力してください'); return; }
  if(btn){ btn.disabled=true; btn.textContent='⏳ 処理中...'; }
  if(status) status.textContent='pdf-lib を読込中...';
  try{
    var PDFLib=await _loadPdfLib_();
    if(status) status.textContent='入力 PDF を解析中...';
    var inputBytes=await file.arrayBuffer();
    var srcDoc=await PDFLib.PDFDocument.load(inputBytes);
    var srcPages=srcDoc.getPages();
    var allBytes=[inputBytes];
    if(impMode==='multi'){ for(var fi=1; fi<files.length; fi++) allBytes.push(await files[fi].arrayBuffer()); }

    var MM=2.83465;
    var aW=pw-ml-mr, aH=ph-kw-sh;
    function fit(aw,ah,w,h,dbh,dbv){
      var cols=Math.max(0,Math.floor((aw+dbh)/(w+dbh)));
      var rows=Math.max(0,Math.floor((ah+dbv)/(h+dbv)));
      return {cols:cols,rows:rows,total:cols*rows};
    }
    var normal=fit(aW,aH,pgw,pgh,dh,dv); normal.rotated=false;
    var best=normal;
    if(tryRot){ var rotated=fit(aW,aH,pgh,pgw,dv,dh); rotated.rotated=true; if(rotated.total>normal.total) best=rotated; }
    if(best.total===0){ alert('面付できません (用紙に対して仕上がりサイズが大きすぎる可能性)'); throw new Error('no_fit'); }
    if(status) status.textContent=best.total+' 面を配置中...';

    var outDoc=await PDFLib.PDFDocument.create();
    var sheetW=pw*MM, sheetH=ph*MM;
    var pgUsedW=(best.rotated?pgh:pgw)*MM, pgUsedH=(best.rotated?pgw:pgh)*MM;
    var dhUsed=(best.rotated?dv:dh)*MM, dvUsed=(best.rotated?dh:dv)*MM;
    var marginL=ml*MM, marginT=kw*MM;

    // シート構成 (same: 1ページ→1シート全面同 / multi: 全ファイル全ページを面へ順に)
    var sheets=[];
    if(impMode==='multi'){
      var pool=[];
      for(var bi=0; bi<allBytes.length; bi++){
        var embArr=await outDoc.embedPdf(allBytes[bi]);
        for(var ei=0; ei<embArr.length; ei++) pool.push(embArr[ei]);
      }
      if(!pool.length) throw new Error('読み込めるページがありません');
      var perSheet=best.total;
      var sheetCount=Math.max(1, Math.ceil(pool.length/perSheet));
      for(var si=0; si<sheetCount; si++){
        var emb=[];
        for(var pi=0; pi<perSheet; pi++){
          var poolIdx=si*perSheet+pi;
          emb.push(pool[poolIdx<pool.length ? poolIdx : poolIdx%pool.length]);
        }
        sheets.push({embeds:emb});
      }
    } else {
      var copiedPages=await outDoc.copyPages(srcDoc, srcPages.map(function(_,i){return i;}));
      for(var cp=0; cp<copiedPages.length; cp++){
        var one=await outDoc.embedPage(copiedPages[cp]);
        var emb2=[]; for(var pi2=0; pi2<best.total; pi2++) emb2.push(one);
        sheets.push({embeds:emb2});
      }
    }

    for(var pageIdx=0; pageIdx<sheets.length; pageIdx++){
      var sheet=outDoc.addPage([sheetW,sheetH]);
      var embeds=sheets[pageIdx].embeds;
      for(var r=0;r<best.rows;r++){
        for(var c=0;c<best.cols;c++){
          var x = mirror
            ? (sheetW - marginL - (best.cols-1-c)*(pgUsedW+dhUsed) - pgUsedW)
            : (marginL + c*(pgUsedW+dhUsed));
          var embedded=embeds[r*best.cols+c];
          var srcW=embedded.width, srcH=embedded.height;
          var scale=Math.min(pgUsedW/srcW, pgUsedH/srcH);
          var drawW=srcW*scale, drawH=srcH*scale;
          var yTop=sheetH - marginT - r*(pgUsedH+dvUsed);
          var y=yTop - pgUsedH;
          var ox=x+(pgUsedW-drawW)/2, oy=y+(pgUsedH-drawH)/2;
          if(best.rotated){
            sheet.drawPage(embedded,{ x:ox+drawW, y:oy, xScale:scale, yScale:scale, rotate:PDFLib.degrees(90) });
          } else {
            sheet.drawPage(embedded,{ x:ox, y:oy, xScale:scale, yScale:scale });
          }
          if(pageNumbers){
            sheet.drawText(String(r*best.cols+c+1),{ x:x+pgUsedW/2-4, y:y+pgUsedH/2, size:10, opacity:0.4 });
          }
          if(trimMarks){
            // 日本式トンボ: 角=二重かぎ型(四角マーク, 内3mm) + 各辺センタートンボ(十字)
            var b=3*MM, len=10, cl=7, col=PDFLib.rgb(0,0,0);
            var ln=function(x1,y1,x2,y2){ sheet.drawLine({ start:{x:x1,y:y1}, end:{x:x2,y:y2}, thickness:0.4, color:col }); };
            var X0=x, Y0=y, X1=x+pgUsedW, Y1=y+pgUsedH;
            // 左下
            ln(X0-b-len,Y0, X0-b,Y0);  ln(X0-b-len,Y0-b, X0,Y0-b);
            ln(X0,Y0-b-len, X0,Y0-b);  ln(X0-b,Y0-b-len, X0-b,Y0);
            // 右下
            ln(X1+b,Y0, X1+b+len,Y0);  ln(X1,Y0-b, X1+b+len,Y0-b);
            ln(X1,Y0-b-len, X1,Y0-b);  ln(X1+b,Y0-b-len, X1+b,Y0);
            // 左上
            ln(X0-b-len,Y1, X0-b,Y1);  ln(X0-b-len,Y1+b, X0,Y1+b);
            ln(X0,Y1+b, X0,Y1+b+len);  ln(X0-b,Y1, X0-b,Y1+b+len);
            // 右上
            ln(X1+b,Y1, X1+b+len,Y1);  ln(X1,Y1+b, X1+b+len,Y1+b);
            ln(X1,Y1+b, X1,Y1+b+len);  ln(X1+b,Y1, X1+b,Y1+b+len);
            // センタートンボ (各辺中央の十字)
            var cx=(X0+X1)/2, cy2=(Y0+Y1)/2;
            ln(cx,Y0-b-cl, cx,Y0);      ln(cx-cl,Y0-b, cx+cl,Y0-b);   // 下
            ln(cx,Y1, cx,Y1+b+cl);      ln(cx-cl,Y1+b, cx+cl,Y1+b);   // 上
            ln(X0-b-cl,cy2, X0,cy2);    ln(X0-b,cy2-cl, X0-b,cy2+cl); // 左
            ln(X1,cy2, X1+b+cl,cy2);    ln(X1+b,cy2-cl, X1+b,cy2+cl); // 右
          }
        }
      }
    }

    if(status) status.textContent='PDF を生成中...';
    var outBytes=await outDoc.save();
    var blob=new Blob([outBytes],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download=file.name.replace(/\.pdf$/i,'')+'_面付_'+best.cols+'x'+best.rows+'_'+best.total+'面'+(mirror?'_裏':'')+'.pdf';
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); },5000);
    if(status) status.textContent='✅ 完了 ('+sheets.length+' シート × '+best.total+' 面'+(mirror?' / 裏面ミラー':'')+(impMode==='multi'?' / 他面付け':'')+')';
  }catch(e){
    console.error(e);
    if(status) status.textContent='⚠ エラー: '+e.message;
    if(e.message!=='no_fit') alert('面付に失敗しました: '+e.message);
  }finally{
    if(btn){ btn.disabled=false; btn.textContent='📄 面付した PDF をダウンロード'; }
  }
}
meCalc();
meRenderPatterns();
</script>
